<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Rare Foil</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let w = 0;
  let h = 0;
  let dpr = 1;
  let t = 0;
  let isDragging = false;
  let didDrag = false;
  let lastX = 0;
  let lastY = 0;
  let hueShift = 0;

  const params = {
    tileSize: 90,
    gapSize: 0,
    colorDepth: 100,
    bandStrength: 100,
    squareStrength: 100,
    lineStrength: 0,
    speed: 7
  };

  async function toggleFullscreen() {
    try {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    } catch (error) {
      console.log('Fullscreen is not available:', error);
    }
  }

  window.addEventListener('pointerdown', event => {
    isDragging = true;
    didDrag = false;
    lastX = event.clientX;
    lastY = event.clientY;
  });

  window.addEventListener('pointermove', event => {
    if (!isDragging) return;

    const dx = event.clientX - lastX;
    const dy = event.clientY - lastY;
    const dist = Math.hypot(dx, dy);

    hueShift = (hueShift + dx * 0.75 + dy * 0.35) % 360;

    if (dist > 3) {
      didDrag = true;
    }

    lastX = event.clientX;
    lastY = event.clientY;
  });

  window.addEventListener('pointerup', () => {
    if (!isDragging) return;
    isDragging = false;

    if (!didDrag) {
      toggleFullscreen();
    }
  });

  window.addEventListener('pointercancel', () => {
    isDragging = false;
  });

  function resize() {
    dpr = Math.min(2, window.devicePixelRatio || 1);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener('resize', resize);
  resize();

  function drawHologram(x, y, sw, sh) {
    const cx = x + sw * 0.5;
    const cy = y + sh * 0.5;

    ctx.save();

    ctx.fillStyle = '#000';
    ctx.fillRect(x, y, sw, sh);

    const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(sw, sh) * 0.75);
    bg.addColorStop(0.0, 'rgba(25, 0, 45, 0.35)');
    bg.addColorStop(0.55, 'rgba(0, 0, 0, 0.15)');
    bg.addColorStop(1.0, 'rgba(0, 0, 0, 0.75)');
    ctx.fillStyle = bg;
    ctx.fillRect(x, y, sw, sh);

    ctx.globalCompositeOperation = 'source-over';

    for (let i = 0; i < 22; i++) {
      const angle = i * 0.41;
      const dx = Math.cos(angle) * sw;
      const dy = Math.sin(angle) * sh;
      const p = (Math.sin(t * 0.28 + i * 0.9) + 1) * 0.5;
      const bandAlpha = params.bandStrength / 100;
      const depth = params.colorDepth / 100;

      const g = ctx.createLinearGradient(cx - dx, cy - dy, cx + dx, cy + dy);
      g.addColorStop(0.00, `hsla(${(i * 31 + t * 28 + hueShift) % 360}, 100%, 32%, 0.00)`);
      g.addColorStop(Math.max(0, p - 0.28), `hsla(${(i * 31 + 80 + t * 42 + hueShift) % 360}, 100%, ${26 + depth * 12}%, ${0.42 * bandAlpha})`);
      g.addColorStop(p, `hsla(${(i * 31 + 170 + t * 55 + hueShift) % 360}, 100%, ${28 + depth * 12}%, ${0.88 * bandAlpha})`);
      g.addColorStop(Math.min(1, p + 0.28), `hsla(${(i * 31 + 260 + t * 42 + hueShift) % 360}, 100%, ${26 + depth * 12}%, ${0.42 * bandAlpha})`);
      g.addColorStop(1.00, `hsla(${(i * 31 + 320 + t * 28 + hueShift) % 360}, 100%, 32%, 0.00)`);

      ctx.fillStyle = g;
      ctx.globalAlpha = 0.9;
      ctx.fillRect(x, y, sw, sh);
      ctx.globalAlpha = 1;
    }

    ctx.globalCompositeOperation = 'source-over';
    const linePower = params.lineStrength / 100;
    for (let yy = 0; yy < sh; yy += 2) {
      const hue = (yy * 0.55 + t * 28 + hueShift) % 360;
      ctx.fillStyle = `hsla(${hue}, 100%, ${26 + (params.colorDepth / 100) * 12}%, ${0.11 * linePower})`;
      ctx.fillRect(x, y + yy, sw, 1);
    }

    const tile = params.tileSize;
    const gap = params.gapSize;
    const s = Math.max(1, tile - gap);

    for (let yy = y - tile; yy < y + sh + tile; yy += tile) {
      for (let xx = x - tile; xx < x + sw + tile; xx += tile) {
        const cx2 = xx + tile * 0.5;
        const cy2 = yy + tile * 0.5;
        const n = Math.sin(cx2 * 0.031 + cy2 * 0.019) + Math.sin(cx2 * 0.011 - cy2 * 0.047);
        const blink = Math.max(0, Math.sin(t * 0.8 + cx2 * 0.021 + cy2 * 0.017));
        const squarePower = params.squareStrength / 100;
        const alpha = (0.13 + Math.max(0, n) * 0.16 + blink * 0.12) * squarePower;
        const hue = (cx2 * 0.42 + cy2 * 0.36 + t * 70 + n * 80 + hueShift) % 360;
        const depth2 = params.colorDepth / 100;

        const localAngle = Math.sin(cx2 * 0.013 + cy2 * 0.017) * Math.PI + Math.sin(t * 0.28 + cx2 * 0.007 - cy2 * 0.009) * 0.55;
        const gx = Math.cos(localAngle) * s * 0.5;
        const gy = Math.sin(localAngle) * s * 0.5;
        const g = ctx.createLinearGradient(cx2 - gx, cy2 - gy, cx2 + gx, cy2 + gy);
        g.addColorStop(0.00, `hsla(${hue}, 100%, ${22 + depth2 * 10}%, ${alpha * 0.55})`);
        g.addColorStop(0.45, `hsla(${(hue + 70) % 360}, 100%, ${26 + depth2 * 14}%, ${alpha})`);
        g.addColorStop(1.00, `hsla(${(hue + 180) % 360}, 100%, ${22 + depth2 * 10}%, ${alpha * 0.65})`);

        ctx.fillStyle = g;
        ctx.fillRect(xx + gap * 0.5, yy + gap * 0.5, s, s);
      }
    }

    ctx.restore();
  }

  function draw() {
    t += 0.004 + params.speed * 0.0008;

    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    drawHologram(0, 0, w, h);

    requestAnimationFrame(draw);
  }

  draw();
})();
</script>
</body>
</html>
