<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Spring Sunshine</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #040405;
      user-select: none;
      touch-action: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      background: #040405;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { alpha: false });

    const referenceWidth = 1240;
    const referenceHeight = 580;

    const baseSize = 128;
    const baseScale = 2.0;
    const stretchAmount = 0.12;
    const cellOpacity = 0.155;
    const scrollSpeed = 0.052;
    const animationDuration = 42000;

    const colors = [
      "rgba(255, 252, 232, 1)",
      "rgba(255, 241, 151, 1)",
      "rgba(255, 214, 161, 1)",
      "rgba(255, 184, 218, 1)",
      "rgba(213, 255, 190, 1)",
      "rgba(167, 246, 221, 1)",
      "rgba(150, 220, 255, 1)",
      "rgba(197, 194, 255, 1)"
    ];

    let width = 0;
    let height = 0;
    let dpr = 1;
    let scaledSize = baseSize;
    let columns = 0;
    let rows = 0;
    let horizontalPadding = 0;
    let gridHeight = 0;
    let y = 0;

    let lastTime = performance.now();
    let turnStartTime = performance.now();

    let startX = 2;
    let startY = 2;
    let stretchX = 2.16;
    let stretchY = 2.08;
    let endX = 2;
    let endY = 2;
    let currentScaleX = 2;
    let currentScaleY = 2;

    let expandDuration = animationDuration;
    let expandedHoldDuration = animationDuration * 0.8;
    let shrinkDuration = animationDuration;
    let shrunkenHoldDuration = animationDuration * 0.8;
    let pulseDuration = expandDuration + expandedHoldDuration + shrinkDuration + shrunkenHoldDuration;

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function easeInOutSine(t) {
      return (1 - Math.cos(t * Math.PI)) * 0.5;
    }

    function colorForCell(col, row) {
      const seed = col * 37.17 + row * 91.73;
      const pseudoRandom = Math.abs(Math.sin(seed * 12.9898) * 43758.5453);
      return colors[Math.floor(pseudoRandom) % colors.length];
    }

    function randomBaseScale() {
      return {
        x: baseScale * randomRange(0.92, 1.08),
        y: baseScale * randomRange(0.92, 1.08),
      };
    }

    function setNextTurnShape() {
      startX = endX;
      startY = endY;
      stretchX = startX + (randomRange(1.6, 3.2) - startX) * stretchAmount;
      stretchY = startY + (randomRange(1.5, 3.0) - startY) * stretchAmount;
      const nextBase = randomBaseScale();
      endX = nextBase.x;
      endY = nextBase.y;
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = Math.max(window.innerWidth, document.documentElement.clientWidth);
      height = Math.max(window.innerHeight, document.documentElement.clientHeight);

      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const scale = Math.min(width / referenceWidth, height / referenceHeight);
      scaledSize = Math.max(20, baseSize * scale);
      horizontalPadding = scaledSize * 8;
      columns = Math.ceil((width + horizontalPadding) / scaledSize) + 4;
      rows = Math.ceil(height / scaledSize) + 36;
      gridHeight = rows * scaledSize;
      y = ((y % gridHeight) + gridHeight) % gridHeight;
    }

    function updatePulse(now) {
      let turnTime = now - turnStartTime;

      if (turnTime >= pulseDuration) {
        turnStartTime = now;
        setNextTurnShape();
        turnTime = 0;
      }

      if (turnTime < expandDuration) {
        const t = easeInOutSine(turnTime / expandDuration);
        currentScaleX = lerp(startX, stretchX, t);
        currentScaleY = lerp(startY, stretchY, t);
      } else if (turnTime < expandDuration + expandedHoldDuration) {
        currentScaleX = stretchX;
        currentScaleY = stretchY;
      } else if (turnTime < expandDuration + expandedHoldDuration + shrinkDuration) {
        const t = easeInOutSine((turnTime - expandDuration - expandedHoldDuration) / shrinkDuration);
        currentScaleX = lerp(stretchX, endX, t);
        currentScaleY = lerp(stretchY, endY, t);
      } else {
        currentScaleX = endX;
        currentScaleY = endY;
      }
    }

    function drawCell(x, yPosition, color, scaleX, scaleY) {
      ctx.save();
      ctx.translate(x + scaledSize / 2, yPosition + scaledSize / 2);
      ctx.rotate(Math.PI / 4);
      ctx.scale(scaleX, scaleY);
      ctx.globalAlpha = cellOpacity;
      ctx.fillStyle = color;
      ctx.fillRect(-scaledSize / 2, -scaledSize / 2, scaledSize, scaledSize);
      ctx.restore();
    }

    function drawGrid(offsetY, now) {
      const startX = -horizontalPadding / 2;
      for (let row = 0; row < rows; row++) {
        const yPosition = offsetY + row * scaledSize;
        if (yPosition > height + scaledSize * 4 || yPosition < -scaledSize * 8) continue;

        for (let col = 0; col < columns; col++) {
          const x = startX + col * scaledSize;
          if (x > width + scaledSize * 4 || x < -scaledSize * 8) continue;

          const drift = Math.sin((row * 0.17 + col * 0.11) + now * 0.000025) * 0.035;
          drawCell(x, yPosition, colorForCell(col, row), currentScaleX + drift, currentScaleY - drift);
        }
      }
    }

    function animate(now) {
      const delta = Math.min(32, now - lastTime);
      lastTime = now;

      updatePulse(now);
      y += scrollSpeed * (delta / 30);
      if (y >= gridHeight) y -= gridHeight;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#040405";
      ctx.fillRect(0, 0, width, height);

      ctx.globalCompositeOperation = "lighter";
      drawGrid(y - gridHeight, now);
      drawGrid(y, now);
      drawGrid(y + gridHeight, now);
      ctx.globalCompositeOperation = "source-over";

      const veil = ctx.createRadialGradient(width * 0.5, height * 0.45, 0, width * 0.5, height * 0.45, Math.max(width, height) * 0.72);
      veil.addColorStop(0.0, "rgba(255, 245, 210, 0.035)");
      veil.addColorStop(0.55, "rgba(255, 245, 210, 0.012)");
      veil.addColorStop(1.0, "rgba(0, 0, 0, 0.18)");
      ctx.fillStyle = veil;
      ctx.fillRect(0, 0, width, height);

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
      y = 0;
      resize();
    });

    window.addEventListener("pointerdown", () => {
      const element = document.documentElement;
      if (!document.fullscreenElement && element.requestFullscreen) {
        element.requestFullscreen().catch(() => {});
      }
    });

    const initialBase = randomBaseScale();
    startX = initialBase.x;
    startY = initialBase.y;
    endX = initialBase.x;
    endY = initialBase.y;
    setNextTurnShape();
    resize();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
