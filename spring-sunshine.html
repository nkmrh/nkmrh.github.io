<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Spring Sunshine Canvas</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      user-select: none;
      touch-action: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const referenceWidth = 1240;
    const referenceHeight = 580;

    const baseSize = 128;
    const density = 1;
    const baseScale = 2;
    const stretchAmount = 0.25;
    const cellOpacity = 0.19;
    const rippleSize = 0.4;
    const scrollSpeed = 0.6;

    let width = 0;
    let height = 0;
    let dpr = 1;
    let scaledSize = baseSize;
    let columns = 0;
    let rows = 0;
    let horizontalPadding = 0;
    let gridHeight = 0;
    let y = 0;

    let lastTime = performance.now();
    let turnStartTime = performance.now();

    let animationDuration = 5000;
    let expandDuration = animationDuration;
    let expandedHoldDuration = animationDuration;
    let shrinkDuration = animationDuration;
    let shrunkenHoldDuration = animationDuration;
    let pulseDuration = expandDuration + expandedHoldDuration + shrinkDuration + shrunkenHoldDuration;

    let startX = 2;
    let startY = 2;
    let stretchX = 2.5;
    let stretchY = 2.2;
    let endX = 2;
    let endY = 2;
    let currentScaleX = 2;
    let currentScaleY = 2;

    let isPointerDown = false;
    let lastRippleX = 0;
    let lastRippleY = 0;
    let lastRippleTime = 0;
    const ripples = [];

    let audioContext = null;
    let bgmStarted = false;
    let bgmStep = 0;
    const bgmNodes = [];

    const colors = [
      "rgba(255, 255, 255, 1)",
      "rgba(0, 101, 153, 1)",
      "rgba(0, 255, 203, 1)",
      "rgba(153, 255, 153, 1)",
      "rgba(153, 101, 255, 1)",
      "rgba(153, 0, 204, 1)",
      "rgba(255, 153, 255, 1)",
      "rgba(255, 204, 153, 1)",
      "rgba(255, 255, 50, 1)",
      "rgba(101, 152, 255, 1)",
      "rgba(255, 0, 204, 1)",
      "rgba(255, 0, 102, 1)",
      "rgba(102, 51, 102, 1)",
      "rgba(153, 204, 0, 1)"
    ];

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function colorForCell(col, row) {
      const seed = col * 37.17 + row * 91.73;
      const pseudoRandom = Math.abs(Math.sin(seed * 12.9898) * 43758.5453);
      const colorIndex = Math.floor(pseudoRandom) % colors.length;
      return colors[colorIndex];
    }

    function randomBaseScale() {
      return {
        x: baseScale * randomRange(0.72, 1.28),
        y: baseScale * randomRange(0.72, 1.28),
      };
    }

    function setNextTurnShape() {
      startX = endX;
      startY = endY;
      stretchX = startX + (randomRange(1.4, 5.2) - startX) * stretchAmount;
      stretchY = startY + (randomRange(1.0, 4.2) - startY) * stretchAmount;
      const nextBase = randomBaseScale();
      endX = nextBase.x;
      endY = nextBase.y;
    }

    function randomizeTurnDuration() {
      const factor = randomRange(0.85, 1.18);
      const duration = animationDuration * factor;
      expandDuration = duration;
      expandedHoldDuration = duration;
      shrinkDuration = duration;
      shrunkenHoldDuration = duration;
      pulseDuration = expandDuration + expandedHoldDuration + shrinkDuration + shrunkenHoldDuration;
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function resize() {
      dpr = window.devicePixelRatio || 1;

      width = Math.max(
        window.innerWidth,
        document.documentElement.clientWidth,
        window.visualViewport ? window.visualViewport.width : 0
      );
      height = Math.max(
        window.innerHeight,
        document.documentElement.clientHeight,
        window.visualViewport ? window.visualViewport.height : 0
      );

      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const scale = Math.min(width / referenceWidth, height / referenceHeight);
      scaledSize = Math.max(18, baseSize * scale);
      horizontalPadding = scaledSize * 8;
      columns = Math.ceil((width + horizontalPadding) / scaledSize) + 4;
      rows = Math.ceil(height / scaledSize) + 36;
      gridHeight = rows * scaledSize;
      y = ((y % gridHeight) + gridHeight) % gridHeight;
    }

    function wrapPosition() {
      if (y >= gridHeight) y -= gridHeight;
      if (y < 0) y += gridHeight;
    }

    function getAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;
      if (!audioContext) audioContext = new AudioContextClass();
      audioContext.resume().catch(() => {});
      return audioContext;
    }

    function startBgm() {
      const audio = getAudioContext();
      if (!audio || bgmStarted) return;
      bgmStarted = true;
      audio.resume().catch(() => {});

      const master = audio.createGain();
      const filter = audio.createBiquadFilter();
      const delay = audio.createDelay(1.2);
      const delayGain = audio.createGain();
      const feedback = audio.createGain();

      master.gain.value = 0.08;
      filter.type = "lowpass";
      filter.frequency.value = 2400;
      filter.Q.value = 0.6;
      delay.delayTime.value = 0.48;
      delayGain.gain.value = 0.18;
      feedback.gain.value = 0.22;

      master.connect(filter);
      filter.connect(audio.destination);
      filter.connect(delay);
      delay.connect(delayGain);
      delayGain.connect(audio.destination);
      delay.connect(feedback);
      feedback.connect(delay);

      const chordSets = [
        [261.63, 329.63, 392.0, 523.25],
        [293.66, 349.23, 440.0, 587.33],
        [329.63, 392.0, 493.88, 659.25],
        [349.23, 440.0, 523.25, 698.46]
      ];

      function playPadChord() {
        const chord = chordSets[bgmStep % chordSets.length];
        const start = audio.currentTime;
        bgmStep += 1;

        chord.forEach((freq, index) => {
          const osc = audio.createOscillator();
          const gain = audio.createGain();
          const pan = audio.createStereoPanner ? audio.createStereoPanner() : null;

          osc.type = "sine";
          osc.frequency.setValueAtTime(freq * randomRange(0.995, 1.005), start);
          osc.detune.value = randomRange(-4, 4);

          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.linearRampToValueAtTime(0.035 - index * 0.004, start + 1.2);
          gain.gain.linearRampToValueAtTime(0.018, start + 5.2);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + 7.2);

          if (pan) {
            pan.pan.value = -0.45 + index * 0.3;
            osc.connect(gain);
            gain.connect(pan);
            pan.connect(master);
            bgmNodes.push(osc, gain, pan);
          } else {
            osc.connect(gain);
            gain.connect(master);
            bgmNodes.push(osc, gain);
          }

          osc.start(start);
          osc.stop(start + 7.5);
        });
      }

      playPadChord();
      bgmNodes.push(setInterval(playPadChord, 5600));
      bgmNodes.push(master, filter, delay, delayGain, feedback);
    }

    function enterFullscreen() {
      if (document.fullscreenElement) return;
      const element = document.documentElement;
      if (element.requestFullscreen) {
        element.requestFullscreen().catch(() => {});
      } else if (element.webkitRequestFullscreen) {
        element.webkitRequestFullscreen();
      }
    }

    function addRipple(x, yPosition) {
      ripples.push({ x, y: yPosition, startTime: performance.now() });
      if (ripples.length > 8) ripples.shift();
    }

    function updatePulse(now) {
      let turnTime = now - turnStartTime;

      if (turnTime >= pulseDuration) {
        turnStartTime = now;
        setNextTurnShape();
        randomizeTurnDuration();
        turnTime = 0;
      }

      if (turnTime < expandDuration) {
        const phase = turnTime / expandDuration;
        const ease = (1 - Math.cos(phase * Math.PI)) * 0.5;
        currentScaleX = lerp(startX, stretchX, ease);
        currentScaleY = lerp(startY, stretchY, ease);
      } else if (turnTime < expandDuration + expandedHoldDuration) {
        currentScaleX = stretchX;
        currentScaleY = stretchY;
      } else if (turnTime < expandDuration + expandedHoldDuration + shrinkDuration) {
        const phase = (turnTime - expandDuration - expandedHoldDuration) / shrinkDuration;
        const ease = (1 - Math.cos(phase * Math.PI)) * 0.5;
        currentScaleX = lerp(stretchX, endX, ease);
        currentScaleY = lerp(stretchY, endY, ease);
      } else {
        currentScaleX = endX;
        currentScaleY = endY;
      }
    }

    function rippleAt(x, yPosition, now) {
      const waveSpeed = 0.55;
      const waveWidth = scaledSize * 1.8 * rippleSize;
      const maxAge = 2200;
      let value = 0;

      for (let i = ripples.length - 1; i >= 0; i--) {
        const ripple = ripples[i];
        const age = now - ripple.startTime;
        if (age > maxAge) {
          ripples.splice(i, 1);
          continue;
        }

        const radius = age * waveSpeed;
        const dx = x - ripple.x;
        const dy = yPosition - ripple.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const wave = Math.exp(-Math.pow((distance - radius) / waveWidth, 2));
        const fade = Math.max(0, 1 - age / maxAge);
        value += wave * fade * 0.85 * rippleSize;
      }

      return value;
    }

    function drawCell(x, yPosition, color, scaleX, scaleY) {
      ctx.save();
      ctx.translate(x + scaledSize / 2, yPosition + scaledSize / 2);
      ctx.rotate(Math.PI / 4);
      ctx.scale(scaleX, scaleY);
      ctx.globalAlpha = cellOpacity;
      ctx.fillStyle = color;
      ctx.fillRect(-scaledSize / 2, -scaledSize / 2, scaledSize, scaledSize);
      ctx.restore();
    }

    function drawGrid(offsetY, now) {
      const startX = -horizontalPadding / 2;

      for (let row = 0; row < rows; row++) {
        const yPosition = offsetY + row * scaledSize;
        if (yPosition > height + scaledSize * 4 || yPosition < -scaledSize * 8) continue;

        for (let col = 0; col < columns; col++) {
          const x = startX + col * scaledSize;
          if (x > width + scaledSize * 4 || x < -scaledSize * 8) continue;

          const cx = x + scaledSize / 2;
          const cy = yPosition + scaledSize / 2;
          const ripple = rippleAt(cx, cy, now);
          drawCell(x, yPosition, colorForCell(col, row), currentScaleX + ripple, currentScaleY + ripple);
        }
      }
    }

    function animate(now) {
      const delta = Math.min(32, now - lastTime);
      lastTime = now;

      updatePulse(now);
      y += scrollSpeed * (delta / 30);
      wrapPosition();

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);

      ctx.globalCompositeOperation = "lighter";
      drawGrid(y - gridHeight, now);
      drawGrid(y, now);
      drawGrid(y + gridHeight, now);
      ctx.globalCompositeOperation = "source-over";

      requestAnimationFrame(animate);
    }

    function pointerDown(event) {
      enterFullscreen();
      isPointerDown = true;
      lastRippleX = event.clientX;
      lastRippleY = event.clientY;
      lastRippleTime = performance.now();
      startBgm();
      addRipple(event.clientX, event.clientY);
      event.preventDefault();
    }

    function pointerMove(event) {
      if (!isPointerDown) return;

      const now = performance.now();
      const dx = event.clientX - lastRippleX;
      const dy = event.clientY - lastRippleY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance > scaledSize * 0.35 || now - lastRippleTime > 140) {
        addRipple(event.clientX, event.clientY);
        lastRippleX = event.clientX;
        lastRippleY = event.clientY;
        lastRippleTime = now;
      }

      event.preventDefault();
    }

    function pointerUp() {
      isPointerDown = false;
    }

    let lastWindowWidth = window.innerWidth;
    window.addEventListener("resize", () => {
      const widthDiff = Math.abs(window.innerWidth - lastWindowWidth);
      if (widthDiff > 80) {
        lastWindowWidth = window.innerWidth;
        y = 0;
        resize();
      }
    });

    document.addEventListener("fullscreenchange", () => {
      setTimeout(() => {
        y = 0;
        resize();
      }, 80);
    });

    document.addEventListener("webkitfullscreenchange", () => {
      setTimeout(() => {
        y = 0;
        resize();
      }, 80);
    });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => {
        lastWindowWidth = window.innerWidth;
        y = 0;
        resize();
      }, 300);
    });

    window.addEventListener("pointerdown", pointerDown);
    window.addEventListener("pointermove", pointerMove);
    window.addEventListener("pointerup", pointerUp);
    window.addEventListener("pointercancel", pointerUp);

    const initialBase = randomBaseScale();
    startX = initialBase.x;
    startY = initialBase.y;
    endX = initialBase.x;
    endY = initialBase.y;
    setNextTurnShape();
    randomizeTurnDuration();
    resize();
    startBgm();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
