<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rose Network</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050508;
      touch-action: none;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #050508;
      cursor: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let dpr = 1;
    let t = 0;

    const TAU = Math.PI * 2;

    const params = {
      speed: 0.65,
      n: 5.1,
      d: 3.25,
      drift: 0.45,
      dots: 150,
      lines: 0.30,
      opacity: 0.40,
      blend: "lighter"
    };

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resize);
    resize();

    window.addEventListener("pointerdown", () => {
      document.documentElement.requestFullscreen?.();
    });

    function draw() {
      t += 0.006 * params.speed;

      ctx.fillStyle = "rgba(5, 5, 8, 0.26)";
      ctx.fillRect(0, 0, w, h);

      const cx = w * 0.5;
      const cy = h * 0.5;
      const scale = Math.min(w, h) * 0.42;
      const phase = t * 0.45;

      const n = params.n
        + Math.sin(t * 0.20) * params.drift
        + Math.sin(t * 0.09 + 2.4) * params.drift * 0.35;

      const d = params.d
        + Math.cos(t * 0.16 + 1.2) * params.drift * 0.72
        + Math.sin(t * 0.07 + 2.0) * params.drift * 0.28;

      const ratio = n / Math.max(0.2, d);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(t * 0.08);
      ctx.globalCompositeOperation = params.blend;

      const pts = [];

      for (let i = 0; i < params.dots; i++) {
        const u = i / params.dots;
        const theta = u * TAU * 10;
        const localRatio = ratio + Math.sin(u * TAU + t * 0.7) * params.drift * 0.008;
        const rose = Math.cos(localRatio * theta + phase);
        const r = Math.abs(rose) * scale;

        const pulse = 1 + Math.sin(t * 2 + i * 0.031) * 0.045;
        const x = Math.cos(theta) * r * pulse;
        const y = Math.sin(theta) * r * pulse;

        pts.push({ x, y, r });
      }

      const minConnectR = scale * 0.12;
      const valid = pts.filter(p => p.r >= minConnectR);

      ctx.lineWidth = 0.18 * params.lines;

      for (let a = 0; a < valid.length; a++) {
        const pa = valid[a];

        for (let b = a + 1; b < valid.length; b++) {
          const pb = valid[b];

          const hue = Math.random() * 360;
          const light = 58 + Math.random() * 24;
          ctx.strokeStyle = `hsla(${hue} 100% ${light}% / ${params.opacity * params.lines})`;

          ctx.beginPath();
          ctx.moveTo(pa.x, pa.y);
          ctx.lineTo(pb.x, pb.y);
          ctx.stroke();
        }
      }

      ctx.globalCompositeOperation = "source-over";
      ctx.restore();

      requestAnimationFrame(draw);
    }

    ctx.fillStyle = "#050508";
    ctx.fillRect(0, 0, w, h);
    draw();
  </script>
</body>
</html>
