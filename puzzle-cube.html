<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Puzzle Cube</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; user-select:none; touch-action:none; }
    canvas { position:fixed; inset:0; display:block; width:100vw; height:100dvh; min-height:100vh; background:#000; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let width=0,height=0,dpr=1;
let pointerActive=false,lastDragX=0,lastDragY=0;
let manualRotationX=0,manualRotationY=0,rotationVelocityX=0,rotationVelocityY=0;
const rotationDamping=0.995;
let beatBoost=0;
const cubelets=[];
let activeMove=null,nextMoveTime=0,sequence=[],solveSequence=[],sequenceIndex=0,mode='scramble';
const cubeSpacing=0.72;
const solvedColors={right:'#b71234',left:'#ff5800',top:'#ffffff',bottom:'#ffd500',front:'#009b48',back:'#0046ad',inside:'#111111'};
function randomRange(min,max){return min+Math.random()*(max-min)}
function easeInOutSine(t){return -(Math.cos(Math.PI*t)-1)/2}
function resize(){
  dpr=Math.min(2,window.devicePixelRatio||1);
  width=Math.max(window.innerWidth,document.documentElement.clientWidth,window.visualViewport?window.visualViewport.width:0);
  height=Math.max(window.innerHeight,document.documentElement.clientHeight,window.visualViewport?window.visualViewport.height:0);
  canvas.width=Math.floor(width*dpr); canvas.height=Math.floor(height*dpr);
  canvas.style.width=`${width}px`; canvas.style.height=`${height}px`;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(cubelets.length===0) buildCube();
}
function buildCube(){
  cubelets.length=0;
  for(let x=-1;x<=1;x++)for(let y=-1;y<=1;y++)for(let z=-1;z<=1;z++){
    cubelets.push({grid:{x,y,z},stickers:{
      right:x===1?solvedColors.right:solvedColors.inside,
      left:x===-1?solvedColors.left:solvedColors.inside,
      top:y===-1?solvedColors.top:solvedColors.inside,
      bottom:y===1?solvedColors.bottom:solvedColors.inside,
      front:z===1?solvedColors.front:solvedColors.inside,
      back:z===-1?solvedColors.back:solvedColors.inside
    }});
  }
  resetSequence();
}
function rotateXPoint(p,q){let {x,y,z}=p;const turns=((q%4)+4)%4;for(let i=0;i<turns;i++){const ny=-z,nz=y;y=ny;z=nz}return{x,y,z}}
function rotateYPoint(p,q){let {x,y,z}=p;const turns=((q%4)+4)%4;for(let i=0;i<turns;i++){const nx=z,nz=-x;x=nx;z=nz}return{x,y,z}}
function rotateZPoint(p,q){let {x,y,z}=p;const turns=((q%4)+4)%4;for(let i=0;i<turns;i++){const nx=-y,ny=x;x=nx;y=ny}return{x,y,z}}
function rotateStickerMap(stickers,axis,q){
  const faceVector={right:{x:1,y:0,z:0},left:{x:-1,y:0,z:0},top:{x:0,y:-1,z:0},bottom:{x:0,y:1,z:0},front:{x:0,y:0,z:1},back:{x:0,y:0,z:-1}};
  const vectorFace={'1,0,0':'right','-1,0,0':'left','0,-1,0':'top','0,1,0':'bottom','0,0,1':'front','0,0,-1':'back'};
  const next={};
  for(const [face,color] of Object.entries(stickers)){
    const v=faceVector[face]; let r=v;
    if(axis==='x')r=rotateXPoint(v,q); if(axis==='y')r=rotateYPoint(v,q); if(axis==='z')r=rotateZPoint(v,q);
    next[vectorFace[`${r.x},${r.y},${r.z}`]]=color;
  }
  return next;
}
function createScrambleSequence(count=10){
  const axes=['x','y','z'],layers=[-1,0,1],moves=[]; let prev=null;
  for(let i=0;i<count;i++){
    let m; do{m={axis:axes[Math.floor(Math.random()*axes.length)],layer:layers[Math.floor(Math.random()*layers.length)],direction:Math.random()<0.5?-1:1}}while(prev&&m.axis===prev.axis&&m.layer===prev.layer);
    moves.push(m); prev=m;
  }
  return moves;
}
function resetSequence(){
  sequence=createScrambleSequence(10);
  solveSequence=sequence.slice().reverse().map(m=>({axis:m.axis,layer:m.layer,direction:-m.direction}));
  sequenceIndex=0; mode='scramble'; activeMove=null; nextMoveTime=performance.now()+500;
}
function startRubikMove(now){
  if(activeMove||mode==='done')return;
  const moves=mode==='solve'?solveSequence:sequence; const m=moves[sequenceIndex]; if(!m)return;
  activeMove={axis:m.axis,layer:m.layer,direction:m.direction,startTime:now,duration:170};
}
function finishRubikMove(){
  if(!activeMove)return;
  const {axis,layer,direction}=activeMove;
  for(const c of cubelets){
    if(c.grid[axis]!==layer)continue;
    if(axis==='x')c.grid=rotateXPoint(c.grid,direction); if(axis==='y')c.grid=rotateYPoint(c.grid,direction); if(axis==='z')c.grid=rotateZPoint(c.grid,direction);
    c.stickers=rotateStickerMap(c.stickers,axis,direction);
  }
  activeMove=null; sequenceIndex++;
  const len=mode==='solve'?solveSequence.length:sequence.length;
  if(sequenceIndex>=len){
    if(mode==='scramble'){mode='solve';sequenceIndex=0;nextMoveTime=performance.now()+220}
    else{mode='done';sequenceIndex=0;nextMoveTime=performance.now()+1200}
  }else nextMoveTime=performance.now()+55;
}
function enterFullscreen(){const e=document.documentElement;if(document.fullscreenElement)return;if(e.requestFullscreen)e.requestFullscreen().catch(()=>{});else if(e.webkitRequestFullscreen)e.webkitRequestFullscreen()}
function rotateX(p,a){const c=Math.cos(a),s=Math.sin(a);return{x:p.x,y:p.y*c-p.z*s,z:p.y*s+p.z*c}}
function rotateY(p,a){const c=Math.cos(a),s=Math.sin(a);return{x:p.x*c+p.z*s,y:p.y,z:-p.x*s+p.z*c}}
function rotateZ(p,a){const c=Math.cos(a),s=Math.sin(a);return{x:p.x*c-p.y*s,y:p.x*s+p.y*c,z:p.z}}
function transformPoint(p,r){let q=rotateX(p,r.x);q=rotateY(q,r.y);q=rotateZ(q,r.z);return q}
function project(p,scale){const camera=7.8,perspective=camera/(camera+p.z);return{x:width*.5+p.x*scale*perspective,y:height*.5+p.y*scale*perspective,z:p.z,perspective}}
function shade(hex,amount){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;r=Math.max(0,Math.min(255,r+amount));g=Math.max(0,Math.min(255,g+amount));b=Math.max(0,Math.min(255,b+amount));return`rgb(${r}, ${g}, ${b})`}
function polygonCenter(points){let x=0,y=0,z=0;points.forEach(p=>{x+=p.x;y+=p.y;z+=p.z});return{x:x/points.length,y:y/points.length,z:z/points.length}}
function normalOfFace(points){const a=points[0],b=points[1],c=points[2];const ux=b.x-a.x,uy=b.y-a.y,uz=b.z-a.z;const vx=c.x-a.x,vy=c.y-a.y,vz=c.z-a.z;return{x:uy*vz-uz*vy,y:uz*vx-ux*vz,z:ux*vy-uy*vx}}
function drawFace(face,scale){
  const normal=normalOfFace(face.points); if(normal.z<=-0.02)return;
  const projected=face.points.map(p=>project(p,scale));
  const len=Math.sqrt(normal.x*normal.x+normal.y*normal.y+normal.z*normal.z)||1;
  const nx=normal.x/len,ny=normal.y/len,nz=normal.z/len;
  const light={x:-0.45,y:-0.75,z:0.9}; const ll=Math.sqrt(light.x*light.x+light.y*light.y+light.z*light.z);
  const diffuse=Math.max(0,nx*light.x/ll+ny*light.y/ll+nz*light.z/ll);
  const shadeAmount=Math.floor(((0.30+diffuse*0.82)-0.62)*145);
  ctx.beginPath(); projected.forEach((p,i)=>{if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y)}); ctx.closePath();
  ctx.fillStyle=shade(face.color,shadeAmount); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.84)'; ctx.lineWidth=Math.max(1.2,scale*0.014); ctx.stroke();
  ctx.strokeStyle=`rgba(255,255,255,${0.045+diffuse*0.07})`; ctx.lineWidth=Math.max(0.5,scale*0.004); ctx.stroke();
}
function cubeletFaces(cubelet,rotation,cubeSize,scale,now){
  let extraRotation={x:0,y:0,z:0};
  if(activeMove&&cubelet.grid[activeMove.axis]===activeMove.layer){
    const raw=Math.min(1,(now-activeMove.startTime)/activeMove.duration); const progress=easeInOutSine(raw); const angle=activeMove.direction*progress*Math.PI/2;
    if(activeMove.axis==='x')extraRotation.x=angle; if(activeMove.axis==='y')extraRotation.y=angle; if(activeMove.axis==='z')extraRotation.z=angle;
  }
  let center={x:cubelet.grid.x*cubeSpacing,y:cubelet.grid.y*cubeSpacing,z:cubelet.grid.z*cubeSpacing};
  if(activeMove&&cubelet.grid[activeMove.axis]===activeMove.layer){const raw=Math.min(1,Math.max(0,(now-activeMove.startTime)/activeMove.duration));const lift=Math.sin(raw*Math.PI)*0.018;center[activeMove.axis]+=activeMove.layer*lift;}
  center=transformPoint(center,extraRotation);
  const s=cubeSize*.5;
  const corners=[{x:-s,y:-s,z:-s},{x:s,y:-s,z:-s},{x:s,y:s,z:-s},{x:-s,y:s,z:-s},{x:-s,y:-s,z:s},{x:s,y:-s,z:s},{x:s,y:s,z:s},{x:-s,y:s,z:s}].map(p=>{
    const q=transformPoint(p,extraRotation); const local={x:q.x+center.x,y:q.y+center.y,z:q.z+center.z}; return transformPoint(local,rotation);
  });
  const faces=[
    {points:[corners[5],corners[6],corners[2],corners[1]],color:cubelet.stickers.right},
    {points:[corners[4],corners[0],corners[3],corners[7]],color:cubelet.stickers.left},
    {points:[corners[4],corners[5],corners[1],corners[0]],color:cubelet.stickers.top},
    {points:[corners[7],corners[3],corners[2],corners[6]],color:cubelet.stickers.bottom},
    {points:[corners[4],corners[7],corners[6],corners[5]],color:cubelet.stickers.front},
    {points:[corners[0],corners[1],corners[2],corners[3]],color:cubelet.stickers.back}
  ];
  return faces.map(face=>({...face,center:polygonCenter(face.points)}));
}
function drawBackground(){ctx.globalCompositeOperation='source-over';ctx.fillStyle='#000';ctx.fillRect(0,0,width,height)}
function drawCube(now){
  const minSide=Math.min(width,height),scale=minSide*0.18,cubeSize=cubeSpacing*0.995;
  manualRotationX+=rotationVelocityX; manualRotationY+=rotationVelocityY; rotationVelocityX*=rotationDamping; rotationVelocityY*=rotationDamping;
  if(Math.abs(rotationVelocityX)<0.00001)rotationVelocityX=0;if(Math.abs(rotationVelocityY)<0.00001)rotationVelocityY=0;
  const rotation={x:-0.58+Math.sin(now*0.00028)*0.018+manualRotationX,y:0.72+Math.sin(now*0.00026)*0.022+manualRotationY,z:Math.sin(now*0.00032)*0.018+beatBoost*0.08}; beatBoost*=0.92;
  const allFaces=[]; cubelets.forEach(c=>allFaces.push(...cubeletFaces(c,rotation,cubeSize,scale,now))); allFaces.sort((a,b)=>b.center.z-a.center.z);
  ctx.save(); allFaces.forEach(face=>drawFace(face,scale)); ctx.restore();
}
function animate(now){
  if(activeMove){const raw=Math.min(1,(now-activeMove.startTime)/activeMove.duration);if(raw>=1)finishRubikMove();}
  if(!activeMove&&now>nextMoveTime){if(mode==='done')resetSequence();else startRubikMove(now)}
  drawBackground(); drawCube(now); requestAnimationFrame(animate);
}
function pointerDownHandler(event){pointerActive=true;downX=event.clientX;downY=event.clientY;didDrag=false;lastDragX=event.clientX;lastDragY=event.clientY;rotationVelocityX=0;rotationVelocityY=0;beatBoost=0.6;event.preventDefault()}
function pointerMoveHandler(event){if(!pointerActive)return;const dx=event.clientX-lastDragX,dy=event.clientY-lastDragY;manualRotationY-=dx*0.01;manualRotationX-=dy*0.01;rotationVelocityY=-dx*0.0012;rotationVelocityX=-dy*0.0012;lastDragX=event.clientX;lastDragY=event.clientY;event.preventDefault()}
function pointerUpHandler(){if(pointerActive&&!didDrag){enterFullscreen();fullscreenLockUntil=performance.now()+450}pointerActive=false}
window.addEventListener('resize',resize);document.addEventListener('fullscreenchange',()=>setTimeout(resize,80));document.addEventListener('webkitfullscreenchange',()=>setTimeout(resize,80));window.addEventListener('pointerdown',pointerDownHandler);window.addEventListener('pointermove',pointerMoveHandler);window.addEventListener('pointerup',pointerUpHandler);window.addEventListener('pointercancel',pointerUpHandler);
resize();requestAnimationFrame(animate);
</script>
</body>
</html>
