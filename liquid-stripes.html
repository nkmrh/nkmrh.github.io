<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liquid Stripes</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #eefcff;
      touch-action: none;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #eefcff;
      cursor: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let dpr = 1;
    let t = 0;

    const pointer = {
      x: 0.58,
      y: 0.52,
      tx: 0.58,
      ty: 0.52,
      down: false,
      speed: 0
    };

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resize);
    resize();

    function setPointer(e) {
      const p = e.touches ? e.touches[0] : e;
      pointer.tx = p.clientX / w;
      pointer.ty = p.clientY / h;
    }

    window.addEventListener("pointermove", setPointer);
    window.addEventListener("pointerdown", e => {
      pointer.down = true;
      setPointer(e);
      document.documentElement.requestFullscreen?.();
    });
    window.addEventListener("pointerup", () => pointer.down = false);

    function stripeOffset(y, base, amp, phase, cx) {
      const n = y / h;
      const pull = Math.sin(n * Math.PI) * (cx - 0.5) * Math.min(w, h) * 0.22;
      return base
        + Math.sin(n * 7.0 + phase) * amp
        + Math.sin(n * 3.2 - phase * 0.7) * amp * 0.55
        + Math.sin(n * 12.0 + base * 0.012 + phase * 0.45) * amp * 0.18
        + pull;
    }

    function drawStripes(bg, fg) {
      // Draw each stripe as a filled band polygon instead of a thick stroke.
      // This keeps the shape stable on narrow smartphone screens.
      const base = Math.min(w, h);
      const spacing = Math.max(42, Math.min(76, base * 0.13));
      const bandWidth = spacing * 0.58;
      const amp = Math.max(20, Math.min(44, base * 0.07));
      const phase = t * 2;
      const cx = pointer.x;
      const cover = Math.hypot(w, h) + spacing * 4;

      ctx.save();
      ctx.lineJoin = "round";

      for (let baseX = -cover; baseX < w + cover; baseX += spacing) {
        const left = [];
        const right = [];

        for (let y = -40; y <= h + 40; y += 10) {
          const center = stripeOffset(y, baseX, amp, phase, cx);
          left.push([center - bandWidth * 0.5, y]);
          right.push([center + bandWidth * 0.5, y]);
        }

        ctx.beginPath();
        ctx.moveTo(left[0][0], left[0][1]);

        for (let i = 1; i < left.length; i++) {
          ctx.lineTo(left[i][0], left[i][1]);
        }

        for (let i = right.length - 1; i >= 0; i--) {
          ctx.lineTo(right[i][0], right[i][1]);
        }

        ctx.closePath();
        ctx.fillStyle = fg;
        ctx.fill();
      }

      ctx.restore();
    }

    function draw() {
      pointer.x += (pointer.tx - pointer.x) * 0.06;
      pointer.y += (pointer.ty - pointer.y) * 0.06;
      pointer.speed += ((pointer.down ? 0.018 : 0.006) - pointer.speed) * 0.05;
      t += pointer.speed;

      const hue = (pointer.x * 320 + pointer.y * 80 + t * 12) % 360;
      const bg = `hsl(${(hue + 185) % 360} 80% 96%)`;
      const fg = `hsl(${hue} 88% 44%)`;

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      drawStripes(bg, fg);

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
