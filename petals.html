<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Petals</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      user-select: none;
      touch-action: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { alpha: false });

    const referenceWidth = 1240;
    const referenceHeight = 580;

    const baseSize = 128;
    const baseScale = 2.0;
    const stretchAmount = 0.12;
    let cellOpacity = 1.0;
    let cellPresence = 0.289;
    const scrollSpeed = 0.138;
    const animationDuration = 14000;

    const colors = [
      "rgba(255, 255, 238, 1)",
      "rgba(255, 245, 146, 1)",
      "rgba(255, 221, 132, 1)",
      "rgba(255, 193, 162, 1)",
      "rgba(255, 174, 205, 1)",
      "rgba(222, 255, 180, 1)",
      "rgba(176, 248, 216, 1)",
      "rgba(164, 226, 255, 1)"
    ];

    let width = 0;
    let height = 0;
    let dpr = 1;
    let scaledSize = baseSize;
    let columns = 0;
    let rows = 0;
    let horizontalPadding = 0;
    let gridHeight = 0;
    let y = 0;

    let lastTime = performance.now();
    let turnStartTime = performance.now();

    let startX = 2;
    let startY = 2;
    let stretchX = 2.16;
    let stretchY = 2.08;
    let endX = 2;
    let endY = 2;
    let currentScaleX = 2;
    let currentScaleY = 2;

    let expandDuration = animationDuration;
    let expandedHoldDuration = animationDuration * 0.8;
    let shrinkDuration = animationDuration;
    let shrunkenHoldDuration = animationDuration * 0.8;
    let pulseDuration = expandDuration + expandedHoldDuration + shrinkDuration + shrunkenHoldDuration;

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function easeInOutSine(t) {
      return (1 - Math.cos(t * Math.PI)) * 0.5;
    }

    function colorForCell(col, row) {
      const seed = col * 37.17 + row * 91.73;
      const pseudoRandom = Math.abs(Math.sin(seed * 12.9898) * 43758.5453);
      return colors[Math.floor(pseudoRandom) % colors.length];
    }

    function cellRandom(col, row, offset = 0) {
      const seed = col * 127.1 + row * 311.7 + offset * 74.7;
      const value = Math.sin(seed) * 43758.5453123;
      return value - Math.floor(value);
    }

    function randomBaseScale() {
      return {
        x: baseScale * randomRange(0.92, 1.08),
        y: baseScale * randomRange(0.92, 1.08),
      };
    }

    function setNextTurnShape() {
      startX = endX;
      startY = endY;
      stretchX = startX + (randomRange(1.6, 3.2) - startX) * stretchAmount;
      stretchY = startY + (randomRange(1.5, 3.0) - startY) * stretchAmount;
      const nextBase = randomBaseScale();
      endX = nextBase.x;
      endY = nextBase.y;
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = Math.max(window.innerWidth, document.documentElement.clientWidth);
      height = Math.max(window.innerHeight, document.documentElement.clientHeight);

      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const scale = Math.min(width / referenceWidth, height / referenceHeight);
      if (width < 600) {
        scaledSize = Math.max(72, baseSize * scale);
      } else if (width < 1024) {
        scaledSize = Math.max(56, baseSize * scale);
      } else {
        scaledSize = Math.max(44, baseSize * scale);
      }
      horizontalPadding = scaledSize * 8;
      columns = Math.ceil((width + horizontalPadding) / scaledSize) + 4;
      rows = Math.ceil(height / scaledSize) + 36;
      gridHeight = rows * scaledSize;
      y = ((y % gridHeight) + gridHeight) % gridHeight;
    }

    function updatePulse(now) {
      let turnTime = now - turnStartTime;

      if (turnTime >= pulseDuration) {
        turnStartTime = now;
        setNextTurnShape();
        turnTime = 0;
      }

      if (turnTime < expandDuration) {
        const t = easeInOutSine(turnTime / expandDuration);
        currentScaleX = lerp(startX, stretchX, t);
        currentScaleY = lerp(startY, stretchY, t);
      } else if (turnTime < expandDuration + expandedHoldDuration) {
        currentScaleX = stretchX;
        currentScaleY = stretchY;
      } else if (turnTime < expandDuration + expandedHoldDuration + shrinkDuration) {
        const t = easeInOutSine((turnTime - expandDuration - expandedHoldDuration) / shrinkDuration);
        currentScaleX = lerp(stretchX, endX, t);
        currentScaleY = lerp(stretchY, endY, t);
      } else {
        currentScaleX = endX;
        currentScaleY = endY;
      }
    }

    function roundedRectPath(context, x, y, w, h, r) {
      const rr = Math.min(r, w * 0.5, h * 0.5);
      context.beginPath();
      context.moveTo(x + rr, y);
      context.arcTo(x + w, y, x + w, y + h, rr);
      context.arcTo(x + w, y + h, x, y + h, rr);
      context.arcTo(x, y + h, x, y, rr);
      context.arcTo(x, y, x + w, y, rr);
      context.closePath();
    }

    function drawCell(x, yPosition, color, scaleX, scaleY, col, row) {
      const presenceNoise = cellRandom(col, row, 6);
      if (presenceNoise > cellPresence) return;

      const posJitterX = (cellRandom(col, row, 1) - 0.5) * scaledSize * 0.42;
      const posJitterY = (cellRandom(col, row, 2) - 0.5) * scaledSize * 0.42;
      const widthScale = 0.65 + cellRandom(col, row, 3) * 1.0;
      const heightScale = 0.65 + cellRandom(col, row, 4) * 1.0;
      const angleJitter = (cellRandom(col, row, 5) - 0.5) * Math.PI * 0.7;
      const cornerRadius = scaledSize * 0.18;

      ctx.save();
      ctx.translate(x + scaledSize / 2 + posJitterX, yPosition + scaledSize / 2 + posJitterY);
      ctx.rotate(Math.PI / 4 + angleJitter);
      ctx.scale(scaleX * widthScale, scaleY * heightScale);
      ctx.globalAlpha = cellOpacity;
      ctx.fillStyle = color;
      roundedRectPath(ctx, -scaledSize / 2, -scaledSize / 2, scaledSize, scaledSize, cornerRadius);
      ctx.fill();
      ctx.restore();
    }

    function drawGrid(offsetY, now) {
      const startX = -horizontalPadding / 2;
      for (let row = 0; row < rows; row++) {
        const yPosition = offsetY + row * scaledSize;
        if (yPosition > height + scaledSize * 4 || yPosition < -scaledSize * 8) continue;

        for (let col = 0; col < columns; col++) {
          const x = startX + col * scaledSize;
          if (x > width + scaledSize * 4 || x < -scaledSize * 8) continue;

          const drift = Math.sin((row * 0.17 + col * 0.11) + now * 0.000025) * 0.035;
          drawCell(x, yPosition, colorForCell(col, row), currentScaleX + drift, currentScaleY - drift, col, row);
        }
      }
    }

    function animate(now) {
      const delta = Math.min(32, now - lastTime);
      lastTime = now;

      updatePulse(now);
      y += scrollSpeed * (delta / 30);
      if (y >= gridHeight) y -= gridHeight;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);

      ctx.globalCompositeOperation = "source-over";
      drawGrid(y - gridHeight, now);
      drawGrid(y, now);
      drawGrid(y + gridHeight, now);
      ctx.globalCompositeOperation = "source-over";

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
      y = 0;
      resize();
    });

    window.addEventListener("pointerdown", () => {
      const element = document.documentElement;
      if (!document.fullscreenElement && element.requestFullscreen) {
        element.requestFullscreen().catch(() => {});
      }
    });

    const initialBase = randomBaseScale();
    startX = initialBase.x;
    startY = initialBase.y;
    endX = initialBase.x;
    endY = initialBase.y;
    setNextTurnShape();
    resize();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
