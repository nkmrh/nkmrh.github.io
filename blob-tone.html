<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Blob Tone</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      user-select: none;
      touch-action: none;
      cursor: pointer;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
      filter: contrast(18) blur(12px);
      transform: scale(1.036);
      transform-origin: center;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const state = {
      count: 8,
      baseRadius: 85,
      speed: 0.35,
      audioMotionAmount: 0.9,
      gradientAmount: 0,
      delayTime: 1.2,
      delayFeedback: 0.68,
      delayMix: 0.55,
      reverbMix: 0.9,
      reverbDecay: 3.6,
      pointer: {
        x: 0,
        y: 0,
        lastX: 0,
        lastY: 0,
        velocityX: 0,
        velocityY: 0,
        draggingBall: null,
        dragOffsetX: 0,
        dragOffsetY: 0,
      },
      audioContext: null,
    };

    let balls = [];
    let trails = [];
    let nextBallId = 1;
    const contactPairs = new Set();

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      createBalls();
    }

    function createBall(noteIndex = Math.floor(Math.random() * 8)) {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const noteSizeScales = [1.42, 1.30, 1.18, 1.07, 0.97, 0.88, 0.80, 0.73];
      const radius = state.baseRadius * noteSizeScales[noteIndex];

      return {
        id: nextBallId++,
        x: randomRange(radius, Math.max(radius, w - radius)),
        y: randomRange(radius, Math.max(radius, h - radius)),
        vx: randomRange(-1, 1) * state.speed,
        vy: randomRange(-1, 1) * state.speed,
        radius,
        noteIndex,
        hue: 195,
        saturation: 100,
        lightness: 55,
        phase: randomRange(0, Math.PI * 2),
        audioPhase: randomRange(0, Math.PI * 2),
        audioSensitivity: randomRange(0.35, 1.65),
        wanderPhaseX: randomRange(0, Math.PI * 2),
        wanderPhaseY: randomRange(0, Math.PI * 2),
        wanderSpeed: randomRange(0.35, 1.15),
        timbreOffset: randomRange(-0.18, 0.22),
        attackOffset: randomRange(0.7, 1.35),
        toneSpread: randomRange(0.82, 1.22),
      };
    }

    function createBalls() {
      contactPairs.clear();
      trails = [];
      balls = Array.from({ length: state.count }, (_, index) => createBall(index % 8));
    }

    function draw(now = 0) {
      const time = now * 0.001;
      const audioLevel =
        0.5 +
        Math.sin(time * 1.25) * 0.28 +
        Math.sin(time * 2.8 + 1.2) * 0.18 +
        Math.sin(time * 5.7 + 0.4) * 0.10;
      const w = window.innerWidth;
      const h = window.innerHeight;

      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = "screen";

      for (let i = trails.length - 1; i >= 0; i--) {
        const trail = trails[i];
        trail.life *= 0.9;
        trail.radius *= 0.99;

        if (trail.life < 0.025) {
          trails.splice(i, 1);
          continue;
        }

        const gradient = ctx.createRadialGradient(trail.x, trail.y, 0, trail.x, trail.y, trail.radius);
        const g = state.gradientAmount;
        gradient.addColorStop(0, `hsla(${195 - 10 * g}, 100%, ${55 + 11 * g}%, ${0.32 * trail.life})`);
        gradient.addColorStop(0.42, `hsla(${195 + 10 * g}, 100%, ${55 - 1 * g}%, ${0.20 * trail.life})`);
        gradient.addColorStop(0.78, `hsla(${195 + 45 * g}, 100%, ${55 - 17 * g}%, ${0.10 * trail.life})`);
        gradient.addColorStop(1, `hsla(${195 + 55 * g}, 100%, ${55 - 33 * g}%, 0)`);

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(trail.x, trail.y, trail.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const ball of balls) {
        if (state.pointer.draggingBall === ball) {
          ball.x = state.pointer.x + state.pointer.dragOffsetX;
          ball.y = state.pointer.y + state.pointer.dragOffsetY;

          trails.push({
            x: ball.x,
            y: ball.y,
            radius: ball.radius * 0.9,
            hue: ball.hue,
            saturation: ball.saturation,
            lightness: ball.lightness,
            life: 1,
          });

          if (trails.length > 90) trails.shift();
        } else {
          const localAudioLevel = Math.max(
            0,
            audioLevel * ball.audioSensitivity +
              Math.sin(time * (1.6 + ball.audioSensitivity * 2.2) + ball.audioPhase) * 0.22
          );
          const beatPush = localAudioLevel * state.audioMotionAmount;
          const cx = w / 2;
          const cy = h / 2;
          const dx = ball.x - cx;
          const dy = ball.y - cy;
          const distance = Math.sqrt(dx * dx + dy * dy) || 1;
          const nx = dx / distance;
          const ny = dy / distance;

          const maxRadius = Math.min(w, h) * 0.42;
          const containment = Math.max(0, distance - maxRadius) / Math.max(1, maxRadius);
          const inwardForce = containment * 0.065;

          ball.vx += nx * beatPush * 0.006;
          ball.vy += ny * beatPush * 0.006;
          ball.vx -= nx * inwardForce;
          ball.vy -= ny * inwardForce;

          const randomDriftX = Math.sin(time * ball.wanderSpeed + ball.wanderPhaseX) * 0.018;
          const randomDriftY = Math.cos(time * ball.wanderSpeed * 0.87 + ball.wanderPhaseY) * 0.018;
          ball.vx += randomDriftX;
          ball.vy += randomDriftY;
          ball.vx *= 0.992;
          ball.vy *= 0.992;

          ball.x += ball.vx;
          ball.y += ball.vy;
        }

        if (ball.x < -ball.radius) ball.x = w + ball.radius;
        if (ball.x > w + ball.radius) ball.x = -ball.radius;
        if (ball.y < -ball.radius) ball.y = h + ball.radius;
        if (ball.y > h + ball.radius) ball.y = -ball.radius;
      }

      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          const a = balls[i];
          const b = balls[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const distance = Math.sqrt(dx * dx + dy * dy) || 1;
          const minDistance = (a.radius + b.radius) * 0.42;

          if (distance >= minDistance) continue;

          const nx = dx / distance;
          const ny = dy / distance;
          const overlap = minDistance - distance;
          const bounce = overlap * 0.035;

          if (state.pointer.draggingBall !== a) {
            a.vx -= nx * bounce;
            a.vy -= ny * bounce;
          }

          if (state.pointer.draggingBall !== b) {
            b.vx += nx * bounce;
            b.vy += ny * bounce;
          }
        }
      }

      for (const ball of balls) {
        const localPulseLevel = Math.max(
          0,
          audioLevel * ball.audioSensitivity +
            Math.sin(time * (1.4 + ball.audioSensitivity * 2.0) + ball.audioPhase) * 0.20
        );
        const pulse = 1 + Math.sin(time * 0.65 + ball.phase) * 0.08 + localPulseLevel * 0.16;
        const radius = ball.radius * pulse;
        const gradient = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, radius);
        const g = state.gradientAmount;
        gradient.addColorStop(0, `hsla(${195 - 10 * g}, 100%, ${55 + 11 * g}%, 1)`);
        gradient.addColorStop(0.28, `hsla(195, 100%, 55%, ${0.82 + 0.13 * g})`);
        gradient.addColorStop(0.58, `hsla(${195 + 23 * g}, 100%, ${55 - 5 * g}%, ${0.58 + 0.14 * g})`);
        gradient.addColorStop(0.82, `hsla(${195 + 47 * g}, 100%, ${55 - 17 * g}%, ${0.18 + 0.16 * g})`);
        gradient.addColorStop(1, `hsla(${195 + 55 * g}, 100%, ${55 - 33 * g}%, 0)`);

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    function getAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;

      if (!state.audioContext) {
        state.audioContext = new AudioContextClass();
      }

      state.audioContext.resume().catch(() => {});
      return state.audioContext;
    }

    function createReverbImpulse(audio, decay = 1.8) {
      const length = Math.floor(audio.sampleRate * decay);
      const impulse = audio.createBuffer(2, length, audio.sampleRate);

      for (let channel = 0; channel < 2; channel++) {
        const data = impulse.getChannelData(channel);
        for (let i = 0; i < length; i++) {
          const progress = i / length;
          const smoothNoise = (Math.random() * 2 - 1) * Math.pow(1 - progress, 2.8);
          data[i] = smoothNoise * 0.55;
        }
      }

      return impulse;
    }

    function playPuniSound(strength = 0.7, sizeTone = 0.5, toneVariation = 0, attackVariation = 1, spreadVariation = 1) {
      const audio = getAudioContext();
      if (!audio) return;

      const now = audio.currentTime;
      const volumeCurve = Math.pow(strength, 1.65);
      const pitchScale = 1;
      const bodyGain = (0.022 + volumeCurve * 0.42) * (0.78 + sizeTone * 0.30);
      const decayTime = (0.46 + sizeTone * 0.18) * attackVariation;
      const playfulBend = 1.08 + (1 - sizeTone) * 0.08 + volumeCurve * 0.10;
      const scaleNotes = [523.25, 587.33, 659.25, 783.99, 880.0, 1046.5, 1174.66, 1318.51];
      const noteIndex = Math.max(0, Math.min(scaleNotes.length - 1, Math.round((1 - sizeTone) * (scaleNotes.length - 1))));
      const baseFreq = scaleNotes[noteIndex];

      const inputGain = audio.createGain();
      const shimmerGain = audio.createGain();
      const toneFilter = audio.createBiquadFilter();
      const airFilter = audio.createBiquadFilter();
      const outputGain = audio.createGain();
      const limiter = audio.createDynamicsCompressor();
      const dryGain = audio.createGain();
      const delay = audio.createDelay(1.2);
      const delayGain = audio.createGain();
      const feedback = audio.createGain();
      const delayFilter = audio.createBiquadFilter();
      const convolver = audio.createConvolver();
      const reverbGain = audio.createGain();
      const reverbFilter = audio.createBiquadFilter();
      const caveDelay = audio.createDelay(1.2);
      const caveDelayGain = audio.createGain();
      const caveFeedback = audio.createGain();

      toneFilter.type = "lowpass";
      toneFilter.frequency.setValueAtTime(2600 - sizeTone * 520, now);
      toneFilter.frequency.exponentialRampToValueAtTime(1500 - sizeTone * 280, now + decayTime);
      toneFilter.Q.value = 0.35;

      airFilter.type = "highpass";
      airFilter.frequency.value = 130 + sizeTone * 45;
      airFilter.Q.value = 0.5;

      dryGain.gain.value = 0.9;
      delay.delayTime.setValueAtTime(state.delayTime + sizeTone * 0.12, now);
      delayGain.gain.value = Math.min(state.delayMix, 0.22);
      feedback.gain.value = Math.min(state.delayFeedback, 0.20);
      delayFilter.type = "lowpass";
      delayFilter.frequency.value = 2400;
      delayFilter.Q.value = 0.7;

      convolver.buffer = createReverbImpulse(audio, state.reverbDecay);
      reverbGain.gain.value = Math.min(state.reverbMix, 0.28);
      reverbFilter.type = "lowpass";
      reverbFilter.frequency.value = 3400;
      reverbFilter.Q.value = 0.45;
      caveDelay.delayTime.setValueAtTime(0.18 + sizeTone * 0.04, now);
      caveDelayGain.gain.value = 0;
      caveFeedback.gain.value = 0;

      shimmerGain.gain.value = 0.003 + volumeCurve * 0.006;

      inputGain.connect(toneFilter);
      toneFilter.connect(airFilter);
      airFilter.connect(dryGain);
      dryGain.connect(outputGain);

      airFilter.connect(delay);
      delay.connect(delayFilter);
      delayFilter.connect(delayGain);
      delayGain.connect(outputGain);
      delayFilter.connect(feedback);
      feedback.connect(delay);

      shimmerGain.connect(convolver);
      airFilter.connect(convolver);
      convolver.connect(reverbFilter);
      reverbFilter.connect(reverbGain);
      reverbGain.connect(outputGain);

      airFilter.connect(caveDelay);
      caveDelay.connect(caveDelayGain);
      caveDelayGain.connect(outputGain);
      caveDelay.connect(caveFeedback);
      caveFeedback.connect(caveDelay);

      limiter.threshold.value = -18;
      limiter.knee.value = 8;
      limiter.ratio.value = 12;
      limiter.attack.value = 0.004;
      limiter.release.value = 0.18;
      outputGain.connect(limiter);
      limiter.connect(audio.destination);

      outputGain.gain.setValueAtTime(0.0001, now);
      outputGain.gain.linearRampToValueAtTime(bodyGain, now + 0.14);
      outputGain.gain.setTargetAtTime(0.0001, now + 0.22, decayTime * 0.42);

      function addVoice(type, freqRatio, gainValue, detuneCents) {
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(baseFreq * freqRatio * pitchScale * playfulBend, now);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * freqRatio * pitchScale, now + 0.055);
        osc.detune.value = detuneCents;

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(gainValue, now + 0.06);
        gain.gain.setTargetAtTime(0.0001, now + decayTime * 0.45, decayTime * 0.35);

        osc.connect(gain);
        gain.connect(inputGain);
        osc.start(now);
        osc.stop(now + decayTime * 1.35 + 0.08);
      }

      addVoice("sine", 1.0, 0.46, 0);
      addVoice("sine", 2.0, 0.026 * (1 - sizeTone * 0.2), 0);
      addVoice("sine", 3.0, 0.008 * (1 - sizeTone * 0.35), 0);

      if (sizeTone > 0.35) {
        addVoice("sine", 0.5, 0.018 * sizeTone, 0);
      }

      const popOsc = audio.createOscillator();
      const popGain = audio.createGain();
      popOsc.type = "sine";
      popOsc.frequency.setValueAtTime(baseFreq * 1.5, now);
      popOsc.frequency.exponentialRampToValueAtTime(baseFreq * 1.65, now + 0.07);
      popGain.gain.setValueAtTime(0.0001, now);
      popGain.gain.linearRampToValueAtTime(0.006 + volumeCurve * 0.014, now + 0.018);
      popGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.075);
      popOsc.connect(popGain);
      popGain.connect(inputGain);
      popOsc.start(now);
      popOsc.stop(now + 0.085);

      const shimmerOsc = audio.createOscillator();
      const shimmerFilter = audio.createBiquadFilter();
      shimmerOsc.type = "sine";
      shimmerOsc.frequency.setValueAtTime(baseFreq * 3.0, now);
      shimmerOsc.frequency.setValueAtTime(baseFreq * 3.0, now + decayTime * 1.35);
      shimmerFilter.type = "bandpass";
      shimmerFilter.frequency.value = 2600 + (1 - sizeTone) * 1200;
      shimmerFilter.Q.value = 2.0;
      shimmerOsc.connect(shimmerFilter);
      shimmerFilter.connect(shimmerGain);
      shimmerOsc.start(now);
      shimmerOsc.stop(now + decayTime * 1.5);

      const noiseBuffer = audio.createBuffer(1, Math.floor(audio.sampleRate * 0.035), audio.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseData.length; i++) {
        noiseData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / noiseData.length, 2);
      }

      const noise = audio.createBufferSource();
      const noiseGain = audio.createGain();
      const noiseFilter = audio.createBiquadFilter();
      noise.buffer = noiseBuffer;
      noiseFilter.type = "bandpass";
      noiseFilter.frequency.value = 2400 + (1 - sizeTone) * 1200;
      noiseFilter.Q.value = 1.2;
      noiseGain.gain.setValueAtTime(0.00005 + volumeCurve * 0.00035, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(inputGain);
      noise.start(now);
      noise.stop(now + 0.05);
    }

    function enterFullscreen() {
      if (document.fullscreenElement) return;
      const element = document.documentElement;
      if (element.requestFullscreen) element.requestFullscreen().catch(() => {});
      else if (element.webkitRequestFullscreen) element.webkitRequestFullscreen();
    }

    function pointerDown(e) {
      enterFullscreen();
      getAudioContext();

      state.pointer.x = e.clientX;
      state.pointer.y = e.clientY;
      state.pointer.lastX = e.clientX;
      state.pointer.lastY = e.clientY;
      state.pointer.velocityX = 0;
      state.pointer.velocityY = 0;
      contactPairs.clear();

      let nearest = null;
      let nearestDistance = Infinity;

      for (const ball of balls) {
        const dx = ball.x - e.clientX;
        const dy = ball.y - e.clientY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const hitRadius = Math.max(60, ball.radius * 1.25);

        if (distance < hitRadius && distance < nearestDistance) {
          nearest = ball;
          nearestDistance = distance;
        }
      }

      if (nearest) {
        state.pointer.draggingBall = nearest;
        state.pointer.dragOffsetX = nearest.x - e.clientX;
        state.pointer.dragOffsetY = nearest.y - e.clientY;
        nearest.vx = 0;
        nearest.vy = 0;
      }
    }

    function pointerMove(e) {
      const dx = e.clientX - state.pointer.lastX;
      const dy = e.clientY - state.pointer.lastY;

      state.pointer.x = e.clientX;
      state.pointer.y = e.clientY;
      state.pointer.velocityX = state.pointer.velocityX * 0.72 + dx * 0.28;
      state.pointer.velocityY = state.pointer.velocityY * 0.72 + dy * 0.28;
      state.pointer.lastX = e.clientX;
      state.pointer.lastY = e.clientY;

      const dragged = state.pointer.draggingBall;
      if (!dragged) return;

      for (const ball of balls) {
        if (ball === dragged) continue;

        const hitDx = ball.x - dragged.x;
        const hitDy = ball.y - dragged.y;
        const distance = Math.sqrt(hitDx * hitDx + hitDy * hitDy);
        const contactDistance = (ball.radius + dragged.radius) * 0.86;
        const key = dragged.id < ball.id ? `${dragged.id}-${ball.id}` : `${ball.id}-${dragged.id}`;

        if (distance < contactDistance) {
          const nx = hitDx / Math.max(1, distance);
          const ny = hitDy / Math.max(1, distance);
          const dragSpeedTowardBall = state.pointer.velocityX * nx + state.pointer.velocityY * ny;
          const isPushingIntoBall = dragSpeedTowardBall > 1.2;

          if (!contactPairs.has(key) && isPushingIntoBall) {
            contactPairs.add(key);
            ball.vx += nx * dragSpeedTowardBall * 0.05;
            ball.vy += ny * dragSpeedTowardBall * 0.05;

            const hitStrength = Math.max(0, Math.min(1, (dragSpeedTowardBall - 1.2) / 24));
            const overlapStrength = Math.max(0, Math.min(1, (contactDistance - distance) / contactDistance));
            const velocityCurve = Math.pow(hitStrength, 1.8);
            const strength = Math.max(0.04, Math.min(1, velocityCurve * 0.95 + overlapStrength * 0.1));
            const playedNoteIndex = ball.noteIndex;
            const sizeTone = Math.max(0, Math.min(1, 1 - playedNoteIndex / 7));
            const toneVariation = (dragged.timbreOffset + ball.timbreOffset) * 0.5;
            const attackVariation = (dragged.attackOffset + ball.attackOffset) * 0.5;
            const spreadVariation = (dragged.toneSpread + ball.toneSpread) * 0.5;
            playPuniSound(strength, sizeTone, toneVariation, attackVariation, spreadVariation);
          }
        } else {
          contactPairs.delete(key);
        }
      }
    }

    function pointerUp() {
      if (state.pointer.draggingBall) {
        state.pointer.draggingBall.vx = state.pointer.velocityX * 0.18;
        state.pointer.draggingBall.vy = state.pointer.velocityY * 0.18;
      }

      state.pointer.draggingBall = null;
      contactPairs.clear();
    }

    window.addEventListener("resize", resize);
    document.addEventListener("fullscreenchange", resize);
    canvas.addEventListener("pointerdown", pointerDown);
    canvas.addEventListener("pointermove", pointerMove);
    canvas.addEventListener("pointerup", pointerUp);
    canvas.addEventListener("pointerleave", pointerUp);

    resize();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
