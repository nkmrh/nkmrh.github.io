<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kaleido Drift</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      user-select: none;
      touch-action: none;
      cursor: pointer;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
      filter: blur(0px);
      transform: scale(1);
      transform-origin: center;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const state = {
      count: 28,
      speed: 0.0025,
      depth: 1200,
      focalLength: 520,
      dotSize: 31.5,
      kaleidoAngle: 0,
      blendMode: "screen",
      blendStrength: 0.5,
      centerX: 0,
      centerY: 0,
      offsetSeedX: Math.random() * 1000,
      offsetSeedY: Math.random() * 1000,
      pointer: { down: false, lastX: 0, lastY: 0, offsetX: 0, offsetY: 0 },
      audioStarted: false,
      audioController: null,
    };

    let dots = [];

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      createDots();
    }

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function createDot(resetFar = false) {
      const spread = Math.max(window.innerWidth, window.innerHeight) * 0.95;
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.pow(Math.random(), 0.55) * spread;

      return {
        x: Math.cos(angle) * radius,
        y: Math.sin(angle) * radius,
        z: resetFar ? state.depth : randomRange(40, state.depth),
        speed: randomRange(0.72, 1.45),
        size: randomRange(0.7, 1.35),
        alpha: resetFar ? 0 : randomRange(0.35, 1),
        hue: randomRange(0, 360),
        saturation: randomRange(70, 100),
        lightness: randomRange(55, 78),
        dying: false,
      };
    }

    function createDots() {
      dots = Array.from({ length: state.count }, () => createDot(false));
    }

    function project(dot) {
      const perspective = state.focalLength / dot.z;
      return {
        x: dot.x * perspective,
        y: dot.y * perspective,
        perspective,
      };
    }

    function drawKaleidoDot(x, y, size, alpha, now = 0) {
      const segments = 8;
      const t = now * 0.000055;
      const randomOffsetX = Math.sin(t + state.offsetSeedX) * 180 + Math.sin(t * 0.37 + state.offsetSeedY) * 90;
      const randomOffsetY = Math.cos(t * 0.81 + state.offsetSeedY) * 180 + Math.sin(t * 0.51 + state.offsetSeedX) * 90;

      x += randomOffsetX;
      y += randomOffsetY;

      const angleStep = (Math.PI * 2) / segments;

      for (let i = 0; i < segments; i++) {
        const angle = i * angleStep + state.kaleidoAngle;
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);

        const rx = x * cos - y * sin;
        const ry = x * sin + y * cos;

        ctx.beginPath();
        ctx.arc(rx, ry, size, 0, Math.PI * 2);
        ctx.fill();

        const mx = x * cos + y * sin;
        const my = x * sin - y * cos;

        ctx.beginPath();
        ctx.arc(mx, my, size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function draw(now = 0) {
      const w = window.innerWidth;
      const h = window.innerHeight;

      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, w, h);

      const projected = [];

      for (let i = 0; i < dots.length; i++) {
        const dot = dots[i];

        if (dot.dying) {
          dot.z -= state.depth * state.speed * dot.speed;
          dot.alpha -= 0.025;

          if (dot.alpha <= 0) {
            dots[i] = createDot(true);
            continue;
          }
        } else {
          dot.z -= state.depth * state.speed * dot.speed;
          dot.alpha = Math.min(1, dot.alpha + 0.018);
        }

        const p = project(dot);

        if (dot.z < 80 || p.x < -120 || p.x > w + 120 || p.y < -120 || p.y > h + 120) {
          dot.dying = true;
        }

        const depth = 1 - dot.z / state.depth;
        const frontFade = Math.max(0, Math.min(1, (dot.z - 16) / 180));
        const size = state.dotSize * dot.size * (0.45 + depth * 6.4);
        const alpha = dot.alpha * frontFade * (0.15 + depth * 0.95);

        projected.push({
          x: p.x,
          y: p.y,
          size,
          alpha,
          depth,
          hue: dot.hue,
          saturation: dot.saturation,
          lightness: dot.lightness,
        });
      }

      projected.sort((a, b) => a.depth - b.depth);

      ctx.save();
      ctx.translate(
        w / 2 + state.pointer.offsetX + state.centerX,
        h / 2 + state.pointer.offsetY + state.centerY
      );
      ctx.rotate(now * 0.000025);

      ctx.globalCompositeOperation = state.blendMode;

      for (const dot of projected) {
        ctx.fillStyle = `hsla(${dot.hue}, ${dot.saturation}%, ${dot.lightness}%, ${Math.min(1, dot.alpha * state.blendStrength)})`;
        drawKaleidoDot(dot.x, dot.y, dot.size, dot.alpha, now);
      }

      ctx.restore();

      requestAnimationFrame(draw);
    }

    async function startSound() {
      if (state.audioStarted || state.audioController) return;

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      const audio = new AudioContextClass();
      await audio.resume();

      const master = audio.createGain();
      master.gain.value = 0.16;
      master.connect(audio.destination);

      const lowpass = audio.createBiquadFilter();
      lowpass.type = "lowpass";
      lowpass.frequency.value = 900;
      lowpass.Q.value = 0.7;
      lowpass.connect(master);

      const noiseBuffer = audio.createBuffer(1, audio.sampleRate * 4, audio.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseData.length; i++) {
        noiseData[i] = Math.random() * 2 - 1;
      }

      const noise = audio.createBufferSource();
      noise.buffer = noiseBuffer;
      noise.loop = true;

      const noiseGain = audio.createGain();
      noiseGain.gain.value = 0.08;

      noise.connect(lowpass);
      lowpass.connect(noiseGain);
      noiseGain.connect(master);
      noise.start();

      const droneA = audio.createOscillator();
      const droneB = audio.createOscillator();
      const droneGain = audio.createGain();
      droneA.type = "sine";
      droneB.type = "sine";
      droneA.frequency.value = 55;
      droneB.frequency.value = 55.7;
      droneGain.gain.value = 0.10;
      droneA.connect(droneGain);
      droneB.connect(droneGain);
      droneGain.connect(master);
      droneA.start();
      droneB.start();

      const lfo = audio.createOscillator();
      const lfoGain = audio.createGain();
      lfo.frequency.value = 0.055;
      lfoGain.gain.value = 500;
      lfo.connect(lfoGain);
      lfoGain.connect(lowpass.frequency);
      lfo.start();

      state.audioController = {
        stop() {
          noise.stop();
          droneA.stop();
          droneB.stop();
          lfo.stop();
          audio.close();
        }
      };

      state.audioStarted = true;
    }

    function enterFullscreen() {
      if (document.fullscreenElement) return;
      const element = document.documentElement;
      if (element.requestFullscreen) {
        element.requestFullscreen().catch(() => {});
      } else if (element.webkitRequestFullscreen) {
        element.webkitRequestFullscreen();
      }
    }

    function pointerDown(e) {
      enterFullscreen();
      startSound().catch(() => {});
      state.pointer.down = true;
      state.pointer.lastX = e.clientX;
      state.pointer.lastY = e.clientY;
    }

    function pointerMove(e) {
      if (!state.pointer.down) return;
      const dx = e.clientX - state.pointer.lastX;
      const dy = e.clientY - state.pointer.lastY;
      state.pointer.offsetX += dx * 0.45;
      state.pointer.offsetY += dy * 0.45;
      state.pointer.lastX = e.clientX;
      state.pointer.lastY = e.clientY;
    }

    function pointerUp() {
      state.pointer.down = false;
    }

    window.addEventListener("resize", resize);
    document.addEventListener("fullscreenchange", resize);
    canvas.addEventListener("pointerdown", pointerDown);
    canvas.addEventListener("pointermove", pointerMove);
    canvas.addEventListener("pointerup", pointerUp);
    canvas.addEventListener("pointerleave", pointerUp);

    resize();
    requestAnimationFrame(draw);
    startSound().catch(() => {});
  </script>
</body>
</html>
