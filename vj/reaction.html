<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>反応拡散（Reaction–Diffusion）</title>
  <style>
    :root { --ink: #eef0f4; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #000; color: var(--ink); overflow: hidden; font: 13px/1.4 ui-rounded, "Hiragino Maru Gothic ProN", system-ui, sans-serif; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
    #start { position: fixed; inset: 0; z-index: 3; display: flex; flex-direction: column; gap: 16px; align-items: center; justify-content: center; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); }
    #start h1 { font-size: clamp(20px, 3.6vw, 32px); font-weight: 800; }
    #start p { opacity: 0.72; font-size: 14px; }
    .btn { min-height: 46px; padding: 0 20px; border: 1px solid rgba(255,255,255,0.18); background: #16181e; color: var(--ink); border-radius: 12px; cursor: pointer; font: inherit; font-size: 15px; font-weight: 700; }
    .btn.primary { border-color: rgba(120,200,255,0.5); background: #15303f; } .btn:hover { background: #20242d; }
    #hud { position: fixed; left: 12px; bottom: 12px; right: 12px; z-index: 2; display: none; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .panel { background: rgba(12,14,18,0.62); border: 1px solid rgba(255,255,255,0.14); border-radius: 12px; padding: 10px 12px; backdrop-filter: blur(8px); }
    .ctl { display: inline-flex; flex-direction: column; gap: 3px; min-width: 116px; } .ctl label { font-size: 11px; opacity: 0.7; } .ctl input[type=range] { width: 100%; accent-color: #6cc6ff; }
    .mini { min-height: 34px; padding: 0 12px; font-size: 13px; } .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .meters { display: flex; gap: 5px; align-items: flex-end; height: 30px; } .meter { width: 9px; background: #2a2f39; border-radius: 3px 3px 0 0; align-self: flex-end; } .meter > i { display: block; background: linear-gradient(#6cc6ff, #b98bff); border-radius: 3px 3px 0 0; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="start">
    <h1>反応拡散（Reaction–Diffusion）</h1>
    <p>音で化学反応のパターンが育って・崩れて・伸びていきます</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn primary" id="micBtn" type="button">🎤 マイクで はじめる</button>
      <button class="btn" id="toneStartBtn" type="button">🔊 自分で 音を出す</button>
    </div>
    <p style="font-size:12px;opacity:0.5">無音でも 模様は 育ちます</p>
  </div>
  <div id="hud">
    <div class="panel"><div class="meters" id="meters"></div></div>
    <div class="panel"><div class="row">
      <button class="btn mini" id="toneBtn" type="button">♪ 音を出す</button>
      <div class="ctl"><label>音の高さ <span id="toneHzv">220</span> Hz</label><input id="toneFreq" type="range" min="60" max="900" value="220" /></div>
    </div></div>
    <div class="panel"><div class="row">
      <div class="ctl"><label>Pattern（feed）</label><input id="feed" type="range" min="0" max="100" value="40" /></div>
      <div class="ctl"><label>Reactivity</label><input id="react" type="range" min="0" max="100" value="55" /></div>
      <div class="ctl"><label>Accent 色</label><input id="hue" type="range" min="0" max="360" value="170" /></div>
    </div></div>
    <div class="panel"><div class="row">
      <button class="btn mini" id="seedBtn" type="button">✦ 種をまく</button>
      <button class="btn mini" id="invertBtn" type="button">白黒 反転</button>
      <button class="btn mini" id="fsBtn" type="button">⛶</button>
    </div></div>
  </div>

  <script>
    // ===================================================== audio (mic + built-in tone + features)
    const A = {
      ctx:null, analyser:null, freq:null, time:null, prevF:null, hasMic:false, osc:null, gain:null, toneOn:false, toneHz:220,
      level:0, bass:0, onset:0, fluxAvg:0,
      ensureCtx(){ if(!this.ctx) this.ctx=new (window.AudioContext||window.webkitAudioContext)(); if(this.ctx.state==="suspended") this.ctx.resume(); },
      async startMic(){ this.ensureCtx(); this.analyser=this.ctx.createAnalyser(); this.analyser.fftSize=2048; this.analyser.smoothingTimeConstant=0.6;
        this.freq=new Uint8Array(this.analyser.frequencyBinCount); this.time=new Uint8Array(this.analyser.fftSize); this.prevF=new Float32Array(this.analyser.frequencyBinCount);
        const st=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
        this.src=this.ctx.createMediaStreamSource(st); this.src.connect(this.analyser); this.hasMic=true; },
      startTone(){ this.ensureCtx(); if(!this.osc){ this.gain=this.ctx.createGain(); this.gain.gain.value=0; this.gain.connect(this.ctx.destination);
        this.osc=this.ctx.createOscillator(); this.osc.type="sawtooth"; this.osc.frequency.value=this.toneHz; this.osc.connect(this.gain); this.osc.start();
        if(!this.analyser){ this.analyser=this.ctx.createAnalyser(); this.analyser.fftSize=2048; this.freq=new Uint8Array(this.analyser.frequencyBinCount); this.time=new Uint8Array(this.analyser.fftSize); this.prevF=new Float32Array(this.analyser.frequencyBinCount); }
        this.osc.connect(this.analyser); }
        this.gain.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime+0.05); this.toneOn=true; },
      stopTone(){ this.toneOn=false; if(this.gain) this.gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime+0.06); },
      setToneFreq(hz){ this.toneHz=hz; if(this.osc) this.osc.frequency.setTargetAtTime(hz, this.ctx.currentTime, 0.02); },
      sample(){ if(!this.analyser){ this.level=this.bass=0; this.onset*=0.8; return; }
        this.analyser.getByteFrequencyData(this.freq); this.analyser.getByteTimeDomainData(this.time);
        let sum=0; for(let i=0;i<this.time.length;i++){ const v=(this.time[i]-128)/128; sum+=v*v; } this.level=Math.min(1,Math.sqrt(sum/this.time.length)*2.4);
        const N=this.freq.length, sr=this.ctx.sampleRate, ny=sr/2; let bass=0, flux=0;
        for(let i=1;i<N;i++){ const hz=i/N*ny, m=this.freq[i]/255; if(hz<200) bass+=m; const d=m-this.prevF[i]; if(d>0) flux+=d; this.prevF[i]=m; }
        this.bass=Math.min(1, bass/(200/ny*N)*1.2);
        this.fluxAvg=this.fluxAvg*0.92+flux*0.08; const on=Math.max(0,Math.min(1,(flux-this.fluxAvg*1.5)*0.05));
        this.onset=Math.max(on, this.onset*0.82); }
    };

    // ===================================================== webgl: ping-pong float FBO
    const canvas=document.getElementById("canvas");
    const gl=canvas.getContext("webgl",{antialias:false,alpha:false,preserveDrawingBuffer:false});
    gl.getExtension("OES_texture_float"); gl.getExtension("OES_texture_float_linear");
    gl.getExtension("OES_texture_half_float"); gl.getExtension("OES_texture_half_float_linear");
    let TYPE = gl.FLOAT; // probe later
    let dpr=1, SW=2, SH=2;

    const VS="attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }";
    function fsh(src){ const s=gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(s,src); gl.compileShader(s); if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.warn(gl.getShaderInfoLog(s)); return s; }
    function vsh(){ const s=gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(s,VS); gl.compileShader(s); return s; }
    function program(src){ const p=gl.createProgram(); gl.attachShader(p,vsh()); gl.attachShader(p,fsh(src)); gl.linkProgram(p); return p; }

    const COMMON = `precision highp float; uniform vec2 u_res;
      float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }`;

    // initial state: U=1, V=blobs
    const INIT = program(COMMON + `
      void main(){ vec2 uv=gl_FragCoord.xy/u_res; float v=0.0;
        for(int i=0;i<26;i++){ float fi=float(i); vec2 c=vec2(hash(vec2(fi,1.0)),hash(vec2(fi,7.0)));
          if(distance(uv,c) < 0.028) v=1.0; }
        gl_FragColor=vec4(1.0, v, 0.0, 1.0); }`);

    // Gray-Scott update (the SWAP POINT — replace this shader for another phenomenon)
    const SIM = program(COMMON + `
      uniform sampler2D u_state; uniform vec2 u_texel;
      uniform float u_feed, u_kill, u_du, u_dv, u_seedAmt; uniform vec2 u_seedPos;
      void main(){ vec2 uv=gl_FragCoord.xy/u_res;
        vec4 s=texture2D(u_state,uv);
        vec4 n=texture2D(u_state,uv+vec2(0.0,1.0)*u_texel), so=texture2D(u_state,uv+vec2(0.0,-1.0)*u_texel);
        vec4 e=texture2D(u_state,uv+vec2(1.0,0.0)*u_texel), w=texture2D(u_state,uv+vec2(-1.0,0.0)*u_texel);
        vec4 ne=texture2D(u_state,uv+vec2(1.0,1.0)*u_texel), nw=texture2D(u_state,uv+vec2(-1.0,1.0)*u_texel);
        vec4 se=texture2D(u_state,uv+vec2(1.0,-1.0)*u_texel), sw=texture2D(u_state,uv+vec2(-1.0,-1.0)*u_texel);
        float lapU = -s.r + 0.2*(n.r+so.r+e.r+w.r) + 0.05*(ne.r+nw.r+se.r+sw.r);
        float lapV = -s.g + 0.2*(n.g+so.g+e.g+w.g) + 0.05*(ne.g+nw.g+se.g+sw.g);
        float u=s.r, v=s.g, uvv=u*v*v;
        u += u_du*lapU - uvv + u_feed*(1.0-u);
        v += u_dv*lapV + uvv - (u_feed+u_kill)*v;
        float d=distance(uv,u_seedPos); v += u_seedAmt*exp(-d*d*500.0);
        gl_FragColor=vec4(clamp(u,0.0,1.0), clamp(v,0.0,1.0), 0.0, 1.0); }`);

    // display: hard black/white + one accent contour line  (the unified "look")
    const SHOW = program(COMMON + `
      uniform sampler2D u_state; uniform float u_hue, u_onset, u_invert;
      vec3 hsv(float h,float s,float v){ vec3 c=clamp(abs(mod(h*6.0+vec3(0.0,4.0,2.0),6.0)-3.0)-1.0,0.0,1.0); return v*mix(vec3(1.0),c,s); }
      void main(){ vec2 uv=gl_FragCoord.xy/u_res; float v=texture2D(u_state,uv).g;
        float fill=smoothstep(0.16,0.30,v);
        vec3 plate=vec3(0.03,0.03,0.04), sand=vec3(0.95,0.95,0.93);
        vec3 col=mix(plate,sand,fill);
        col=mix(col, vec3(1.0)-col, u_invert);
        vec3 accent=hsv(fract(u_hue),0.85,1.0);
        col=mix(col, accent, smoothstep(0.05,0.0,abs(v-0.23))*0.9);   // accent contour at the boundary
        col += u_onset*0.05;
        gl_FragColor=vec4(col,1.0); }`);

    const quad=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,quad);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
    function bindQuad(p){ gl.bindBuffer(gl.ARRAY_BUFFER,quad); const l=gl.getAttribLocation(p,"p"); gl.enableVertexAttribArray(l); gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0); }
    function uni(p,n){ return gl.getUniformLocation(p,n); }

    let texA, texB, fboA, fboB;
    function makeTarget(w,h){ const t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,TYPE,null);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
      const f=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER,f); gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
      return {t,f}; }

    function allocSim(){
      // sim resolution: cap longest side, preserve aspect
      const cap=460, ar=innerWidth/innerHeight;
      if(ar>=1){ SW=cap; SH=Math.max(2,Math.round(cap/ar)); } else { SH=cap; SW=Math.max(2,Math.round(cap*ar)); }
      const a=makeTarget(SW,SH), b=makeTarget(SW,SH); texA=a.t; fboA=a.f; texB=b.t; fboB=b.f;
      // probe float renderability; fall back to half-float if needed
      gl.bindFramebuffer(gl.FRAMEBUFFER,fboA);
      if(gl.checkFramebufferStatus(gl.FRAMEBUFFER)!==gl.FRAMEBUFFER_COMPLETE && TYPE===gl.FLOAT){
        const hf=gl.getExtension("OES_texture_half_float"); TYPE = hf ? hf.HALF_FLOAT_OES : gl.UNSIGNED_BYTE;
        const a2=makeTarget(SW,SH), b2=makeTarget(SW,SH); texA=a2.t; fboA=a2.f; texB=b2.t; fboB=b2.f;
      }
      initState();
    }
    function initState(){ gl.bindFramebuffer(gl.FRAMEBUFFER,fboA); gl.viewport(0,0,SW,SH); gl.useProgram(INIT); bindQuad(INIT); gl.uniform2f(uni(INIT,"u_res"),SW,SH); gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
      // copy A->B by another init (same blobs) so both start valid
      gl.bindFramebuffer(gl.FRAMEBUFFER,fboB); gl.useProgram(INIT); bindQuad(INIT); gl.uniform2f(uni(INIT,"u_res"),SW,SH); gl.drawArrays(gl.TRIANGLE_STRIP,0,4); }

    function resize(){ dpr=Math.min(1.75,window.devicePixelRatio||1); canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr);
      canvas.style.width=innerWidth+"px"; canvas.style.height=innerHeight+"px"; allocSim(); }

    // ===================================================== params + loop
    const params={ feed:0.40, react:0.55, hue:170/360, invert:0 };
    let seedPos=[0.5,0.5], seedAmt=0;
    const meters=[]; (function(){ const host=document.getElementById("meters"); ["LV","BS","ON"].forEach(()=>{ const m=document.createElement("div"); m.className="meter"; m.style.height="30px"; const i=document.createElement("i"); m.appendChild(i); host.appendChild(m); meters.push(i); }); })();

    function step(){
      // audio -> physics params
      const feed = 0.030 + params.feed*0.030 + A.bass*0.012;   // pattern regime (spots..maze..stripes)
      const kill = 0.062;
      const du = 0.16, dv = 0.08;
      const sub = Math.round(6 + params.react*8 + A.level*6);   // louder -> faster evolution
      // onset seeds a fresh blob
      if(A.onset>0.18){ seedPos=[Math.random(),Math.random()]; seedAmt=Math.min(0.9, A.onset*0.8); }
      seedAmt*=0.6;
      gl.useProgram(SIM); bindQuad(SIM);
      gl.uniform2f(uni(SIM,"u_res"),SW,SH); gl.uniform2f(uni(SIM,"u_texel"),1/SW,1/SH);
      gl.uniform1f(uni(SIM,"u_feed"),feed); gl.uniform1f(uni(SIM,"u_kill"),kill);
      gl.uniform1f(uni(SIM,"u_du"),du); gl.uniform1f(uni(SIM,"u_dv"),dv);
      for(let s=0;s<sub;s++){
        gl.bindFramebuffer(gl.FRAMEBUFFER,fboB); gl.viewport(0,0,SW,SH);
        gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,texA); gl.uniform1i(uni(SIM,"u_state"),0);
        gl.uniform1f(uni(SIM,"u_seedAmt"), s===0?seedAmt:0.0); gl.uniform2f(uni(SIM,"u_seedPos"),seedPos[0],seedPos[1]);
        gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
        let tt=texA; texA=texB; texB=tt; let ff=fboA; fboA=fboB; fboB=ff;
      }
    }

    function frame(){
      A.sample();
      // idle: keep it alive with periodic gentle seeds + feed LFO via params already; auto-seed if very quiet
      if((!A.analyser || A.level<0.04) && Math.random()<0.012){ seedPos=[Math.random(),Math.random()]; seedAmt=0.7; }
      step();
      // display
      gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.viewport(0,0,canvas.width,canvas.height);
      gl.useProgram(SHOW); bindQuad(SHOW);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,texA); gl.uniform1i(uni(SHOW,"u_state"),0);
      gl.uniform2f(uni(SHOW,"u_res"),canvas.width,canvas.height);
      gl.uniform1f(uni(SHOW,"u_hue"),params.hue); gl.uniform1f(uni(SHOW,"u_onset"),A.onset); gl.uniform1f(uni(SHOW,"u_invert"),params.invert);
      gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
      const mv=[A.level,A.bass,A.onset]; for(let i=0;i<meters.length;i++) meters[i].style.height=Math.round(mv[i]*100)+"%";
      requestAnimationFrame(frame);
    }

    // ===================================================== ui
    function showHud(){ document.getElementById("start").style.display="none"; document.getElementById("hud").style.display="flex"; }
    document.getElementById("micBtn").addEventListener("click", async ()=>{ try{ await A.startMic(); showHud(); }catch(e){ alert("マイクを取得できませんでした: "+e.message); } });
    const toneBtn=document.getElementById("toneBtn"), toneFreq=document.getElementById("toneFreq"), toneHzv=document.getElementById("toneHzv");
    function toneToggle(on){ if(on){ A.startTone(); toneBtn.textContent="♪ 停止"; toneBtn.classList.add("primary"); } else { A.stopTone(); toneBtn.textContent="♪ 音を出す"; toneBtn.classList.remove("primary"); } }
    toneBtn.addEventListener("click", ()=>toneToggle(!A.toneOn));
    toneFreq.addEventListener("input", e=>{ const hz=Number(e.target.value); toneHzv.textContent=hz; A.setToneFreq(hz); });
    document.getElementById("toneStartBtn").addEventListener("click", ()=>{ showHud(); toneToggle(true); });
    document.getElementById("feed").addEventListener("input", e=>params.feed=e.target.value/100);
    document.getElementById("react").addEventListener("input", e=>params.react=e.target.value/100);
    document.getElementById("hue").addEventListener("input", e=>params.hue=e.target.value/360);
    document.getElementById("invertBtn").addEventListener("click", ()=>params.invert=params.invert?0:1);
    document.getElementById("seedBtn").addEventListener("click", ()=>{ for(let k=0;k<4;k++){ seedPos=[Math.random(),Math.random()]; seedAmt=0.9; step(); } });
    document.getElementById("fsBtn").addEventListener("click", ()=>{ if(document.fullscreenElement) document.exitFullscreen(); else document.documentElement.requestFullscreen(); });

    addEventListener("resize", resize);
    resize();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
