<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>クラドニ図形（物理シミュレーション版）</title>
  <style>
    :root { --ink: #eef0f4; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #000; color: var(--ink); overflow: hidden;
      font: 13px/1.4 ui-rounded, "Hiragino Maru Gothic ProN", system-ui, sans-serif; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
    #start { position: fixed; inset: 0; z-index: 3; display: flex; flex-direction: column; gap: 16px;
      align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); }
    #start h1 { font-size: clamp(20px, 3.4vw, 30px); font-weight: 800; }
    #start p { opacity: 0.72; font-size: 14px; max-width: 30ch; text-align: center; }
    .btn { min-height: 46px; padding: 0 20px; border: 1px solid rgba(255,255,255,0.18); background: #16181e;
      color: var(--ink); border-radius: 12px; cursor: pointer; font: inherit; font-size: 15px; font-weight: 700; }
    .btn.primary { border-color: rgba(120,200,255,0.5); background: #15303f; }
    .btn:hover { background: #20242d; }
    #hud { position: fixed; left: 12px; bottom: 12px; right: 12px; z-index: 2; display: none; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .panel { background: rgba(12,14,18,0.62); border: 1px solid rgba(255,255,255,0.14); border-radius: 12px; padding: 10px 12px; backdrop-filter: blur(8px); }
    .readout { font-variant-numeric: tabular-nums; font-weight: 800; }
    .readout b { color: #6cc6ff; font-size: 20px; } .readout span { opacity: 0.6; }
    .ctl { display: inline-flex; flex-direction: column; gap: 3px; min-width: 118px; }
    .ctl label { font-size: 11px; opacity: 0.7; } .ctl input[type=range] { width: 100%; accent-color: #6cc6ff; }
    .mini { min-height: 34px; padding: 0 12px; font-size: 13px; } .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    #boot { position: fixed; inset: 0; z-index: 4; display: none; align-items: center; justify-content: center; background: #000; font-size: 15px; opacity: 0.85; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="boot">固有モードを計算中…</div>
  <div id="start">
    <h1>クラドニ図形（物理シミュレーション版）</h1>
    <p>自由端の正方形板の <b>固有モード</b> を Rayleigh–Ritz 法で計算し、砂を物理的に動かします</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn primary" id="micBtn" type="button">🎤 マイクで はじめる</button>
      <button class="btn" id="toneStartBtn" type="button">🔊 自分で 音を出す</button>
    </div>
    <p style="font-size:12px;opacity:0.5">音の高さ＝共振する固有モードが選ばれます</p>
  </div>
  <div id="hud">
    <div class="panel readout"><b id="hz">—</b> <span>Hz</span> &nbsp; <span id="mode">mode —</span></div>
    <div class="panel"><div class="row">
      <button class="btn mini" id="toneBtn" type="button">♪ 音を出す</button>
      <div class="ctl"><label>音の高さ <span id="toneHzv">300</span> Hz</label><input id="toneFreq" type="range" min="80" max="1400" value="300" /></div>
    </div></div>
    <div class="panel"><div class="row">
      <div class="ctl"><label>砂の量</label><input id="amount" type="range" min="0" max="100" value="55" /></div>
      <div class="ctl"><label>粒の大きさ</label><input id="grain" type="range" min="0" max="100" value="38" /></div>
    </div></div>
    <div class="panel"><div class="row">
      <button class="btn mini" id="invertBtn" type="button">白黒 反転</button>
      <button class="btn mini" id="freezeBtn" type="button">フリーズ</button>
      <button class="btn mini" id="fsBtn" type="button">⛶</button>
    </div></div>
  </div>

  <script>
    // ============================================================ linear algebra (small dense)
    function cholesky(Mf, n){ const L = new Float64Array(n*n);
      for (let i=0;i<n;i++) for (let j=0;j<=i;j++){ let s = Mf[i*n+j];
        for (let k=0;k<j;k++) s -= L[i*n+k]*L[j*n+k];
        if (i===j) L[i*n+i] = Math.sqrt(Math.max(s,1e-12)); else L[i*n+j] = s / L[j*n+j]; }
      return L; }
    function fwd(L, Bf, n){ const Y = new Float64Array(n*n);          // solve L Y = B (columns)
      for (let c=0;c<n;c++) for (let i=0;i<n;i++){ let s = Bf[i*n+c];
        for (let p=0;p<i;p++) s -= L[i*n+p]*Y[p*n+c]; Y[i*n+c] = s / L[i*n+i]; }
      return Y; }
    function backT(L, Bf, n){ const Y = new Float64Array(n*n);        // solve L^T Y = B (columns)
      for (let c=0;c<n;c++) for (let i=n-1;i>=0;i--){ let s = Bf[i*n+c];
        for (let p=i+1;p<n;p++) s -= L[p*n+i]*Y[p*n+c]; Y[i*n+c] = s / L[i*n+i]; }
      return Y; }
    function transpose(Af, n){ const T = new Float64Array(n*n); for (let i=0;i<n;i++) for (let j=0;j<n;j++) T[j*n+i]=Af[i*n+j]; return T; }
    function jacobi(Af, n){ const A = Af.slice(); const V = new Float64Array(n*n);
      for (let i=0;i<n;i++) V[i*n+i]=1;
      for (let sweep=0; sweep<60; sweep++){ let off=0;
        for (let p=0;p<n;p++) for (let q=p+1;q<n;q++) off += A[p*n+q]*A[p*n+q];
        if (off < 1e-18) break;
        for (let p=0;p<n;p++) for (let q=p+1;q<n;q++){ const apq=A[p*n+q]; if (Math.abs(apq)<1e-14) continue;
          const app=A[p*n+p], aqq=A[q*n+q]; const phi=0.5*Math.atan2(2*apq, aqq-app); const c=Math.cos(phi), s=Math.sin(phi);
          for (let k=0;k<n;k++){ const akp=A[k*n+p], akq=A[k*n+q]; A[k*n+p]=c*akp - s*akq; A[k*n+q]=s*akp + c*akq; }
          for (let k=0;k<n;k++){ const apk=A[p*n+k], aqk=A[q*n+k]; A[p*n+k]=c*apk - s*aqk; A[q*n+k]=s*apk + c*aqk; }
          for (let k=0;k<n;k++){ const vkp=V[k*n+p], vkq=V[k*n+q]; V[k*n+p]=c*vkp - s*vkq; V[k*n+q]=s*vkp + c*vkq; }
        } }
      const val = new Float64Array(n); for (let i=0;i<n;i++) val[i]=A[i*n+i];
      return { val, vec: V }; }

    // ============================================================ free-free beam basis (Ritz)
    const NU = 0.3, B = 8;
    const BETA = [4.7300407448627, 7.8532046240958, 10.9956078380017, 14.1371654913251, 17.2787596573995, 20.4203522510411];
    const SQ3 = Math.sqrt(3);
    function sig(b){ return (Math.cosh(b)-Math.cos(b))/(Math.sinh(b)-Math.sin(b)); }
    function Xv(i,t){ if(i===0) return 1; if(i===1) return SQ3*(2*t-1); const b=BETA[i-2], s=sig(b);
      return Math.cosh(b*t)+Math.cos(b*t) - s*(Math.sinh(b*t)+Math.sin(b*t)); }
    function X1(i,t){ if(i===0) return 0; if(i===1) return 2*SQ3; const b=BETA[i-2], s=sig(b);
      return b*(Math.sinh(b*t)-Math.sin(b*t)) - s*b*(Math.cosh(b*t)+Math.cos(b*t)); }
    function X2(i,t){ if(i<=1) return 0; const b=BETA[i-2], s=sig(b), b2=b*b;
      return b2*(Math.cosh(b*t)-Math.cos(b*t)) - s*b2*(Math.sinh(b*t)-Math.sin(b*t)); }

    let MODES = [];   // [{lam, c:Float64Array(n)}], ascending flexural
    let FMIN = 1, FMAX = 1;
    function computeModes(){
      const NQ = 200, qw = 1/NQ, qs = [];
      for (let q=0;q<NQ;q++) qs.push((q+0.5)/NQ);
      const v0=[],v1=[],v2=[];
      for (let i=0;i<B;i++){ v0[i]=qs.map(t=>Xv(i,t)); v1[i]=qs.map(t=>X1(i,t)); v2[i]=qs.map(t=>X2(i,t)); }
      const ig=(a,b)=>{ let s=0; for(let q=0;q<NQ;q++) s+=a[q]*b[q]; return s*qw; };
      const E=[],F=[],G=[],H=[];
      for (let i=0;i<B;i++){ E[i]=[];F[i]=[];G[i]=[];H[i]=[];
        for (let k=0;k<B;k++){ E[i][k]=ig(v0[i],v0[k]); F[i][k]=ig(v2[i],v2[k]); G[i][k]=ig(v2[i],v0[k]); H[i][k]=ig(v1[i],v1[k]); } }
      const n=B*B, K=new Float64Array(n*n), M=new Float64Array(n*n);
      for (let i=0;i<B;i++) for (let j=0;j<B;j++){ const II=i*B+j;
        for (let k=0;k<B;k++) for (let l=0;l<B;l++){ const KK=k*B+l;
          M[II*n+KK] = E[i][k]*E[j][l];
          K[II*n+KK] = F[i][k]*E[j][l] + E[i][k]*F[j][l] + 2*NU*G[i][k]*G[l][j] + 2*(1-NU)*H[i][k]*H[j][l];
        } }
      for (let a=0;a<n;a++) for (let b=a+1;b<n;b++){ const s=0.5*(K[a*n+b]+K[b*n+a]); K[a*n+b]=s; K[b*n+a]=s; }
      // generalized eig  K c = lam M c   ->  A = L^-1 K L^-T,  jacobi,  c = L^-T y
      const L = cholesky(M, n);
      const T = fwd(L, K, n);
      const A = transpose(fwd(L, transpose(T, n), n), n);
      const { val, vec } = jacobi(A, n);
      const C = backT(L, vec, n);           // columns = generalized eigenvectors
      const idx = [...val.keys()].sort((p,q)=>val[p]-val[q]);
      MODES = [];
      for (const id of idx){ if (val[id] < 1e-3) continue;             // skip 3 rigid-body modes (lam ~ 0)
        const c = new Float64Array(n); for (let r=0;r<n;r++) c[r]=C[r*n+id];
        MODES.push({ lam: val[id], c });
        if (MODES.length >= 30) break;
      }
      FMIN = Math.sqrt(MODES[0].lam); FMAX = Math.sqrt(MODES[MODES.length-1].lam);
    }

    // amplitude field of a given mode, on a grid (recomputed only when the mode changes)
    const GS = 110; const field = new Float32Array(GS*GS);
    const Bg = []; // Bg[i][g] = Xv(i, (g+.5)/GS)
    function buildFieldTable(){ for (let i=0;i<B;i++){ Bg[i]=new Float64Array(GS); for (let g=0;g<GS;g++) Bg[i][g]=Xv(i,(g+0.5)/GS); } }
    function buildField(modeIndex){ const c = MODES[modeIndex].c; let mx=1e-6;
      const cx = new Float64Array(B);
      for (let gx=0;gx<GS;gx++){
        for (let j=0;j<B;j++){ let s=0; for (let i=0;i<B;i++) s += c[i*B+j]*Bg[i][gx]; cx[j]=s; }
        for (let gy=0;gy<GS;gy++){ let w=0; for (let j=0;j<B;j++) w += cx[j]*Bg[j][gy]; const av=Math.abs(w); field[gx*GS+gy]=av; if (av>mx) mx=av; }
      }
      const inv=1/mx; for (let i=0;i<field.length;i++) field[i]*=inv;        // normalise to [0,1]
    }
    function sampleField(x, y){ // x,y in [-1,1] -> bilinear |w| in [0,1]
      const fx=((x+1)*0.5)*GS-0.5, fy=((y+1)*0.5)*GS-0.5;
      let x0=Math.floor(fx), y0=Math.floor(fy); const tx=fx-x0, ty=fy-y0;
      x0=Math.max(0,Math.min(GS-2,x0)); y0=Math.max(0,Math.min(GS-2,y0));
      const a=field[x0*GS+y0], b=field[(x0+1)*GS+y0], cc=field[x0*GS+y0+1], d=field[(x0+1)*GS+y0+1];
      return (a*(1-tx)+b*tx)*(1-ty) + (cc*(1-tx)+d*tx)*ty;
    }

    // ============================================================ audio (mic + built-in tone)
    const Audio = {
      ctx:null, analyser:null, freq:null, src:null, hasMic:false, osc:null, gain:null, toneOn:false, toneHz:300, f:0, loud:0,
      ensureCtx(){ if(!this.ctx) this.ctx=new (window.AudioContext||window.webkitAudioContext)(); if(this.ctx.state==="suspended") this.ctx.resume(); },
      async startMic(){ this.ensureCtx(); this.analyser=this.ctx.createAnalyser(); this.analyser.fftSize=4096; this.analyser.smoothingTimeConstant=0.6;
        this.freq=new Uint8Array(this.analyser.frequencyBinCount);
        const st=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
        this.src=this.ctx.createMediaStreamSource(st); this.src.connect(this.analyser); this.hasMic=true; },
      startTone(){ this.ensureCtx(); if(!this.osc){ this.gain=this.ctx.createGain(); this.gain.gain.value=0; this.gain.connect(this.ctx.destination);
        this.osc=this.ctx.createOscillator(); this.osc.type="sine"; this.osc.frequency.value=this.toneHz; this.osc.connect(this.gain); this.osc.start(); }
        this.gain.gain.linearRampToValueAtTime(0.12, this.ctx.currentTime+0.05); this.toneOn=true; },
      stopTone(){ this.toneOn=false; if(this.gain) this.gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime+0.06); },
      setToneFreq(hz){ this.toneHz=hz; if(this.osc) this.osc.frequency.setTargetAtTime(hz, this.ctx.currentTime, 0.02); },
      sample(){ if(!this.hasMic) return; this.analyser.getByteFrequencyData(this.freq); const sr=this.ctx.sampleRate,N=this.freq.length,mb=Math.floor(70/(sr/2)*N);
        let mv=0,mi=mb; for(let i=mb;i<N;i++){ if(this.freq[i]>mv){mv=this.freq[i];mi=i;} } this.loud=mv/255; if(this.loud>0.25) this.f+=(mi*(sr/2)/N - this.f)*0.25; }
    };

    // ============================================================ webgl points
    const canvas=document.getElementById("canvas");
    const gl=canvas.getContext("webgl",{antialias:true,alpha:false});
    let dpr=1;
    const VS=`attribute vec2 p; uniform vec2 u_res; uniform float u_ps;
      void main(){ float s=min(u_res.x,u_res.y); gl_Position=vec4(p.x*s/u_res.x, p.y*s/u_res.y, 0.0, 1.0); gl_PointSize=u_ps; }`;
    const FS=`precision mediump float; uniform vec3 u_col;
      void main(){ vec2 d=gl_PointCoord-0.5; if(dot(d,d)>0.25) discard; gl_FragColor=vec4(u_col,1.0); }`;
    function comp(t,s){ const sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh); if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)) console.warn(gl.getShaderInfoLog(sh)); return sh; }
    const prog=gl.createProgram(); gl.attachShader(prog,comp(gl.VERTEX_SHADER,VS)); gl.attachShader(prog,comp(gl.FRAGMENT_SHADER,FS)); gl.linkProgram(prog); gl.useProgram(prog);
    const U={}; ["u_res","u_ps","u_col"].forEach(k=>U[k]=gl.getUniformLocation(prog,k)); const aLoc=gl.getAttribLocation(prog,"p"); const vbo=gl.createBuffer();
    const MAXN=26000, posv=new Float32Array(MAXN*2); let N=14000;
    function seed(){ for(let i=0;i<MAXN;i++){ posv[i*2]=Math.random()*2-1; posv[i*2+1]=Math.random()*2-1; } }
    function resize(){ dpr=Math.min(2,window.devicePixelRatio||1); canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr);
      canvas.style.width=innerWidth+"px"; canvas.style.height=innerHeight+"px"; gl.viewport(0,0,canvas.width,canvas.height); }

    // ============================================================ sim + loop
    const params={ amount:0.55, grain:0.38, invert:0, freeze:false };
    let curMode=-1;
    const QP=new URLSearchParams(location.search);
    const PIN = QP.has("mode") ? parseInt(QP.get("mode")) : -1;   // ?mode=N pins one eigenmode
    const hzEl=document.getElementById("hz"), modeEl=document.getElementById("mode");
    function pitchToModeIndex(hz){ const t=Math.max(0,Math.min(1,(hz-90)/(1400-90))); return Math.round(t*(MODES.length-1)); }
    function setMode(i){ i=Math.max(0,Math.min(MODES.length-1,i)); if(i===curMode) return; curMode=i; buildField(i); }

    function update(loud){ const kick=0.07+0.06*loud, base=0.0004;
      for(let sub=0;sub<3;sub++){
        for(let i=0;i<N;i++){ let x=posv[i*2], y=posv[i*2+1]; const a=sampleField(x,y); const step=kick*a+base; // step ∝ vibration amplitude; ~0 at nodes so grains stick
          x+=(Math.random()*2-1)*step; y+=(Math.random()*2-1)*step;
          if(x>1) x=2-x; else if(x<-1) x=-2-x;   // reflect (free edges are antinodes — no pile-up at the wall)
          if(y>1) y=2-y; else if(y<-1) y=-2-y;
          posv[i*2]=x; posv[i*2+1]=y; } } }

    function frame(now){ const t=now*0.001; Audio.sample();
      let hz, loud;
      if(PIN>=0){ setMode(PIN); loud=0.9; hzEl.textContent="fixed"; }
      else {
        if(Audio.toneOn){ hz=Audio.toneHz; loud=1; }
        else if(Audio.hasMic && Audio.loud>0.06){ hz=Audio.f; loud=Math.min(1,Audio.loud*1.6); }
        else { hz=300 + 260*Math.sin(t*0.13) + 180*Math.sin(t*0.05); loud=0.6; }
        hzEl.textContent = (Audio.hasMic && !Audio.toneOn && Audio.loud<=0.06) ? "idle" : Math.round(hz);
        setMode(pitchToModeIndex(hz));
      }
      modeEl.textContent = "mode #" + (curMode+1) + " / " + MODES.length;

      N=Math.round(4000 + params.amount*(MAXN-4000));
      if(!params.freeze) update(loud);

      const sand=[0.96,0.92,0.83], plate=[0.05,0.05,0.06];
      const col=params.invert?[0.06,0.06,0.07]:sand, bg=params.invert?[0.86,0.84,0.78]:plate;
      gl.clearColor(bg[0],bg[1],bg[2],1); gl.clear(gl.COLOR_BUFFER_BIT);
      gl.bindBuffer(gl.ARRAY_BUFFER,vbo); gl.bufferData(gl.ARRAY_BUFFER,posv.subarray(0,N*2),gl.DYNAMIC_DRAW);
      gl.enableVertexAttribArray(aLoc); gl.vertexAttribPointer(aLoc,2,gl.FLOAT,false,0,0);
      gl.uniform2f(U.u_res,canvas.width,canvas.height); gl.uniform1f(U.u_ps,(1.2+params.grain*4.0)*dpr); gl.uniform3f(U.u_col,col[0],col[1],col[2]);
      gl.drawArrays(gl.POINTS,0,N);
      requestAnimationFrame(frame);
    }

    // ============================================================ ui + boot
    function showHud(){ document.getElementById("start").style.display="none"; document.getElementById("hud").style.display="flex"; }
    document.getElementById("micBtn").addEventListener("click", async ()=>{ try{ await Audio.startMic(); showHud(); }catch(e){ alert("マイクを取得できませんでした: "+e.message); } });
    const toneBtn=document.getElementById("toneBtn"), toneFreq=document.getElementById("toneFreq"), toneHzv=document.getElementById("toneHzv");
    function toneToggle(on){ if(on){ Audio.startTone(); toneBtn.textContent="♪ 停止"; toneBtn.classList.add("primary"); } else { Audio.stopTone(); toneBtn.textContent="♪ 音を出す"; toneBtn.classList.remove("primary"); } }
    toneBtn.addEventListener("click", ()=>toneToggle(!Audio.toneOn));
    toneFreq.addEventListener("input", e=>{ const hz=Number(e.target.value); toneHzv.textContent=hz; Audio.setToneFreq(hz); });
    document.getElementById("toneStartBtn").addEventListener("click", ()=>{ showHud(); toneToggle(true); });
    document.getElementById("amount").addEventListener("input", e=>params.amount=e.target.value/100);
    document.getElementById("grain").addEventListener("input", e=>params.grain=e.target.value/100);
    document.getElementById("invertBtn").addEventListener("click", ()=>params.invert=params.invert?0:1);
    const freezeBtn=document.getElementById("freezeBtn"); freezeBtn.addEventListener("click", ()=>{ params.freeze=!params.freeze; freezeBtn.textContent=params.freeze?"再開":"フリーズ"; });
    document.getElementById("fsBtn").addEventListener("click", ()=>{ if(document.fullscreenElement) document.exitFullscreen(); else document.documentElement.requestFullscreen(); });
    let dragging=false; function dragFreq(cx){ if(!Audio.toneOn) return; const hz=Math.round(80+Math.max(0,Math.min(1,cx/innerWidth))*(1400-80)); toneFreq.value=hz; toneHzv.textContent=hz; Audio.setToneFreq(hz); }
    canvas.addEventListener("pointerdown", e=>{ dragging=true; dragFreq(e.clientX); }); addEventListener("pointermove", e=>{ if(dragging) dragFreq(e.clientX); }); addEventListener("pointerup", ()=>dragging=false);
    addEventListener("resize", resize);

    // boot: compute eigenmodes (heavy, once), then run
    document.getElementById("boot").style.display = "flex";
    resize(); seed(); buildFieldTable();
    setTimeout(() => {
      computeModes(); buildField(0); curMode = 0;
      document.getElementById("boot").style.display = "none";
      if (QP.has("go") || PIN >= 0) document.getElementById("start").style.display = "none";
      requestAnimationFrame(frame);
    }, 30);
  </script>
</body>
</html>
