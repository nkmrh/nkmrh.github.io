<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Diptych — Bolt</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script id="vj-layer-protocol" type="application/json">
    {
      "id": "a",
      "title": "Layer A",
      "badge": "Bolt",
      "controls": [
        { "key": "bpm", "label": "BPM", "type": "range", "min": 40, "max": 220, "step": 1, "default": 120 },
        { "key": "beat", "label": "Beat", "type": "range", "min": 0, "max": 100, "step": 1, "default": 60 },
        { "key": "count", "label": "Bolts", "type": "range", "min": 0, "max": 100, "step": 1, "default": 35 },
        { "key": "speed", "label": "Decay", "type": "range", "min": 0, "max": 100, "step": 1, "default": 45 },
        { "key": "spread", "label": "Slant", "type": "range", "min": 0, "max": 100, "step": 1, "default": 35 },
        { "key": "hue", "label": "Hue", "type": "range", "min": 0, "max": 360, "step": 1, "default": 210 }
      ]
    }
  </script>

  <script>
    const layerProtocol = JSON.parse(document.getElementById("vj-layer-protocol").textContent);
    const requestedSlot = new URLSearchParams(window.location.search).get("slot");
    const layerSlot = requestedSlot === "a" || requestedSlot === "b" ? requestedSlot : layerProtocol.id;
    const runtimeProtocol = { ...layerProtocol, id: layerSlot, title: `Layer ${layerSlot.toUpperCase()}` };
    function postLayerProtocol() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "vj-layer-protocol", protocol: runtimeProtocol }, "*");
      }
    }
    postLayerProtocol();
    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "request-vj-layer-protocol") postLayerProtocol();
    });

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const protocolDefaults = (protocol) =>
      (protocol.controls || []).reduce((acc, control) => { acc[control.key] = control.default; return acc; }, {});
    const state = { ...protocolDefaults(runtimeProtocol) };
    let dpr = 1;
    const bolts = [];
    let lastPhase = 1;

    function requestStateFromHost() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return;
      try { host.postMessage({ type: "request-vj-state", role: "work", slot: layerSlot }, "*"); } catch (error) { console.warn(error); }
    }
    function readStateFromHostWindow() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return null;
      try { return host.__vjState || null; } catch (error) { return null; }
    }
    function syncStateFromStorage() {
      if (readStateFromHostWindow()) return;
      try { const saved = JSON.parse(localStorage.getItem("vj-state") || "null"); if (saved) applyLayer(saved[layerSlot]); } catch (error) { console.warn(error); }
    }
    function applyLayer(next) { if (next) Object.assign(state, next); }
    function resize() {
      dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    function getGlobalTime(now) { return (performance.timeOrigin + now) * 0.001; }

    function spawnBolt() {
      const w = window.innerWidth, h = window.innerHeight;
      const pw = 0.7 + state.beat / 100 * 0.9;   // beat = brightness/thickness
      const n = 1 + Math.round(state.count / 100 * 4);  // bolts per strike
      const slant = w * 0.5 * (state.spread / 100); // bottom-vs-top x deviation
      for (let i = 0; i < n; i++) {
        const x0 = Math.random() * w;
        const x1 = x0 + (Math.random() - 0.5) * 2 * slant;
        const hue = (state.hue + (Math.random() - 0.5) * 40 + 360) % 360;
        bolts.push({ main: [[x0, 0], [x1, h]], life: 1, hue, pw });
      }
    }

    function polyline(pts, hue, a, wd) {
      ctx.strokeStyle = `hsla(${hue}, 80%, 70%, ${a * 0.28})`;
      ctx.lineWidth = wd * 2.0;
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.stroke();
      ctx.strokeStyle = `hsla(${hue}, 95%, 92%, ${a})`;
      ctx.lineWidth = wd;
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.stroke();
    }

    function draw(now) {
      const t = getGlobalTime(now);
      const w = window.innerWidth, h = window.innerHeight;

      const phase = (t * state.bpm / 60) % 1;
      if (phase < lastPhase) spawnBolt(); // crossed a beat
      lastPhase = phase;
      if (Math.random() < 0.008) spawnBolt();

      ctx.fillStyle = "rgba(0, 0, 0, 0.32)";
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      const decay = 0.03 + state.speed / 100 * 0.06;
      for (const bo of bolts) {
        bo.life -= decay;
        polyline(bo.main, bo.hue, Math.max(0, bo.life), 2.4 * bo.pw);
      }
      for (let i = bolts.length - 1; i >= 0; i--) { if (bolts[i].life <= 0) bolts.splice(i, 1); }
      ctx.globalCompositeOperation = "source-over";
      requestAnimationFrame(draw);
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "vj-state" && event.data.state) applyLayer(event.data.state[layerSlot]);
    });
    window.addEventListener("storage", () => { syncStateFromStorage(); });
    function syncStateFromHostWindow() { const hostState = readStateFromHostWindow(); if (hostState) applyLayer(hostState[layerSlot]); }

    window.addEventListener("resize", resize);
    resize();
    spawnBolt();
    requestAnimationFrame(draw);
    syncStateFromHostWindow();
    syncStateFromStorage();
    requestStateFromHost();
    window.setInterval(syncStateFromHostWindow, 120);
    window.setInterval(syncStateFromStorage, 120);
  </script>
</body>
</html>
