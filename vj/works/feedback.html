<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Diptych — Feedback</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script id="vj-layer-protocol" type="application/json">
    {
      "id": "a",
      "title": "Layer A",
      "badge": "Feedback",
      "controls": [
        { "key": "bpm", "label": "BPM", "type": "range", "min": 40, "max": 220, "step": 1, "default": 120 },
        { "key": "beat", "label": "Beat", "type": "range", "min": 0, "max": 100, "step": 1, "default": 65 },
        { "key": "speed", "label": "Spin", "type": "range", "min": 0, "max": 100, "step": 1, "default": 55 },
        { "key": "zoom", "label": "Zoom", "type": "range", "min": 0, "max": 100, "step": 1, "default": 45 },
        { "key": "count", "label": "Sources", "type": "range", "min": 0, "max": 100, "step": 1, "default": 50 },
        { "key": "hue", "label": "Hue", "type": "range", "min": 0, "max": 360, "step": 1, "default": 180 }
      ]
    }
  </script>

  <script>
    const layerProtocol = JSON.parse(document.getElementById("vj-layer-protocol").textContent);
    const requestedSlot = new URLSearchParams(window.location.search).get("slot");
    const layerSlot = requestedSlot === "a" || requestedSlot === "b" ? requestedSlot : layerProtocol.id;
    const runtimeProtocol = { ...layerProtocol, id: layerSlot, title: `Layer ${layerSlot.toUpperCase()}` };
    function postLayerProtocol() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "vj-layer-protocol", protocol: runtimeProtocol }, "*");
      }
    }
    postLayerProtocol();
    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "request-vj-layer-protocol") postLayerProtocol();
    });

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const protocolDefaults = (protocol) =>
      (protocol.controls || []).reduce((acc, control) => { acc[control.key] = control.default; return acc; }, {});
    const state = { ...protocolDefaults(runtimeProtocol) };
    let dpr = 1;

    function requestStateFromHost() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return;
      try { host.postMessage({ type: "request-vj-state", role: "work", slot: layerSlot }, "*"); } catch (error) { console.warn(error); }
    }
    function readStateFromHostWindow() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return null;
      try { return host.__vjState || null; } catch (error) { return null; }
    }
    function syncStateFromStorage() {
      // Prefer the live host state; the stale localStorage fights it during Auto Mix.
      if (readStateFromHostWindow()) return;
      try { const saved = JSON.parse(localStorage.getItem("vj-state") || "null"); if (saved) applyLayer(saved[layerSlot]); } catch (error) { console.warn(error); }
    }
    function applyLayer(next) { if (next) Object.assign(state, next); }
    function resize() {
      dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    function getGlobalTime(now) { return (performance.timeOrigin + now) * 0.001; }
    function kick(time) { const phase = (time * state.bpm / 60) % 1; return Math.pow(1 - phase, 6); }

    function draw(now) {
      const time = getGlobalTime(now);
      const w = window.innerWidth, h = window.innerHeight;
      const cx = w * 0.5, cy = h * 0.5;
      const beat = kick(time) * state.beat / 100;
      const zoom = 1 + 0.004 + state.zoom / 100 * 0.03;
      const rot = (state.speed - 50) / 50 * 0.026;

      // Feedback: redraw the previous frame zoomed + rotated about the centre.
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);
      ctx.scale(zoom, zoom);
      ctx.translate(-cx, -cy);
      ctx.globalAlpha = 0.95;
      ctx.drawImage(canvas, 0, 0, w, h);
      ctx.restore();
      ctx.globalAlpha = 1;
      ctx.fillStyle = "rgba(0, 0, 0, 0.06)";
      ctx.fillRect(0, 0, w, h);

      // New bright sources feeding the loop.
      ctx.globalCompositeOperation = "lighter";
      const count = Math.round(2 + state.count / 12);
      for (let i = 0; i < count; i++) {
        const ang = time * (0.5 + i * 0.3) + i * 2.0;
        const rad = Math.min(w, h) * 0.22 * (0.4 + 0.6 * Math.sin(time * 0.6 + i));
        const x = cx + Math.cos(ang) * rad;
        const y = cy + Math.sin(ang) * rad;
        const hue = (state.hue + i * 40 + time * 30) % 360;
        const size = 6 + beat * 18;
        const g = ctx.createRadialGradient(x, y, 0, x, y, size);
        g.addColorStop(0, `hsla(${hue}, 90%, 66%, 0.9)`);
        g.addColorStop(1, "hsla(0, 0%, 0%, 0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalCompositeOperation = "source-over";
      requestAnimationFrame(draw);
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "vj-state" && event.data.state) applyLayer(event.data.state[layerSlot]);
    });
    window.addEventListener("storage", () => { syncStateFromStorage(); });
    function syncStateFromHostWindow() { const hostState = readStateFromHostWindow(); if (hostState) applyLayer(hostState[layerSlot]); }

    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(draw);
    syncStateFromHostWindow();
    syncStateFromStorage();
    requestStateFromHost();
    window.setInterval(syncStateFromHostWindow, 120);
    window.setInterval(syncStateFromStorage, 120);
  </script>
</body>
</html>
