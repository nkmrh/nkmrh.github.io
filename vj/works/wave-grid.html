<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VJ Work — Wave Grid</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script id="vj-layer-protocol" type="application/json">
    {
      "id": "a",
      "title": "Layer A",
      "badge": "Wave grid",
      "controls": [
        { "key": "speed", "label": "Speed", "type": "range", "min": 0, "max": 100, "step": 1, "default": 50 },
        { "key": "density", "label": "Density", "type": "range", "min": 0, "max": 100, "step": 1, "default": 50 },
        { "key": "warp", "label": "Warp", "type": "range", "min": 0, "max": 100, "step": 1, "default": 55 },
        { "key": "bpm", "label": "BPM", "type": "range", "min": 40, "max": 220, "step": 1, "default": 110 },
        { "key": "beat", "label": "Beat", "type": "range", "min": 0, "max": 100, "step": 1, "default": 60 },
        { "key": "hue", "label": "Hue", "type": "range", "min": 0, "max": 360, "step": 1, "default": 150 },
        { "key": "intensity", "label": "Intensity", "type": "range", "min": 0, "max": 100, "step": 1, "default": 80 },
        { "key": "motion", "label": "Motion", "type": "segmented", "default": "flow", "options": [
          { "value": "flow", "label": "Flow" },
          { "value": "pulse", "label": "Pulse" },
          { "value": "cut", "label": "Cut" }
        ] }
      ]
    }
  </script>

  <script>
    /* ===== ボイラープレート: 通常は編集不要 ===== */
    const layerProtocol = JSON.parse(document.getElementById("vj-layer-protocol").textContent);
    const requestedSlot = new URLSearchParams(window.location.search).get("slot");
    const layerSlot = requestedSlot === "a" || requestedSlot === "b" ? requestedSlot : layerProtocol.id;
    const runtimeProtocol = {
      ...layerProtocol,
      id: layerSlot,
      title: `Layer ${layerSlot.toUpperCase()}`
    };
    function postLayerProtocol() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "vj-layer-protocol", protocol: runtimeProtocol }, "*");
      }
    }
    postLayerProtocol();
    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "request-vj-layer-protocol") postLayerProtocol();
    });

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const protocolDefaults = (protocol) =>
      (protocol.controls || []).reduce((acc, control) => {
        acc[control.key] = control.default;
        return acc;
      }, {});
    const state = { ...protocolDefaults(runtimeProtocol) };
    let dpr = 1;

    function requestStateFromHost() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return;
      try {
        host.postMessage({ type: "request-vj-state", role: "work", slot: layerSlot }, "*");
      } catch (error) {
        console.warn(error);
      }
    }

    function readStateFromHostWindow() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return null;
      try {
        return host.__vjState || null;
      } catch (error) {
        return null;
      }
    }

    function syncStateFromStorage() {
      try {
        const saved = JSON.parse(localStorage.getItem("vj-state") || "null");
        if (saved) applyLayer(saved[layerSlot]);
      } catch (error) {
        console.warn(error);
      }
    }

    function applyLayer(next) {
      if (!next) return;
      Object.assign(state, next);
    }

    function resize() {
      dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function getGlobalTime(now) {
      return (performance.timeOrigin + now) * 0.001;
    }

    function pulse(time) {
      const phase = (time * state.bpm / 60) % 1;
      const kick = Math.pow(1 - phase, 6);
      if (state.motion === "cut") return phase < 0.5 ? 1 : 0.25;
      if (state.motion === "pulse") return 0.7 + kick * state.beat / 80;
      return 1 + kick * state.beat / 150;
    }

    /* ===== 描画: 波打つ点グリッド。density/warp は任意キーの実例 ===== */
    function draw(now) {
      const time = getGlobalTime(now);
      const w = window.innerWidth;
      const h = window.innerHeight;
      const beat = pulse(time);
      const intensity = state.intensity / 100;
      const speed = 0.2 + state.speed / 60;
      const cols = Math.round(8 + state.density / 4);          // 8..33 列
      const rows = Math.max(2, Math.round(cols * h / w));
      const amp = (10 + state.warp) * beat;                    // 変位の振幅 (px)
      const dotSize = Math.max(1.5, Math.min(w, h) / cols * 0.12);

      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "rgba(0, 0, 0, 0.22)";
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = "lighter";

      for (let gx = 0; gx <= cols; gx++) {
        for (let gy = 0; gy <= rows; gy++) {
          const u = gx / cols;
          const v = gy / rows;
          const wave =
            Math.sin(u * Math.PI * 2 * 1.5 + time * speed) +
            Math.cos(v * Math.PI * 2 * 1.2 - time * speed * 0.8);
          const x = u * w + Math.cos(wave + time * speed) * amp;
          const y = v * h + Math.sin(wave * 1.3 - time * speed) * amp;
          const hue = (state.hue + (u + v) * 120 + time * state.speed) % 360;
          const alpha = (0.22 + 0.25 * (0.5 + 0.5 * Math.sin(wave))) * intensity;
          ctx.fillStyle = `hsla(${hue}, 95%, 65%, ${alpha})`;
          ctx.beginPath();
          ctx.arc(x, y, dotSize * (0.7 + 0.5 * beat), 0, Math.PI * 2);
          ctx.fill();
        }
      }

      requestAnimationFrame(draw);
    }

    /* ===== ボイラープレート: 状態の受信(編集不要) ===== */
    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "vj-state" && event.data.state) {
        applyLayer(event.data.state[layerSlot]);
      }
    });

    window.addEventListener("storage", () => {
      syncStateFromStorage();
    });

    function syncStateFromHostWindow() {
      const hostState = readStateFromHostWindow();
      if (hostState) applyLayer(hostState[layerSlot]);
    }

    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(draw);
    syncStateFromHostWindow();
    syncStateFromStorage();
    requestStateFromHost();
    window.setInterval(syncStateFromHostWindow, 120);
    window.setInterval(syncStateFromStorage, 120);
  </script>
</body>
</html>
