<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Diptych — Gyro</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script id="vj-layer-protocol" type="application/json">
    {
      "id": "a",
      "title": "Layer A",
      "badge": "Gyro",
      "controls": [
        { "key": "bpm", "label": "BPM", "type": "range", "min": 40, "max": 220, "step": 1, "default": 120 },
        { "key": "beat", "label": "Beat", "type": "range", "min": 0, "max": 100, "step": 1, "default": 50 },
        { "key": "count", "label": "Rings", "type": "range", "min": 0, "max": 100, "step": 1, "default": 45 },
        { "key": "speed", "label": "Spin", "type": "range", "min": 0, "max": 100, "step": 1, "default": 45 },
        { "key": "spread", "label": "Spread", "type": "range", "min": 0, "max": 100, "step": 1, "default": 50 },
        { "key": "hue", "label": "Tint", "type": "range", "min": 0, "max": 360, "step": 1, "default": 210 }
      ]
    }
  </script>

  <script>
    const layerProtocol = JSON.parse(document.getElementById("vj-layer-protocol").textContent);
    const requestedSlot = new URLSearchParams(window.location.search).get("slot");
    const layerSlot = requestedSlot === "a" || requestedSlot === "b" ? requestedSlot : layerProtocol.id;
    const runtimeProtocol = { ...layerProtocol, id: layerSlot, title: `Layer ${layerSlot.toUpperCase()}` };
    function postLayerProtocol() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "vj-layer-protocol", protocol: runtimeProtocol }, "*");
      }
    }
    postLayerProtocol();
    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "request-vj-layer-protocol") postLayerProtocol();
    });

    const protocolDefaults = (protocol) =>
      (protocol.controls || []).reduce((acc, control) => { acc[control.key] = control.default; return acc; }, {});
    const state = { ...protocolDefaults(runtimeProtocol) };

    function requestStateFromHost() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return;
      try { host.postMessage({ type: "request-vj-state", role: "work", slot: layerSlot }, "*"); } catch (error) { console.warn(error); }
    }
    function readStateFromHostWindow() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return null;
      try { return host.__vjState || null; } catch (error) { return null; }
    }
    function syncStateFromStorage() {
      if (readStateFromHostWindow()) return;
      try { const saved = JSON.parse(localStorage.getItem("vj-state") || "null"); if (saved) applyLayer(saved[layerSlot]); } catch (error) { console.warn(error); }
    }
    function applyLayer(next) { if (next) Object.assign(state, next); }
    function getGlobalTime(now) { return (performance.timeOrigin + now) * 0.001; }
    function kick(time) { const phase = (time * state.bpm / 60) % 1; return Math.pow(1 - phase, 6); }

    const canvas = document.getElementById("canvas");
    const gl = canvas.getContext("webgl", { antialias: false, premultipliedAlpha: false });
    let dpr = 1;

    const VS = "attribute vec2 p; void main(){ gl_Position = vec4(p, 0.0, 1.0); }";
    const FS = `
      precision highp float;
      uniform vec2 u_res;
      uniform float u_time, u_maxr, u_tube, u_countf, u_beat, u_hue;
      uniform int u_count;

      vec3 hsv(float h, float s, float v){
        vec3 c = clamp(abs(mod(h*6.0 + vec3(0.0,4.0,2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0);
        return v * mix(vec3(1.0), c, s);
      }
      mat3 rotX(float a){ float c = cos(a), s = sin(a); return mat3(1.0,0.0,0.0, 0.0,c,-s, 0.0,s,c); }
      mat3 rotY(float a){ float c = cos(a), s = sin(a); return mat3(c,0.0,s, 0.0,1.0,0.0, -s,0.0,c); }
      float sdTorus(vec3 p, float R, float r){ vec2 q = vec2(length(p.xz) - R, p.y); return length(q) - r; }

      float map(vec3 p){
        float d = 1e9;
        for (int i = 0; i < 8; i++){
          if (i >= u_count) break;
          float fi = float(i);
          float ax = u_time * (0.6 + fi * 0.09) + fi * 0.9;
          float ay = u_time * (0.42 - fi * 0.05) + fi * 1.7;
          vec3 q = rotX(ax) * rotY(ay) * p;
          float R = u_maxr * (0.34 + 0.66 * (fi + 1.0) / u_countf);
          d = min(d, sdTorus(q, R, u_tube));
        }
        return d;
      }
      vec3 calcNormal(vec3 p){
        vec2 e = vec2(0.0012, 0.0);
        return normalize(vec3(
          map(p + e.xyy) - map(p - e.xyy),
          map(p + e.yxy) - map(p - e.yxy),
          map(p + e.yyx) - map(p - e.yyx)
        ));
      }
      // procedural chrome environment sampled by the reflection vector
      vec3 envColor(vec3 r){
        float g = smoothstep(-0.4, 0.9, r.y);
        vec3 col = mix(vec3(0.03, 0.04, 0.06), vec3(0.55, 0.62, 0.72), g);
        col += vec3(1.0) * pow(max(0.0, 1.0 - abs(r.y - 0.15) * 2.2), 6.0) * 0.7; // horizon band
        col += vec3(0.9, 0.95, 1.0) * pow(max(0.0, r.y), 8.0) * 0.5;             // sky hotspot
        return col;
      }

      void main(){
        vec2 uv = (gl_FragCoord.xy - 0.5 * u_res) / u_res.y;
        vec3 ro = vec3(0.0, 0.0, -3.3);
        vec3 rd = normalize(vec3(uv, 1.45));

        // cone footprint of one pixel along the ray, used for silhouette coverage
        float cone = 1.2 / u_res.y;
        float t = 0.0;
        float dist = 1.0;
        float edge = 1.0;
        vec3 pos;
        for (int s = 0; s < 90; s++){
          pos = ro + rd * t;
          dist = map(pos);
          edge = min(edge, dist / max(cone * t, 1e-5)); // closest approach in pixel units
          if (dist < 0.0006) break;
          t += dist;
          if (t > 7.0) break;
        }
        float cov = 1.0 - clamp(edge, 0.0, 1.0); // anti-aliased silhouette coverage

        vec3 col = vec3(0.0);
        if (cov > 0.002){
          vec3 n = calcNormal(pos);
          vec3 viewd = normalize(ro - pos);
          vec3 r = reflect(-viewd, n);
          vec3 env = envColor(r);
          vec3 L = normalize(vec3(0.5, 0.85, -0.55));
          float spec = pow(max(dot(r, L), 0.0), 48.0);
          float fres = pow(1.0 - max(dot(viewd, n), 0.0), 3.0);
          vec3 tint = hsv(fract(u_hue), 0.26, 1.0);
          col = env * tint * (0.35 + 0.65 * fres);
          col += vec3(1.0) * spec * 1.6;
          col += tint * 0.12;
          col *= 0.85 + u_beat * 0.45;
          col = pow(clamp(col, 0.0, 1.0), vec3(0.85)) * cov;
        }
        gl_FragColor = vec4(col, 1.0);
      }
    `;

    function compile(type, src) {
      const sh = gl.createShader(type);
      gl.shaderSource(sh, src);
      gl.compileShader(sh);
      if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) console.warn(gl.getShaderInfoLog(sh));
      return sh;
    }
    let U = {};
    if (gl) {
      const prog = gl.createProgram();
      gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
      gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
      gl.linkProgram(prog);
      gl.useProgram(prog);
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
      const loc = gl.getAttribLocation(prog, "p");
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
      U = {
        res: gl.getUniformLocation(prog, "u_res"),
        time: gl.getUniformLocation(prog, "u_time"),
        maxr: gl.getUniformLocation(prog, "u_maxr"),
        tube: gl.getUniformLocation(prog, "u_tube"),
        count: gl.getUniformLocation(prog, "u_count"),
        countf: gl.getUniformLocation(prog, "u_countf"),
        beat: gl.getUniformLocation(prog, "u_beat"),
        hue: gl.getUniformLocation(prog, "u_hue")
      };
    }

    function resize() {
      dpr = Math.min(1.75, window.devicePixelRatio || 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
    }

    function draw(now) {
      const time = now * 0.001 * (0.15 + state.speed / 100 * 0.8);
      if (gl) {
        const rings = Math.round(2 + state.count / 100 * 6);
        gl.uniform2f(U.res, canvas.width, canvas.height);
        gl.uniform1f(U.time, time);
        gl.uniform1f(U.maxr, 0.55 + state.spread / 100 * 0.6);
        gl.uniform1f(U.tube, 0.05 + state.spread / 100 * 0.03);
        gl.uniform1i(U.count, rings);
        gl.uniform1f(U.countf, rings);
        gl.uniform1f(U.beat, kick(getGlobalTime(now)) * state.beat / 100);
        gl.uniform1f(U.hue, state.hue / 360);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "vj-state" && event.data.state) applyLayer(event.data.state[layerSlot]);
    });
    window.addEventListener("storage", () => { syncStateFromStorage(); });
    function syncStateFromHostWindow() { const hostState = readStateFromHostWindow(); if (hostState) applyLayer(hostState[layerSlot]); }

    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(draw);
    syncStateFromHostWindow();
    syncStateFromStorage();
    requestStateFromHost();
    window.setInterval(syncStateFromHostWindow, 120);
    window.setInterval(syncStateFromStorage, 120);
  </script>
</body>
</html>
