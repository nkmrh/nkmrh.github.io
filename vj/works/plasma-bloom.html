<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VJ Layer A</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script id="vj-layer-protocol" type="application/json">
    {
      "id": "a",
      "title": "Layer A",
      "badge": "Plasma bloom",
      "defaults": {
        "bpm": 124,
        "beat": 55,
        "speed": 50,
        "scale": 50,
        "spread": 62,
        "hue": 185,
        "intensity": 80,
        "motion": "flow"
      },
      "controls": [
        { "key": "spread", "label": "Spread", "type": "range", "min": 0, "max": 100, "step": 1 }
      ]
    }
  </script>
  <script>
    const layerProtocol = JSON.parse(document.getElementById("vj-layer-protocol").textContent);
    const requestedSlot = new URLSearchParams(window.location.search).get("slot");
    const layerSlot = requestedSlot === "a" || requestedSlot === "b" ? requestedSlot : layerProtocol.id;
    const runtimeProtocol = {
      ...layerProtocol,
      id: layerSlot,
      title: `Layer ${layerSlot.toUpperCase()}`
    };
    function postLayerProtocol() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "vj-layer-protocol", protocol: runtimeProtocol }, "*");
      }
    }
    postLayerProtocol();
    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "request-vj-layer-protocol") postLayerProtocol();
    });
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const state = { ...runtimeProtocol.defaults };
    let dpr = 1;

    function requestStateFromHost() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return;
      try {
        host.postMessage({ type: "request-vj-state", role: "work", slot: layerSlot }, "*");
      } catch (error) {
        console.warn(error);
      }
    }

    function readStateFromHostWindow() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return null;
      try {
        return host.__vjState || null;
      } catch (error) {
        return null;
      }
    }

    function syncStateFromStorage() {
      try {
        const saved = JSON.parse(localStorage.getItem("vj-state") || "null");
        if (saved) applyLayer(saved[layerSlot]);
      } catch (error) {
        console.warn(error);
      }
    }

    function resize() {
      dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function applyLayer(next) {
      if (!next) return;
      Object.assign(state, next);
    }

    function pulse(time) {
      const phase = (time * state.bpm / 60) % 1;
      const kick = Math.pow(1 - phase, 6);
      if (state.motion === "cut") return phase < 0.5 ? 1 : 0.18;
      if (state.motion === "pulse") return 0.72 + kick * state.beat / 80;
      return 1 + kick * state.beat / 150;
    }

    function getGlobalTime(now) {
      return (performance.timeOrigin + now) * 0.001;
    }

    function draw(now) {
      const time = getGlobalTime(now);
      const w = window.innerWidth;
      const h = window.innerHeight;
      const cx = w * 0.5;
      const cy = h * 0.5;
      const speed = 0.18 + state.speed / 80;
      const scale = 0.7 + state.scale / 80;
      const spread = 0.45 + state.spread / 65;
      const beat = pulse(time);
      const intensity = state.intensity / 100;

      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = "lighter";

      for (let i = 0; i < 34; i++) {
        const ring = i / 34;
        const angle = time * speed * (0.25 + ring) + i * 0.74;
        const radius = Math.min(w, h) * (0.08 + ring * 0.58) * scale * spread * beat;
        const wobble = Math.sin(time * speed * 1.7 + i * 1.9) * 0.18;
        const x = cx + Math.cos(angle + wobble) * radius * 0.82;
        const y = cy + Math.sin(angle * 1.17 - wobble) * radius * 0.62;
        const size = Math.min(w, h) * (0.06 + ring * 0.08) * (0.75 + spread * 0.35) * beat;
        const hue = (state.hue + i * 8 + time * state.speed * 2) % 360;
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
        gradient.addColorStop(0, `hsla(${hue}, 95%, 68%, ${0.23 * intensity})`);
        gradient.addColorStop(0.38, `hsla(${(hue + 36) % 360}, 90%, 54%, ${0.11 * intensity})`);
        gradient.addColorStop(1, "hsla(0, 0%, 0%, 0)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalCompositeOperation = "screen";
      for (let i = 0; i < 18; i++) {
        const angle = i * Math.PI * 2 / 18 + time * speed * 0.35;
        const hue = (state.hue + 120 + i * 5) % 360;
        ctx.strokeStyle = `hsla(${hue}, 95%, 72%, ${0.03 + 0.05 * intensity})`;
        ctx.lineWidth = 1.4 + beat * 2.2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.bezierCurveTo(
          cx + Math.cos(angle) * w * 0.18,
          cy + Math.sin(angle * 1.4) * h * 0.22,
          cx + Math.cos(angle + time * 0.31) * w * 0.46,
          cy + Math.sin(angle - time * 0.24) * h * 0.44,
          cx + Math.cos(angle) * w,
          cy + Math.sin(angle) * h
        );
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "vj-state" && event.data.state) {
        applyLayer(event.data.state[layerSlot]);
      }
    });

    window.addEventListener("storage", () => {
      syncStateFromStorage();
    });

    function syncStateFromHostWindow() {
      const hostState = readStateFromHostWindow();
      if (hostState) applyLayer(hostState[layerSlot]);
    }

    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(draw);
    syncStateFromHostWindow();
    syncStateFromStorage();
    requestStateFromHost();
    window.setInterval(syncStateFromHostWindow, 120);
    window.setInterval(syncStateFromStorage, 120);
  </script>
</body>
</html>
