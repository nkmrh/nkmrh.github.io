<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Diptych — Worms</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script id="vj-layer-protocol" type="application/json">
    {
      "id": "a",
      "title": "Layer A",
      "badge": "Worms",
      "controls": [{"key":"bpm","label":"BPM","type":"range","min":40,"max":220,"step":1,"default":120},{"key":"beat","label":"Beat","type":"range","min":0,"max":100,"step":1,"default":40},{"key":"count","label":"Count","type":"range","min":0,"max":100,"step":1,"default":50},{"key":"speed","label":"Speed","type":"range","min":0,"max":100,"step":1,"default":45},{"key":"spread","label":"Curl","type":"range","min":0,"max":100,"step":1,"default":50},{"key":"hue","label":"Hue","type":"range","min":0,"max":360,"step":1,"default":120}]
    }
  </script>

  <script>
    const layerProtocol = JSON.parse(document.getElementById("vj-layer-protocol").textContent);
    const requestedSlot = new URLSearchParams(window.location.search).get("slot");
    const layerSlot = requestedSlot === "a" || requestedSlot === "b" ? requestedSlot : layerProtocol.id;
    const runtimeProtocol = { ...layerProtocol, id: layerSlot, title: `Layer ${layerSlot.toUpperCase()}` };
    function postLayerProtocol() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "vj-layer-protocol", protocol: runtimeProtocol }, "*");
      }
    }
    postLayerProtocol();
    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "request-vj-layer-protocol") postLayerProtocol();
    });

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const protocolDefaults = (protocol) =>
      (protocol.controls || []).reduce((acc, control) => { acc[control.key] = control.default; return acc; }, {});
    const state = { ...protocolDefaults(runtimeProtocol) };
    let dpr = 1;
    const worms = [];
    let wid = 0;
    function mkW(w, h) { return { x: Math.random() * w, y: Math.random() * h, trail: [], len: 10 + Math.floor(Math.random() * 20), id: wid++ }; }

    function requestStateFromHost() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return;
      try { host.postMessage({ type: "request-vj-state", role: "work", slot: layerSlot }, "*"); } catch (error) { console.warn(error); }
    }
    function readStateFromHostWindow() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return null;
      try { return host.__vjState || null; } catch (error) { return null; }
    }
    function syncStateFromStorage() {
      if (readStateFromHostWindow()) return;
      try { const saved = JSON.parse(localStorage.getItem("vj-state") || "null"); if (saved) applyLayer(saved[layerSlot]); } catch (error) { console.warn(error); }
    }
    function applyLayer(next) { if (next) Object.assign(state, next); }
    function resize() {
      dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    function getGlobalTime(now) { return (performance.timeOrigin + now) * 0.001; }
    function kick(time) { const phase = (time * state.bpm / 60) % 1; return Math.pow(1 - phase, 6); }

    function draw(now) {
      const w = window.innerWidth, h = window.innerHeight;
      const t = getGlobalTime(now);
      const beat = 1 + kick(t) * state.beat / 100 * 0.3;
      const n = Math.round(8 + state.count / 100 * 40);
      while (worms.length < n) worms.push(mkW(w, h));
      if (worms.length > n) worms.length = n;
      ctx.fillStyle = "rgba(0,0,0,0.14)"; ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      const sp = 1.0 + state.speed / 100 * 3.0;
      const sc = 0.0015 + (100 - state.spread) / 100 * 0.004;
      for (const wm of worms) {
        const ang = Math.sin(wm.x * sc + t) * 2.0 + Math.cos(wm.y * sc * 1.3 - t * 0.7) * 2.0;
        wm.x += Math.cos(ang) * sp; wm.y += Math.sin(ang) * sp;
        if (wm.x < 0) wm.x += w; else if (wm.x > w) wm.x -= w;
        if (wm.y < 0) wm.y += h; else if (wm.y > h) wm.y -= h;
        wm.trail.push(wm.x, wm.y);
        if (wm.trail.length > wm.len * 2) wm.trail.splice(0, wm.trail.length - wm.len * 2);
        const hue = (state.hue + wm.id * 8 + t * 10) % 360;
        ctx.strokeStyle = "hsla(" + hue + ",85%,62%,0.7)";
        ctx.lineWidth = 3 * beat;
        ctx.beginPath();
        for (let i = 0; i < wm.trail.length; i += 2) {
          if (i === 0) ctx.moveTo(wm.trail[0], wm.trail[1]);
          else if (Math.abs(wm.trail[i] - wm.trail[i - 2]) < w * 0.5 && Math.abs(wm.trail[i + 1] - wm.trail[i - 1]) < h * 0.5) ctx.lineTo(wm.trail[i], wm.trail[i + 1]);
          else ctx.moveTo(wm.trail[i], wm.trail[i + 1]);
        }
        ctx.stroke();
      }
      ctx.globalCompositeOperation = "source-over";
      requestAnimationFrame(draw);
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "vj-state" && event.data.state) applyLayer(event.data.state[layerSlot]);
    });
    window.addEventListener("storage", () => { syncStateFromStorage(); });
    function syncStateFromHostWindow() { const hostState = readStateFromHostWindow(); if (hostState) applyLayer(hostState[layerSlot]); }

    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(draw);
    syncStateFromHostWindow();
    syncStateFromStorage();
    requestStateFromHost();
    window.setInterval(syncStateFromHostWindow, 120);
    window.setInterval(syncStateFromStorage, 120);
  </script>
</body>
</html>
