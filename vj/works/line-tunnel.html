<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VJ Layer B</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script id="vj-layer-protocol" type="application/json">
    {
      "id": "b",
      "title": "Layer B",
      "badge": "Line tunnel",
      "defaults": {
        "bpm": 93,
        "beat": 65,
        "speed": 45,
        "scale": 54,
        "twist": 48,
        "hue": 310,
        "intensity": 82,
        "motion": "flow"
      },
      "controls": [
        { "key": "twist", "label": "Twist", "type": "range", "min": 0, "max": 100, "step": 1 }
      ]
    }
  </script>
  <script>
    const layerProtocol = JSON.parse(document.getElementById("vj-layer-protocol").textContent);
    const requestedSlot = new URLSearchParams(window.location.search).get("slot");
    const layerSlot = requestedSlot === "a" || requestedSlot === "b" ? requestedSlot : layerProtocol.id;
    const runtimeProtocol = {
      ...layerProtocol,
      id: layerSlot,
      title: `Layer ${layerSlot.toUpperCase()}`
    };
    function postLayerProtocol() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "vj-layer-protocol", protocol: runtimeProtocol }, "*");
      }
    }
    postLayerProtocol();
    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "request-vj-layer-protocol") postLayerProtocol();
    });
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const state = { ...runtimeProtocol.defaults };
    function requestStateFromHost() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return;
      try {
        host.postMessage({ type: "request-vj-state", role: "work", slot: layerSlot }, "*");
      } catch (error) {
        console.warn(error);
      }
    }

    function readStateFromHostWindow() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return null;
      try {
        return host.__vjState || null;
      } catch (error) {
        return null;
      }
    }

    function syncStateFromStorage() {
      try {
        const saved = JSON.parse(localStorage.getItem("vj-state") || "null");
        if (saved) applyLayer(saved[layerSlot]);
      } catch (error) {
        console.warn(error);
      }
    }

    function seededUnit(seed) {
      const value = Math.sin(seed * 12.9898 + 78.233) * 43758.5453;
      return value - Math.floor(value);
    }

    const points = Array.from({ length: 180 }, (_, index) => ({
      index,
      lane: index % 18,
      depth: (index % 10) / 10,
      drift: seededUnit(index + 1) * Math.PI * 2
    }));
    let dpr = 1;

    function resize() {
      dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function applyLayer(next) {
      if (!next) return;
      Object.assign(state, next);
    }

    function pulse(time) {
      const phase = (time * state.bpm / 60) % 1;
      const kick = Math.pow(1 - phase, 5);
      if (state.motion === "cut") return phase < 0.5 ? 1 : 0.08;
      if (state.motion === "pulse") return 0.75 + kick * state.beat / 65;
      return 1 + kick * state.beat / 180;
    }

    function getGlobalTime(now) {
      return (performance.timeOrigin + now) * 0.001;
    }

    function draw(now) {
      const time = getGlobalTime(now);
      const w = window.innerWidth;
      const h = window.innerHeight;
      const cx = w * 0.5;
      const cy = h * 0.5;
      const speed = 0.15 + state.speed / 70;
      const scale = 0.64 + state.scale / 70;
      const twistAmount = state.twist / 100;
      const beat = pulse(time);
      const intensity = state.intensity / 100;

      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "rgba(0, 0, 0, 0.23)";
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = "lighter";

      const visible = points.map((point) => {
        const laneAngle = point.lane / 18 * Math.PI * 2 + time * speed * 0.18;
        const travel = (point.depth + time * speed * 0.13) % 1;
        const perspective = Math.pow(travel, 1.85);
        const radius = perspective * Math.min(w, h) * 0.92 * scale * beat;
        const twist = Math.sin(time * 0.9 + point.drift + travel * 5) * (0.04 + twistAmount * 0.28);
        return {
          x: cx + Math.cos(laneAngle + twist) * radius,
          y: cy + Math.sin(laneAngle * 1.08 - twist) * radius * 0.72,
          alpha: Math.min(1, perspective * 1.4) * intensity,
          size: 1 + perspective * 8 * beat,
          lane: point.lane,
          travel
        };
      });

      for (let lane = 0; lane < 18; lane++) {
        const lanePoints = visible.filter((point) => point.lane === lane).sort((a, b) => a.travel - b.travel);
        ctx.beginPath();
        lanePoints.forEach((point, index) => {
          if (index === 0) ctx.moveTo(point.x, point.y);
          else ctx.lineTo(point.x, point.y);
        });
        ctx.strokeStyle = `hsla(${(state.hue + lane * 7 + time * 8) % 360}, 95%, 66%, ${0.12 * intensity})`;
        ctx.lineWidth = 1.1 + beat * 1.5;
        ctx.stroke();
      }

      visible.forEach((point, index) => {
        const hue = (state.hue + point.lane * 9 + point.travel * 80 + time * state.speed * 0.6) % 360;
        ctx.fillStyle = `hsla(${hue}, 100%, 68%, ${0.18 + point.alpha * 0.48})`;
        ctx.beginPath();
        ctx.arc(point.x, point.y, point.size, 0, Math.PI * 2);
        ctx.fill();

        if (index % 5 === 0) {
          ctx.strokeStyle = `hsla(${(hue + 80) % 360}, 100%, 72%, ${0.08 * intensity})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(point.x, point.y, point.size * (4 + beat), 0, Math.PI * 2);
          ctx.stroke();
        }
      });

      requestAnimationFrame(draw);
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "vj-state" && event.data.state) {
        applyLayer(event.data.state[layerSlot]);
      }
    });

    window.addEventListener("storage", () => {
      syncStateFromStorage();
    });

    function syncStateFromHostWindow() {
      const hostState = readStateFromHostWindow();
      if (hostState) applyLayer(hostState[layerSlot]);
    }

    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(draw);
    syncStateFromHostWindow();
    syncStateFromStorage();
    requestStateFromHost();
    window.setInterval(syncStateFromHostWindow, 120);
    window.setInterval(syncStateFromStorage, 120);
  </script>
</body>
</html>
