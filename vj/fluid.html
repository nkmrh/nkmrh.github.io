<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>流体（Fluid）</title>
  <style>
    :root { --ink: #eef0f4; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #000; color: var(--ink); overflow: hidden; font: 13px/1.4 ui-rounded, "Hiragino Maru Gothic ProN", system-ui, sans-serif; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
    #start { position: fixed; inset: 0; z-index: 3; display: flex; flex-direction: column; gap: 16px; align-items: center; justify-content: center; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); }
    #start h1 { font-size: clamp(20px, 3.6vw, 32px); font-weight: 800; } #start p { opacity: 0.72; font-size: 14px; }
    .btn { min-height: 46px; padding: 0 20px; border: 1px solid rgba(255,255,255,0.18); background: #16181e; color: var(--ink); border-radius: 12px; cursor: pointer; font: inherit; font-size: 15px; font-weight: 700; }
    .btn.primary { border-color: rgba(120,200,255,0.5); background: #15303f; } .btn:hover { background: #20242d; }
    #hud { position: fixed; left: 12px; bottom: 12px; right: 12px; z-index: 2; display: none; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .panel { background: rgba(12,14,18,0.62); border: 1px solid rgba(255,255,255,0.14); border-radius: 12px; padding: 10px 12px; backdrop-filter: blur(8px); }
    .ctl { display: inline-flex; flex-direction: column; gap: 3px; min-width: 116px; } .ctl label { font-size: 11px; opacity: 0.7; } .ctl input[type=range] { width: 100%; accent-color: #6cc6ff; }
    .mini { min-height: 34px; padding: 0 12px; font-size: 13px; } .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .meters { display: flex; gap: 5px; align-items: flex-end; height: 30px; } .meter { width: 9px; background: #2a2f39; border-radius: 3px 3px 0 0; align-self: flex-end; } .meter > i { display: block; background: linear-gradient(#6cc6ff,#b98bff); border-radius: 3px 3px 0 0; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="start">
    <h1>流体（Fluid）</h1>
    <p>音で渦と煙が生まれて、流れていきます</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn primary" id="micBtn" type="button">🎤 マイクで はじめる</button>
      <button class="btn" id="toneStartBtn" type="button">🔊 自分で 音を出す</button>
    </div>
    <p style="font-size:12px;opacity:0.5">無音でも ゆっくり 流れます</p>
  </div>
  <div id="hud">
    <div class="panel"><div class="meters" id="meters"></div></div>
    <div class="panel"><div class="row">
      <button class="btn mini" id="toneBtn" type="button">♪ 音を出す</button>
      <div class="ctl"><label>音の高さ <span id="toneHzv">220</span> Hz</label><input id="toneFreq" type="range" min="60" max="900" value="220" /></div>
    </div></div>
    <div class="panel"><div class="row">
      <div class="ctl"><label>勢い（force）</label><input id="force" type="range" min="0" max="100" value="55" /></div>
      <div class="ctl"><label>持続（smoke）</label><input id="hold" type="range" min="0" max="100" value="55" /></div>
      <div class="ctl"><label>Accent 色</label><input id="hue" type="range" min="0" max="360" value="200" /></div>
    </div></div>
    <div class="panel"><div class="row">
      <button class="btn mini" id="invertBtn" type="button">白黒 反転</button>
      <button class="btn mini" id="fsBtn" type="button">⛶</button>
    </div></div>
  </div>

  <script>
    // ===================================================== audio (shared shell)
    const A = {
      ctx:null, analyser:null, freq:null, time:null, prevF:null, hasMic:false, src:null, osc:null, gain:null, toneOn:false, toneHz:220,
      level:0, bass:0, onset:0, fluxAvg:0,
      ensureCtx(){ if(!this.ctx) this.ctx=new (window.AudioContext||window.webkitAudioContext)(); if(this.ctx.state==="suspended") this.ctx.resume(); },
      mkAnalyser(){ this.analyser=this.ctx.createAnalyser(); this.analyser.fftSize=2048; this.analyser.smoothingTimeConstant=0.6;
        this.freq=new Uint8Array(this.analyser.frequencyBinCount); this.time=new Uint8Array(this.analyser.fftSize); this.prevF=new Float32Array(this.analyser.frequencyBinCount); },
      async startMic(){ this.ensureCtx(); this.mkAnalyser(); const st=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
        this.src=this.ctx.createMediaStreamSource(st); this.src.connect(this.analyser); this.hasMic=true; },
      startTone(){ this.ensureCtx(); if(!this.analyser) this.mkAnalyser(); if(!this.osc){ this.gain=this.ctx.createGain(); this.gain.gain.value=0; this.gain.connect(this.ctx.destination);
        this.osc=this.ctx.createOscillator(); this.osc.type="sawtooth"; this.osc.frequency.value=this.toneHz; this.osc.connect(this.gain); this.osc.connect(this.analyser); this.osc.start(); }
        this.gain.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime+0.05); this.toneOn=true; },
      stopTone(){ this.toneOn=false; if(this.gain) this.gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime+0.06); },
      setToneFreq(hz){ this.toneHz=hz; if(this.osc) this.osc.frequency.setTargetAtTime(hz, this.ctx.currentTime, 0.02); },
      sample(){ if(!this.analyser){ this.level=this.bass=0; this.onset*=0.8; return; }
        this.analyser.getByteFrequencyData(this.freq); this.analyser.getByteTimeDomainData(this.time);
        let sum=0; for(let i=0;i<this.time.length;i++){ const v=(this.time[i]-128)/128; sum+=v*v; } this.level=Math.min(1,Math.sqrt(sum/this.time.length)*2.4);
        const N=this.freq.length, ny=this.ctx.sampleRate/2; let bass=0, flux=0;
        for(let i=1;i<N;i++){ const hz=i/N*ny, m=this.freq[i]/255; if(hz<200) bass+=m; const d=m-this.prevF[i]; if(d>0) flux+=d; this.prevF[i]=m; }
        this.bass=Math.min(1, bass/(200/ny*N)*1.2);
        this.fluxAvg=this.fluxAvg*0.92+flux*0.08; const on=Math.max(0,Math.min(1,(flux-this.fluxAvg*1.5)*0.05)); this.onset=Math.max(on,this.onset*0.82); }
    };

    // ===================================================== webgl: stable fluids on float FBOs
    const canvas=document.getElementById("canvas");
    const gl=canvas.getContext("webgl",{antialias:false,alpha:false});
    gl.getExtension("OES_texture_float"); gl.getExtension("OES_texture_float_linear");
    gl.getExtension("OES_texture_half_float"); gl.getExtension("OES_texture_half_float_linear");
    let TYPE=gl.FLOAT, dpr=1, SW=2, SH=2;
    const VS="attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }";
    function mkP(src){ const p=gl.createProgram(); const v=gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(v,VS); gl.compileShader(v);
      const f=gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(f,src); gl.compileShader(f); if(!gl.getShaderParameter(f,gl.COMPILE_STATUS)) console.warn(gl.getShaderInfoLog(f));
      gl.attachShader(p,v); gl.attachShader(p,f); gl.linkProgram(p); return p; }
    const H="precision highp float; uniform vec2 u_texel;";
    const SPLAT = mkP(H+`uniform sampler2D u_t; uniform vec2 u_p; uniform vec4 u_c; uniform float u_r;
      void main(){ vec2 uv=gl_FragCoord.xy*u_texel; float d=distance(uv,u_p); gl_FragColor=texture2D(u_t,uv)+u_c*exp(-d*d/u_r); }`);
    const ADVECT = mkP(H+`uniform sampler2D u_vel,u_src; uniform float u_dt,u_diss;
      void main(){ vec2 uv=gl_FragCoord.xy*u_texel; vec2 v=texture2D(u_vel,uv).xy; vec2 q=uv - u_dt*v*u_texel; gl_FragColor=u_diss*texture2D(u_src,q); }`);
    const DIVERG = mkP(H+`uniform sampler2D u_vel;
      void main(){ vec2 uv=gl_FragCoord.xy*u_texel; float l=texture2D(u_vel,uv-vec2(u_texel.x,0.0)).x, r=texture2D(u_vel,uv+vec2(u_texel.x,0.0)).x;
        float b=texture2D(u_vel,uv-vec2(0.0,u_texel.y)).y, t=texture2D(u_vel,uv+vec2(0.0,u_texel.y)).y; gl_FragColor=vec4(0.5*((r-l)+(t-b)),0.0,0.0,1.0); }`);
    const JACOBI = mkP(H+`uniform sampler2D u_p,u_div;
      void main(){ vec2 uv=gl_FragCoord.xy*u_texel; float l=texture2D(u_p,uv-vec2(u_texel.x,0.0)).x, r=texture2D(u_p,uv+vec2(u_texel.x,0.0)).x;
        float b=texture2D(u_p,uv-vec2(0.0,u_texel.y)).x, t=texture2D(u_p,uv+vec2(0.0,u_texel.y)).x; float d=texture2D(u_div,uv).x; gl_FragColor=vec4((l+r+b+t-d)*0.25,0.0,0.0,1.0); }`);
    const GRADS = mkP(H+`uniform sampler2D u_vel,u_p;
      void main(){ vec2 uv=gl_FragCoord.xy*u_texel; float l=texture2D(u_p,uv-vec2(u_texel.x,0.0)).x, r=texture2D(u_p,uv+vec2(u_texel.x,0.0)).x;
        float b=texture2D(u_p,uv-vec2(0.0,u_texel.y)).x, t=texture2D(u_p,uv+vec2(0.0,u_texel.y)).x; vec2 v=texture2D(u_vel,uv).xy - 0.5*vec2(r-l,t-b); gl_FragColor=vec4(v,0.0,1.0); }`);
    const SHOW = mkP(`precision highp float; uniform sampler2D u_dye; uniform vec2 u_res; uniform float u_hue,u_onset,u_invert;
      vec3 hsv(float h,float s,float v){ vec3 c=clamp(abs(mod(h*6.0+vec3(0.0,4.0,2.0),6.0)-3.0)-1.0,0.0,1.0); return v*mix(vec3(1.0),c,s); }
      void main(){ vec2 uv=gl_FragCoord.xy/u_res; float d=texture2D(u_dye,uv).x;
        float fill=smoothstep(0.05,0.45,d); vec3 plate=vec3(0.03,0.03,0.04), sand=vec3(0.95,0.95,0.93);
        vec3 col=mix(plate,sand,fill); col=mix(col,vec3(1.0)-col,u_invert);
        col=mix(col, hsv(fract(u_hue),0.85,1.0), smoothstep(0.22,0.04,abs(d-0.14))*0.6);
        col += u_onset*0.05; gl_FragColor=vec4(col,1.0); }`);

    const quad=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,quad); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
    function bindQuad(p){ gl.bindBuffer(gl.ARRAY_BUFFER,quad); const l=gl.getAttribLocation(p,"p"); gl.enableVertexAttribArray(l); gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0); }
    const U=(p,n)=>gl.getUniformLocation(p,n);
    function makeT(w,h){ const t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t); gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,TYPE,null);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
      const f=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER,f); gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0); return {t,f}; }
    let vel, vel2, dye, dye2, prs, prs2, dvg;
    function alloc(){ const cap=340, ar=innerWidth/innerHeight;
      if(ar>=1){ SW=cap; SH=Math.max(2,Math.round(cap/ar)); } else { SH=cap; SW=Math.max(2,Math.round(cap*ar)); }
      const probe=makeT(SW,SH); gl.bindFramebuffer(gl.FRAMEBUFFER,probe.f);
      if(gl.checkFramebufferStatus(gl.FRAMEBUFFER)!==gl.FRAMEBUFFER_COMPLETE && TYPE===gl.FLOAT){ const hf=gl.getExtension("OES_texture_half_float"); TYPE=hf?hf.HALF_FLOAT_OES:gl.UNSIGNED_BYTE; }
      vel=makeT(SW,SH); vel2=makeT(SW,SH); dye=makeT(SW,SH); dye2=makeT(SW,SH); prs=makeT(SW,SH); prs2=makeT(SW,SH); dvg=makeT(SW,SH);
      // clear all
      [vel,vel2,dye,dye2,prs,prs2,dvg].forEach(o=>{ gl.bindFramebuffer(gl.FRAMEBUFFER,o.f); gl.viewport(0,0,SW,SH); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT); }); }
    function resize(){ dpr=Math.min(1.75,window.devicePixelRatio||1); canvas.width=Math.floor(innerWidth*dpr); canvas.height=Math.floor(innerHeight*dpr); canvas.style.width=innerWidth+"px"; canvas.style.height=innerHeight+"px"; alloc(); }

    function pass(prog,dst){ gl.bindFramebuffer(gl.FRAMEBUFFER,dst.f); gl.viewport(0,0,SW,SH); gl.useProgram(prog); bindQuad(prog); gl.uniform2f(U(prog,"u_texel"),1/SW,1/SH); }
    function tex(prog,name,t,unit){ gl.activeTexture(gl.TEXTURE0+unit); gl.bindTexture(gl.TEXTURE_2D,t.t); gl.uniform1i(U(prog,name),unit); }
    function draw(){ gl.drawArrays(gl.TRIANGLE_STRIP,0,4); }
    function swap(a){ return [a[1],a[0]]; }

    // splat into a ping-pong field (read src -> write dst with added gaussian), returns swapped pair
    function splat(field, px,py, color, rad){ let [s,d]=field; pass(SPLAT,d); tex(SPLAT,"u_t",s,0); gl.uniform2f(U(SPLAT,"u_p"),px,py); gl.uniform4f(U(SPLAT,"u_c"),color[0],color[1],color[2],color[3]); gl.uniform1f(U(SPLAT,"u_r"),rad); draw(); return [d,s]; }

    // ===================================================== params + loop
    const params={ force:0.55, hold:0.55, hue:200/360, invert:0 };
    const meters=[]; (function(){ const host=document.getElementById("meters"); ["LV","BS","ON"].forEach(()=>{ const m=document.createElement("div"); m.className="meter"; m.style.height="30px"; const i=document.createElement("i"); m.appendChild(i); host.appendChild(m); meters.push(i); }); })();
    let velP=[vel,vel2], dyeP=[dye,dye2], prsP=[prs,prs2];

    function frame(){ A.sample();
      velP=[vel,vel2]; dyeP=[dye,dye2]; prsP=[prs,prs2];
      const F = (0.6+params.force*1.0);
      // 1) forces: rising emitter at bottom centre + onset bursts
      const emit = 0.18 + A.level*0.7;
      velP = splat(velP, 0.5, 0.08, [0, F*2.0*emit, 0, 0], 0.0009);
      dyeP = splat(dyeP, 0.5, 0.08, [emit*0.9, 0,0,0], 0.0009);
      if(A.onset>0.16 || (!A.analyser && Math.random()<0.02)){
        const px=Math.random(), py=0.2+Math.random()*0.6, ang=Math.random()*6.2831, mag=F*(3.0+A.onset*7.0);
        velP = splat(velP, px,py, [Math.cos(ang)*mag, Math.sin(ang)*mag, 0,0], 0.0012);
        dyeP = splat(dyeP, px,py, [0.7+A.onset, 0,0,0], 0.0012);
      }
      // 2) advect velocity
      pass(ADVECT, {f:velP[1].f}); tex(ADVECT,"u_vel",velP[0],0); tex(ADVECT,"u_src",velP[0],1); gl.uniform1f(U(ADVECT,"u_dt"),1.0); gl.uniform1f(U(ADVECT,"u_diss"),0.999); draw(); velP=swap(velP);
      // 3) project: divergence -> jacobi -> subtract gradient
      pass(DIVERG, dvg); tex(DIVERG,"u_vel",velP[0],0); draw();
      gl.bindFramebuffer(gl.FRAMEBUFFER,prsP[0].f); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
      for(let k=0;k<28;k++){ pass(JACOBI, prsP[1]); tex(JACOBI,"u_p",prsP[0],0); tex(JACOBI,"u_div",dvg,1); draw(); prsP=swap(prsP); }
      pass(GRADS, velP[1]); tex(GRADS,"u_vel",velP[0],0); tex(GRADS,"u_p",prsP[0],1); draw(); velP=swap(velP);
      // 4) advect dye by the divergence-free velocity (with smoke persistence)
      const diss = 0.985 + params.hold*0.014;
      pass(ADVECT, dyeP[1]); tex(ADVECT,"u_vel",velP[0],0); tex(ADVECT,"u_src",dyeP[0],1); gl.uniform1f(U(ADVECT,"u_dt"),1.0); gl.uniform1f(U(ADVECT,"u_diss"),diss); draw(); dyeP=swap(dyeP);
      // commit ping-pong back to the named handles
      vel=velP[0]; vel2=velP[1]; dye=dyeP[0]; dye2=dyeP[1]; prs=prsP[0]; prs2=prsP[1];
      // 5) display
      gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.viewport(0,0,canvas.width,canvas.height); gl.useProgram(SHOW); bindQuad(SHOW);
      tex(SHOW,"u_dye",dye,0); gl.uniform2f(U(SHOW,"u_res"),canvas.width,canvas.height); gl.uniform1f(U(SHOW,"u_hue"),params.hue); gl.uniform1f(U(SHOW,"u_onset"),A.onset); gl.uniform1f(U(SHOW,"u_invert"),params.invert);
      draw();
      const mv=[A.level,A.bass,A.onset]; for(let i=0;i<meters.length;i++) meters[i].style.height=Math.round(mv[i]*100)+"%";
      requestAnimationFrame(frame);
    }

    // ===================================================== ui
    function showHud(){ document.getElementById("start").style.display="none"; document.getElementById("hud").style.display="flex"; }
    document.getElementById("micBtn").addEventListener("click", async ()=>{ try{ await A.startMic(); showHud(); }catch(e){ alert("マイクを取得できませんでした: "+e.message); } });
    const toneBtn=document.getElementById("toneBtn"), toneFreq=document.getElementById("toneFreq"), toneHzv=document.getElementById("toneHzv");
    function toneToggle(on){ if(on){ A.startTone(); toneBtn.textContent="♪ 停止"; toneBtn.classList.add("primary"); } else { A.stopTone(); toneBtn.textContent="♪ 音を出す"; toneBtn.classList.remove("primary"); } }
    toneBtn.addEventListener("click", ()=>toneToggle(!A.toneOn));
    toneFreq.addEventListener("input", e=>{ const hz=Number(e.target.value); toneHzv.textContent=hz; A.setToneFreq(hz); });
    document.getElementById("toneStartBtn").addEventListener("click", ()=>{ showHud(); toneToggle(true); });
    document.getElementById("force").addEventListener("input", e=>params.force=e.target.value/100);
    document.getElementById("hold").addEventListener("input", e=>params.hold=e.target.value/100);
    document.getElementById("hue").addEventListener("input", e=>params.hue=e.target.value/360);
    document.getElementById("invertBtn").addEventListener("click", ()=>params.invert=params.invert?0:1);
    document.getElementById("fsBtn").addEventListener("click", ()=>{ if(document.fullscreenElement) document.exitFullscreen(); else document.documentElement.requestFullscreen(); });
    addEventListener("resize", resize);
    resize(); requestAnimationFrame(frame);
  </script>
</body>
</html>
