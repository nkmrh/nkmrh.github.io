<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sonogram — live audio visual synth</title>
  <style>
    :root { --line: rgba(255,255,255,0.16); --ink: #e8eaf0; }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: var(--ink);
      font: 13px/1.4 ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", sans-serif; }
    canvas { position: fixed; inset: 0; display: block; width: 100vw; height: 100vh; }

    /* start overlay */
    #start { position: fixed; inset: 0; display: flex; flex-direction: column; gap: 18px;
      align-items: center; justify-content: center; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); z-index: 3; }
    #start h1 { margin: 0; font-size: 28px; letter-spacing: 0.06em; font-weight: 600; }
    #start p { margin: 0; opacity: 0.7; }
    .srcs { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn { min-height: 44px; padding: 0 18px; border: 1px solid var(--line); background: #181b22; color: var(--ink);
      border-radius: 10px; cursor: pointer; font-size: 14px; }
    .btn:hover { background: #20242d; }
    .btn.primary { border-color: rgba(120,200,255,0.5); background: #16303f; }

    /* hud */
    #hud { position: fixed; left: 12px; bottom: 12px; right: 12px; display: none; gap: 14px; align-items: flex-end;
      flex-wrap: wrap; z-index: 2; }
    .panel { background: rgba(12,14,18,0.62); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px;
      backdrop-filter: blur(8px); }
    .ctl { display: flex; flex-direction: column; gap: 3px; min-width: 116px; }
    .ctl label { font-size: 11px; opacity: 0.7; display: flex; justify-content: space-between; }
    .ctl input[type=range] { width: 100%; accent-color: #6cc6ff; }
    .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
    .meters { display: flex; gap: 6px; align-items: flex-end; height: 40px; }
    .meter { width: 10px; background: #2a2f39; border-radius: 3px 3px 0 0; align-self: flex-end; position: relative; }
    .meter > i { position: absolute; inset: auto 0 0 0; background: linear-gradient(#6cc6ff, #b98bff); border-radius: 3px 3px 0 0; }
    .meter > span { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); font-size: 9px; opacity: 0.6; }
    .mini { min-height: 34px; padding: 0 12px; }
    .hint { position: fixed; top: 10px; right: 12px; font-size: 11px; opacity: 0.45; z-index: 2; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="start">
    <h1>SONOGRAM</h1>
    <p>音を入力として、二度と同じものが出ない映像を生成します</p>
    <div class="srcs">
      <button class="btn primary" id="srcMic" type="button">🎤 マイク / ライン</button>
      <button class="btn" id="srcFile" type="button">📁 音声ファイル</button>
      <button class="btn" id="srcTab" type="button">🖥 タブ / システム音</button>
    </div>
    <p style="font-size:11px;opacity:0.5">無音でも生成は動きます · 音源は後から切替可</p>
    <input id="fileInput" type="file" accept="audio/*" style="display:none" />
  </div>

  <div class="hint" id="hint"></div>

  <div id="hud">
    <div class="panel">
      <div class="row">
        <div class="ctl"><label>Reactivity <span id="vReact">1.0</span></label><input id="react" type="range" min="0" max="200" value="100" /></div>
        <div class="ctl"><label>Persistence <span id="vDecay">0.94</span></label><input id="decay" type="range" min="80" max="99" value="94" /></div>
        <div class="ctl"><label>Hue <span id="vHue">200</span></label><input id="hue" type="range" min="0" max="360" value="200" /></div>
        <div class="ctl"><label>Flow <span id="vFlow">1.0</span></label><input id="flow" type="range" min="0" max="200" value="100" /></div>
      </div>
    </div>
    <div class="panel">
      <div class="meters" id="meters"></div>
    </div>
    <div class="panel">
      <div class="row">
        <button class="btn mini" id="evolve" type="button">🎲 Evolve</button>
        <button class="btn mini" id="mutate" type="button">⤳ Mutate</button>
        <button class="btn mini" id="auto" type="button" aria-pressed="true">Auto ✓</button>
        <button class="btn mini" id="srcSwap" type="button">音源</button>
        <button class="btn mini" id="full" type="button">⛶</button>
      </div>
      <div id="recipeLabel" style="margin-top:6px;font-size:10px;opacity:0.55;letter-spacing:0.02em"></div>
    </div>
  </div>

  <script>
    // ---------------------------------------------------------------- Audio
    const Audio = {
      ctx: null, analyser: null, freq: null, time: null, prevFreq: null,
      features: { level: 0, bass: 0, mid: 0, high: 0, onset: 0, centroid: 0 },
      fluxAvg: 0, src: null, mediaEl: null,
      ensureCtx() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this.analyser = this.ctx.createAnalyser();
          this.analyser.fftSize = 2048;
          this.analyser.smoothingTimeConstant = 0.7;
          this.freq = new Uint8Array(this.analyser.frequencyBinCount);
          this.time = new Uint8Array(this.analyser.fftSize);
          this.prevFreq = new Float32Array(this.analyser.frequencyBinCount);
        }
        if (this.ctx.state === "suspended") this.ctx.resume();
      },
      disconnect() {
        try { if (this.src) this.src.disconnect(); } catch (e) {}
        if (this.mediaEl) { try { this.mediaEl.pause(); } catch (e) {} this.mediaEl = null; }
        this.src = null;
      },
      async useMic() {
        this.ensureCtx(); this.disconnect();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
        this.src = this.ctx.createMediaStreamSource(stream);
        this.src.connect(this.analyser); // not to destination (avoid howl)
      },
      async useTab() {
        this.ensureCtx(); this.disconnect();
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        if (!stream.getAudioTracks().length) throw new Error("no-audio");
        this.src = this.ctx.createMediaStreamSource(stream);
        this.src.connect(this.analyser);
      },
      useFile(file) {
        this.ensureCtx(); this.disconnect();
        const el = new window.Audio();
        el.src = URL.createObjectURL(file);
        el.loop = true; el.crossOrigin = "anonymous";
        this.mediaEl = el;
        this.src = this.ctx.createMediaElementSource(el);
        this.src.connect(this.analyser);
        this.src.connect(this.ctx.destination); // hear the file
        el.play();
      },
      sample() {
        const f = this.features;
        if (!this.src) {
          // idle mode: gentle synthetic features so the visual breathes before audio
          const t = performance.now() * 0.001;
          f.level = 0.32 + 0.18 * Math.sin(t * 0.5);
          f.bass = 0.3 + 0.3 * Math.pow(Math.max(0, Math.sin(t * 1.6)), 4.0);
          f.mid = 0.35 + 0.2 * Math.sin(t * 0.37 + 1.0);
          f.high = 0.25 + 0.2 * Math.sin(t * 0.9 + 2.0);
          f.centroid = 0.4 + 0.3 * Math.sin(t * 0.21);
          f.onset = Math.max(f.onset * 0.82, Math.pow(Math.max(0, Math.sin(t * 1.6)), 16.0));
          return f;
        }
        if (!this.analyser) { f.level = f.bass = f.mid = f.high = f.onset = f.centroid = 0; return f; }
        this.analyser.getByteFrequencyData(this.freq);
        this.analyser.getByteTimeDomainData(this.time);
        const N = this.freq.length, sr = this.ctx.sampleRate, ny = sr / 2;
        // RMS level from time domain
        let sum = 0;
        for (let i = 0; i < this.time.length; i++) { const v = (this.time[i] - 128) / 128; sum += v * v; }
        const level = Math.min(1, Math.sqrt(sum / this.time.length) * 2.2);
        // band energies + centroid + spectral flux
        let bass = 0, mid = 0, high = 0, csum = 0, cden = 0, flux = 0;
        for (let i = 1; i < N; i++) {
          const hz = i / N * ny, m = this.freq[i] / 255;
          if (hz < 150) bass += m; else if (hz < 2000) mid += m; else high += m;
          csum += hz * m; cden += m;
          const d = m - this.prevFreq[i]; if (d > 0) flux += d;
          this.prevFreq[i] = m;
        }
        const nb = Math.max(1, N);
        bass = Math.min(1, bass / (150 / ny * nb) * 1.1);
        mid = Math.min(1, mid / (1850 / ny * nb) * 2.2);
        high = Math.min(1, high / ((ny - 2000) / ny * nb) * 3.5);
        const centroid = cden > 0 ? Math.min(1, (csum / cden) / (ny * 0.5)) : 0;
        // adaptive onset from flux
        this.fluxAvg = this.fluxAvg * 0.92 + flux * 0.08;
        const onset = Math.max(0, Math.min(1, (flux - this.fluxAvg * 1.5) * 0.06));
        // smooth
        f.level += (level - f.level) * 0.4;
        f.bass += (bass - f.bass) * 0.5;
        f.mid += (mid - f.mid) * 0.5;
        f.high += (high - f.high) * 0.5;
        f.centroid += (centroid - f.centroid) * 0.2;
        f.onset = Math.max(onset, f.onset * 0.8); // fast attack, slow release
        return f;
      }
    };

    // ---------------------------------------------------------------- WebGL
    const canvas = document.getElementById("canvas");
    const gl = canvas.getContext("webgl", { alpha: false, antialias: false, preserveDrawingBuffer: false });
    let dpr = 1;

    const VS = "attribute vec2 p; void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    const HELP = `
      precision highp float;
      float hash(vec2 p){ p = fract(p * vec2(123.34, 456.21)); p += dot(p, p + 45.32); return fract(p.x * p.y); }
      float noise(vec2 p){
        vec2 i = floor(p), f = fract(p);
        float a = hash(i), b = hash(i + vec2(1.0,0.0)), c = hash(i + vec2(0.0,1.0)), d = hash(i + vec2(1.0,1.0));
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
      }
      float fbm(vec2 p){ float v = 0.0, a = 0.5; for (int i = 0; i < 5; i++){ v += a * noise(p); p = p * 2.04 + 1.7; a *= 0.5; } return v; }
      vec3 hsv(float h, float s, float v){ vec3 c = clamp(abs(mod(h*6.0 + vec3(0.0,4.0,2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0); return v * mix(vec3(1.0), c, s); }
      mat2 rot(float a){ float c = cos(a), s = sin(a); return mat2(c, -s, s, c); }
    `;

    // ---- M3: module library. A "recipe" picks one warp + two injects + one blend.
    // The feedback fragment shader is assembled & compiled per recipe (cached), so the
    // STRUCTURE of the visual changes — not just its parameters.
    const FB_HEAD = HELP + `
      uniform sampler2D u_prev;
      uniform vec2 u_res;
      uniform float u_time, u_bass, u_mid, u_high, u_level, u_onset, u_centroid;
      uniform float u_react, u_decay, u_hue, u_flow, u_seed, u_sym, u_p0, u_p1;
    `;
    // warp: map current pixel -> coordinate to sample the previous frame
    const WARP = {
      W_tunnel: "vec2 W_tunnel(vec2 c,float asp){float z=1.0-(0.006+u_bass*0.05*u_react);float an=(0.012+u_mid*0.10*u_react)*u_flow;vec2 t=rot(an)*c*z;t.x/=asp;return t+0.5;}",
      W_spiral: "vec2 W_spiral(vec2 c,float asp){float z=1.0-(0.004+u_bass*0.04*u_react);float an=(0.05+u_mid*0.22*u_react)*u_flow;vec2 t=rot(an)*c*z;t.x/=asp;return t+0.5;}",
      W_zoomout: "vec2 W_zoomout(vec2 c,float asp){float z=1.0+(0.004+u_bass*0.03*u_react);vec2 t=rot(0.01*u_flow)*c*z;t.x/=asp;return t+0.5;}",
      W_mirror: "vec2 W_mirror(vec2 c,float asp){c.x=abs(c.x);float z=1.0-(0.006+u_bass*0.04*u_react);vec2 t=c*z;t.x/=asp;return t+0.5;}",
      W_drift: "vec2 W_drift(vec2 c,float asp){float z=1.0-(0.004+u_bass*0.03*u_react);vec2 t=c*z+vec2(0.005*sin(u_time*0.3+u_seed*6.0),0.005*cos(u_time*0.27))*u_flow;t.x/=asp;return t+0.5;}",
      W_polar: "vec2 W_polar(vec2 c,float asp){float r=length(c),a=atan(c.y,c.x);r*=1.0-(0.006+u_bass*0.04*u_react);a+=(0.02+u_mid*0.1*u_react)*u_flow;vec2 t=vec2(cos(a),sin(a))*r;t.x/=asp;return t+0.5;}"
    };
    // inject: return vec2(intensity, hueLocal) of new structure to add
    const INJ = {
      I_none: "vec2 I_none(vec2 c,float r,float a){return vec2(0.0);}",
      I_filaments: "vec2 I_filaments(vec2 c,float r,float a){float a2=abs(mod(a,6.2831/u_sym)-3.1415/u_sym);vec2 p=vec2(cos(a2),sin(a2))*r*(2.5+u_p0*3.0);float n=fbm(p+u_time*0.25*u_flow+u_seed*10.0);float fil=smoothstep(0.5,0.44,abs(fract(n*4.0)-0.5));return vec2(fil*(0.35+u_level*0.9),n);}",
      I_spokes: "vec2 I_spokes(vec2 c,float r,float a){float s=pow(0.5+0.5*sin(a*u_sym*2.0+u_time*u_flow),6.0);return vec2(s*(0.2+u_mid*0.7),a/6.2831);}",
      I_rings: "vec2 I_rings(vec2 c,float r,float a){float ripple=fract(r*(1.0+u_p0*2.0)-u_time*(0.4+u_high)*u_flow);return vec2(smoothstep(0.08,0.0,abs(ripple-0.5))*(0.3+u_onset),r);}",
      I_blobs: "vec2 I_blobs(vec2 c,float r,float a){float n=fbm(c*(2.0+u_p0*4.0)+u_time*0.2*u_flow+u_seed*7.0);return vec2(smoothstep(0.55,0.78,n)*(0.3+u_level*0.7),n);}",
      I_grid: "vec2 I_grid(vec2 c,float r,float a){vec2 g=abs(fract(c*(3.0+u_p0*6.0)+u_time*0.1*u_flow)-0.5);return vec2(smoothstep(0.46,0.5,max(g.x,g.y))*(0.2+u_mid*0.6),c.x+c.y);}",
      I_cells: "vec2 I_cells(vec2 c,float r,float a){vec2 uv=c*(2.0+u_p0*4.0);vec2 gg=floor(uv),f=fract(uv);float md=8.0;for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){vec2 o=vec2(float(i),float(j));vec2 pp=gg+o;vec2 rnd=vec2(hash(pp),hash(pp+3.1));vec2 rr=o+0.5+0.5*sin(u_time*u_flow+6.2831*rnd)-f;md=min(md,dot(rr,rr));}return vec2((1.0-smoothstep(0.0,0.5,md))*(0.25+u_level*0.6),md);}"
    };
    const BLEND = {
      B_max: "vec3 B_max(vec3 p,vec3 i){return max(p,i);}",
      B_screen: "vec3 B_screen(vec3 p,vec3 i){return 1.0-(1.0-p)*(1.0-i);}"
    };
    function assembleFB(recipe) {
      const keys = [["W", recipe.warp], ["I", recipe.inj1], ["I", recipe.inj2], ["B", recipe.blend]];
      const seen = {}; let funcs = "";
      for (const [kind, name] of keys) {
        if (seen[name]) continue; seen[name] = 1;
        funcs += (kind === "W" ? WARP : kind === "I" ? INJ : BLEND)[name] + "\n";
      }
      return FB_HEAD + funcs + `
      void main(){
        vec2 uv = gl_FragCoord.xy / u_res;
        float asp = u_res.x / u_res.y;
        vec2 c = uv - 0.5; c.x *= asp;
        vec3 prev = texture2D(u_prev, ${recipe.warp}(c, asp)).rgb * u_decay;
        float r = length(c), a = atan(c.y, c.x);
        vec2 e1 = ${recipe.inj1}(c, r, a);
        vec2 e2 = ${recipe.inj2}(c, r, a);
        float inj = clamp(e1.x + e2.x, 0.0, 1.0);
        float hue = fract(u_hue + u_centroid * 0.35 + (e1.y * 0.5 + e2.y * 0.5) * 0.3 + r * 0.15 + u_p1);
        vec3 injc = hsv(hue, 0.82, inj);
        vec3 col = ${recipe.blend}(prev * u_decay, injc);
        gl_FragColor = vec4(col, 1.0);
      }`;
    }

    // screen pass: tone + vignette
    const SC = `
      precision highp float;
      uniform sampler2D u_tex; uniform vec2 u_res; uniform float u_onset;
      void main(){
        vec2 uv = gl_FragCoord.xy / u_res;
        vec3 col = texture2D(u_tex, uv).rgb;
        col = pow(col, vec3(0.85));
        float v = smoothstep(1.3, 0.3, length(uv - 0.5));
        col *= 0.55 + 0.45 * v;             // vignette
        col += u_onset * 0.04;
        gl_FragColor = vec4(col, 1.0);
      }
    `;

    function compile(type, src) {
      const sh = gl.createShader(type); gl.shaderSource(sh, src); gl.compileShader(sh);
      if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) console.warn(gl.getShaderInfoLog(sh));
      return sh;
    }
    function program(fs) {
      const pr = gl.createProgram();
      gl.attachShader(pr, compile(gl.VERTEX_SHADER, VS));
      gl.attachShader(pr, compile(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(pr);
      return pr;
    }

    let scProg, quad, scU = {};
    let texA, texB, fboA, fboB, W = 2, H = 2;
    const FB_UNIFORMS = ["u_prev", "u_res", "u_time", "u_bass", "u_mid", "u_high", "u_level", "u_onset", "u_centroid", "u_react", "u_decay", "u_hue", "u_flow", "u_seed", "u_sym", "u_p0", "u_p1"];
    const fbCache = {};        // recipe key -> { prog, U }
    let currentFB = null;      // active compiled feedback program

    const RNG = (s) => () => (s = (s * 1664525 + 1013904223) >>> 0) / 4294967296;
    function buildRecipe(rng) {
      rng = rng || Math.random;
      const pick = (o) => { const k = Object.keys(o); return k[Math.floor(rng() * k.length)]; };
      const injNames = Object.keys(INJ).filter((k) => k !== "I_none");
      const inj1 = injNames[Math.floor(rng() * injNames.length)];
      const inj2 = rng() < 0.5 ? "I_none" : injNames[Math.floor(rng() * injNames.length)];
      return {
        warp: pick(WARP), inj1, inj2, blend: pick(BLEND),
        sym: 3 + Math.floor(rng() * 9), p0: rng(), p1: rng() * 0.25
      };
    }
    function mutateRecipe(r) {
      const n = { ...r };
      const which = Math.floor(Math.random() * 5);
      const injNames = Object.keys(INJ);
      const warpNames = Object.keys(WARP);
      if (which === 0) n.warp = warpNames[Math.floor(Math.random() * warpNames.length)];
      else if (which === 1) n.inj1 = injNames.filter((k) => k !== "I_none")[Math.floor(Math.random() * (injNames.length - 1))];
      else if (which === 2) n.inj2 = injNames[Math.floor(Math.random() * injNames.length)];
      else if (which === 3) n.blend = Object.keys(BLEND)[Math.floor(Math.random() * 2)];
      else n.sym = 3 + Math.floor(Math.random() * 9);
      return n;
    }
    function recipeKey(r) { return r.warp + "|" + r.inj1 + "|" + r.inj2 + "|" + r.blend; }
    function compileFB(recipe) {
      const key = recipeKey(recipe);
      if (!fbCache[key]) {
        const prog = program(assembleFB(recipe));
        const U = {};
        FB_UNIFORMS.forEach((k) => U[k] = gl.getUniformLocation(prog, k));
        fbCache[key] = { prog, U };
      }
      return fbCache[key];
    }
    let recipe = null;
    function setRecipe(r) { recipe = r; currentFB = compileFB(r); updateRecipeLabel(); }

    function makeTarget(w, h) {
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      const fbo = gl.createFramebuffer();
      gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
      return { tex, fbo };
    }

    function initGL() {
      scProg = program(SC);
      quad = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, quad);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
      ["u_tex", "u_res", "u_onset"].forEach((k) => scU[k] = gl.getUniformLocation(scProg, k));
      setRecipe(buildRecipe());
    }

    function bindQuad(prog) {
      gl.bindBuffer(gl.ARRAY_BUFFER, quad);
      const loc = gl.getAttribLocation(prog, "p");
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    }

    function resize() {
      dpr = Math.min(1.25, window.devicePixelRatio || 1);
      W = Math.max(2, Math.floor(window.innerWidth * dpr));
      H = Math.max(2, Math.floor(window.innerHeight * dpr));
      canvas.width = W; canvas.height = H;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      const a = makeTarget(W, H), b = makeTarget(W, H);
      texA = a.tex; fboA = a.fbo; texB = b.tex; fboB = b.fbo;
    }

    // ---------------------------------------------------------------- params
    const params = { react: 1, decay: 0.94, hue: 200 / 360, flow: 1, seed: Math.random() };
    function bindUI() {
      const map = [["react", "vReact", (v) => (params.react = v / 100, (v / 100).toFixed(2))],
                   ["decay", "vDecay", (v) => (params.decay = v / 100, (v / 100).toFixed(2))],
                   ["hue", "vHue", (v) => (params.hue = v / 360, String(v))],
                   ["flow", "vFlow", (v) => (params.flow = v / 100, (v / 100).toFixed(2))]];
      map.forEach(([id, out, fn]) => {
        const el = document.getElementById(id), o = document.getElementById(out);
        const upd = () => { o.textContent = fn(Number(el.value)); };
        el.addEventListener("input", upd); upd();
      });
      document.getElementById("evolve").addEventListener("click", () => { params.seed = Math.random(); setRecipe(buildRecipe()); evo.last = lastT; });
      document.getElementById("mutate").addEventListener("click", () => { setRecipe(mutateRecipe(recipe)); evo.last = lastT; });
      const autoBtn = document.getElementById("auto");
      autoBtn.addEventListener("click", () => {
        evo.auto = !evo.auto;
        autoBtn.textContent = evo.auto ? "Auto ✓" : "Auto";
        autoBtn.setAttribute("aria-pressed", String(evo.auto));
      });
      document.getElementById("full").addEventListener("click", () => {
        if (document.fullscreenElement) document.exitFullscreen(); else document.documentElement.requestFullscreen();
      });
      document.getElementById("srcSwap").addEventListener("click", () => { document.getElementById("start").style.display = "flex"; });
    }

    // ---- recipe evolution: mutate on section changes + on a drifting timer
    const evo = { auto: true, last: 0, next: 10 + Math.random() * 10, quiet: 0 };
    let lastT = 0;
    function updateRecipeLabel() {
      const el = document.getElementById("recipeLabel");
      if (el && recipe) el.textContent = "▶ " + recipe.warp.slice(2) + " · " + recipe.inj1.slice(2)
        + (recipe.inj2 !== "I_none" ? "+" + recipe.inj2.slice(2) : "") + " · " + recipe.blend.slice(2) + " · sym" + recipe.sym;
    }
    function doEvolve(full) {
      evo.last = lastT; evo.next = 9 + Math.random() * 12;
      if (full) { params.seed = Math.random(); setRecipe(buildRecipe()); }
      else setRecipe(mutateRecipe(recipe));
    }
    function maybeEvolve(t, f) {
      lastT = t;
      if (!evo.auto) return;
      // section change: a sustained quiet patch followed by a loud return
      if (f.level < 0.12) evo.quiet++;
      else { if (evo.quiet > 35 && f.level > 0.4) doEvolve(Math.random() < 0.4); evo.quiet = 0; }
      // drifting fallback timer so it keeps evolving even at steady energy
      if (t - evo.last > evo.next) doEvolve(Math.random() < 0.35);
    }

    // meters
    let meterBars = [];
    function buildMeters() {
      const host = document.getElementById("meters");
      ["LV", "LO", "MD", "HI", "ON"].forEach((lbl) => {
        const m = document.createElement("div"); m.className = "meter"; m.style.height = "40px";
        const i = document.createElement("i"); const s = document.createElement("span"); s.textContent = lbl;
        m.appendChild(i); m.appendChild(s); host.appendChild(m); meterBars.push(i);
      });
    }
    function updateMeters(f) {
      const vals = [f.level, f.bass, f.mid, f.high, f.onset];
      for (let i = 0; i < meterBars.length; i++) meterBars[i].style.height = Math.round(vals[i] * 100) + "%";
    }

    // ---------------------------------------------------------------- loop
    let started = performance.now();
    function frame(now) {
      const t = (now - started) * 0.001;
      const f = Audio.sample();
      updateMeters(f);
      maybeEvolve(t, f);

      // feedback pass: read prev (texA) -> write texB
      const U = currentFB.U;
      gl.bindFramebuffer(gl.FRAMEBUFFER, fboB);
      gl.viewport(0, 0, W, H);
      gl.useProgram(currentFB.prog);
      bindQuad(currentFB.prog);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, texA);
      gl.uniform1i(U.u_prev, 0);
      gl.uniform2f(U.u_res, W, H);
      gl.uniform1f(U.u_time, t);
      gl.uniform1f(U.u_bass, f.bass);
      gl.uniform1f(U.u_mid, f.mid);
      gl.uniform1f(U.u_high, f.high);
      gl.uniform1f(U.u_level, f.level);
      gl.uniform1f(U.u_onset, f.onset);
      gl.uniform1f(U.u_centroid, f.centroid);
      gl.uniform1f(U.u_react, params.react);
      gl.uniform1f(U.u_decay, params.decay);
      gl.uniform1f(U.u_hue, params.hue);
      gl.uniform1f(U.u_flow, params.flow);
      gl.uniform1f(U.u_seed, params.seed);
      gl.uniform1f(U.u_sym, recipe.sym);
      gl.uniform1f(U.u_p0, recipe.p0);
      gl.uniform1f(U.u_p1, recipe.p1);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      // screen pass: draw texB to canvas
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, W, H);
      gl.useProgram(scProg);
      bindQuad(scProg);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, texB);
      gl.uniform1i(scU.u_tex, 0);
      gl.uniform2f(scU.u_res, W, H);
      gl.uniform1f(scU.u_onset, f.onset);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      // swap history
      let tt = texA; texA = texB; texB = tt;
      let ff = fboA; fboA = fboB; fboB = ff;

      requestAnimationFrame(frame);
    }

    // ---------------------------------------------------------------- wire up
    const startEl = document.getElementById("start");
    const hintEl = document.getElementById("hint");
    function hideStart() { startEl.style.display = "none"; document.getElementById("hud").style.display = "flex"; }
    function showHint(msg) { hintEl.textContent = msg; if (msg) setTimeout(() => { if (hintEl.textContent === msg) hintEl.textContent = ""; }, 4000); }

    document.getElementById("srcMic").addEventListener("click", async () => {
      try { await Audio.useMic(); hideStart(); showHint("🎤 マイク入力中"); }
      catch (e) { showHint("マイクを取得できませんでした: " + e.message); }
    });
    document.getElementById("srcTab").addEventListener("click", async () => {
      try { await Audio.useTab(); hideStart(); showHint("🖥 タブ音入力中(共有を継続してください)"); }
      catch (e) { showHint("タブ音を取得できませんでした(Chrome推奨/共有時に音声を有効化): " + e.message); }
    });
    document.getElementById("srcFile").addEventListener("click", () => document.getElementById("fileInput").click());
    document.getElementById("fileInput").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      try { Audio.useFile(file); hideStart(); showHint("📁 " + file.name); }
      catch (err) { showHint("再生できませんでした: " + err.message); }
    });
    // drag & drop a file anywhere
    window.addEventListener("dragover", (e) => e.preventDefault());
    window.addEventListener("drop", (e) => {
      e.preventDefault();
      const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (file && file.type.startsWith("audio")) { try { Audio.useFile(file); hideStart(); showHint("📁 " + file.name); } catch (err) {} }
    });

    window.addEventListener("resize", resize);
    initGL(); resize(); bindUI(); buildMeters();
    if (new URLSearchParams(location.search).has("go")) hideStart(); // kiosk / preview: skip start screen
    requestAnimationFrame(frame); // visuals run immediately (idle until a source is chosen)
  </script>
</body>
</html>
