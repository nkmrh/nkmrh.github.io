<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Diptych — Output</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .stage {
      position: fixed;
      inset: 0;
      background: #000;
      /* filter is applied inline only when master != 100% (see applyState);
         a constant filter:brightness(1) would force an offscreen buffer and
         flicker the animated mix-blend layers on iOS Safari. */
      transition: filter 90ms linear;
      /* Keep the blend group on the stage so iOS Safari doesn't re-isolate the
         layers (and flicker) every time the crossfade opacity changes. */
      isolation: isolate;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      pointer-events: none;
      background: transparent;
      /* Pin each layer to a stable compositing layer; without this iOS Safari
         tears down / rebuilds the layer as opacity nears 0 or 1, which flickers. */
      will-change: opacity;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    #layerA {
      opacity: var(--opacity-a, 0.5);
    }

    #layerB {
      opacity: var(--opacity-b, 0.5);
      mix-blend-mode: var(--blend, screen);
    }

    .blackout {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      transition: opacity 80ms linear;
      pointer-events: none;
    }

    .blackout.active {
      opacity: 1;
    }

    .hud {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      transition: opacity 160ms ease;
    }

    .hud.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .hud-button {
      min-height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(18, 20, 26, 0.76);
      color: #f4f1ea;
      border-radius: 8px;
      padding: 0 14px;
      font: 600 14px/1 system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

  </style>
</head>
<body>
  <main class="stage" id="stage">
    <iframe id="layerA" title="Layer A" src="works/plasma-bloom.html?slot=a"></iframe>
    <iframe id="layerB" title="Layer B" src="works/line-tunnel.html?slot=b"></iframe>
  </main>
  <div class="hud" id="hud">
    <button class="hud-button" id="fullscreenButton" type="button">Fullscreen</button>
  </div>
  <div class="blackout" id="blackout"></div>
  <div id="linkStatus" style="position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;padding:14px 20px;background:rgba(18,20,26,.9);border:1px solid rgba(255,255,255,.18);border-radius:10px;color:#f4f1ea;font:600 15px/1.4 system-ui,-apple-system,BlinkMacSystemFont,sans-serif;backdrop-filter:blur(10px);display:none;text-align:center"></div>
  <div id="offPanel" style="display:none;position:fixed;inset:0;z-index:30;background:rgba(8,9,12,.96);color:#f4f1ea;font:500 14px/1.6 system-ui,-apple-system,sans-serif;overflow:auto;padding:24px 18px;text-align:center">
    <h2 style="margin:4px 0 2px">📷 Offline Link</h2>
    <div style="opacity:.6;font-size:12px;margin-bottom:16px">操作側(iPhone)の QR を読み取り → 返信 QR を見せる</div>
    <div id="offA">
      <div style="font-weight:700;margin-bottom:6px">① iPhone の QR を読み取る</div>
      <video id="offScan" playsinline muted style="width:260px;max-width:80vw;border-radius:10px;background:#000"></video>
      <details style="max-width:520px;margin:8px auto 0"><summary style="cursor:pointer;opacity:.7;font-size:12px">カメラを使わず貼り付け</summary>
        <textarea id="offOfferText" placeholder="iPhone のコードを貼り付け" style="width:100%;height:64px;margin-top:6px;font-size:11px;background:#11131a;color:#9fb6c8;border:1px solid #333;border-radius:6px"></textarea>
        <button class="hud-button" id="offOfferGo" type="button">読み込む</button>
      </details>
    </div>
    <div id="offB" style="display:none">
      <div style="font-weight:700;margin:6px 0">② この返信 QR を iPhone に読ませる</div>
      <div id="offAnswerQr" style="display:inline-block;background:#fff;padding:10px;border-radius:10px"></div>
      <details style="max-width:520px;margin:8px auto 0"><summary style="cursor:pointer;opacity:.7;font-size:12px">コピペで渡す</summary>
        <textarea id="offAnswerText" readonly style="width:100%;height:64px;margin-top:6px;font-size:11px;background:#11131a;color:#9fb6c8;border:1px solid #333;border-radius:6px"></textarea>
      </details>
    </div>
    <div id="offStatus" style="margin-top:16px;font-weight:700;color:#8fdcff"></div>
  </div>
  <div id="launchPanel" style="display:none;position:fixed;inset:0;z-index:25;background:rgba(8,9,12,.97);color:#f4f1ea;font:500 15px/1.7 system-ui,-apple-system,sans-serif;overflow:auto;padding:32px 20px;text-align:center">
    <h2 style="margin:8px 0 2px;font-size:24px">📺 表示デバイス</h2>
    <div style="opacity:.6;font-size:13px;margin-bottom:28px">この画面を Diptych の出力にして AirPlay で投影します</div>
    <button class="hud-button" id="launchOffline" type="button" style="display:block;width:100%;max-width:360px;margin:0 auto 18px;min-height:54px;font-size:16px">📷 オフラインで接続（QR・サーバ不要）</button>
    <div style="max-width:360px;margin:0 auto;padding-top:18px;border-top:1px solid rgba(255,255,255,.12)">
      <div style="opacity:.7;font-size:13px;margin-bottom:8px">またはクラウドリンクのコードを入力</div>
      <input id="launchCode" type="text" inputmode="latin" autocapitalize="characters" placeholder="例 K7P2X" style="width:150px;text-transform:uppercase;letter-spacing:3px;font:700 18px ui-monospace,monospace;text-align:center;padding:8px;border-radius:8px;border:1px solid #444;background:#11131a;color:#f4f1ea" />
      <button class="hud-button" id="launchCloud" type="button" style="min-height:44px">📲 接続</button>
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const blackout = document.getElementById("blackout");
    const layerA = document.getElementById("layerA");
    const layerB = document.getElementById("layerB");
    const hud = document.getElementById("hud");
    const fullscreenButton = document.getElementById("fullscreenButton");
    let hudTimer = null;
    let currentState = null;

    function buildSlottedWorkSrc(slot, sourceSrc) {
      return `${sourceSrc}${sourceSrc.includes("?") ? "&" : "?"}slot=${slot}`;
    }

    function postStateToLayer(frame) {
      if (!frame || !frame.contentWindow || !currentState) return;
      try {
        frame.contentWindow.postMessage({ type: "vj-state", state: currentState }, "*");
      } catch (error) {
        console.warn(error);
      }
    }

    function requestStateFromHost() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return;
      try {
        host.postMessage({ type: "request-vj-state", role: "output" }, "*");
      } catch (error) {
        console.warn(error);
      }
    }

    function readStateFromHostWindow() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return null;
      try {
        return host.__vjState || null;
      } catch (error) {
        return null;
      }
    }

    function syncStateFromStorage() {
      // localStorage is intentionally NOT written on every Auto Mix frame, so it
      // lags during Auto Mix. When a live host (control window) is reachable, use
      // that instead — applying the stale stored state here fights the live
      // postMessage/host updates and makes the preview flicker. Only fall back to
      // localStorage when there is no host (standalone output tab).
      if (readStateFromHostWindow()) return;
      try {
        const saved = JSON.parse(localStorage.getItem("vj-state") || "null");
        if (saved) applyState(saved);
      } catch (error) {
        console.warn(error);
      }
    }

    function applyState(state) {
      currentState = state;
      window.__vjState = state;
      const mix = Math.max(0, Math.min(100, Number(state.mix))) / 100;
      const master = Math.max(0, Number(state.master)) / 100;
      const levelA = Math.max(0, Math.min(100, Number(state.levelA ?? 100))) / 100;
      const levelB = Math.max(0, Math.min(100, Number(state.levelB ?? 100))) / 100;
      stage.style.setProperty("--opacity-a", (1 - mix) * levelA);
      stage.style.setProperty("--opacity-b", mix * levelB);
      stage.style.setProperty("--blend", state.blendMode || "screen");
      // Only apply the brightness filter when it actually changes something.
      // filter:brightness(1) still forces the whole stage into an offscreen
      // buffer, which makes the animated mix-blend layers flicker on iOS Safari.
      const fx = [];
      if (state.mono) fx.push("grayscale(1)");
      if (master !== 1) fx.push(`brightness(${master})`);
      stage.style.filter = fx.length ? fx.join(" ") : "none";
      blackout.classList.toggle("active", Boolean(state.blackout));
      if (state.sources) {
        applyLayerSource(layerA, "a", state.sources.a);
        applyLayerSource(layerB, "b", state.sources.b);
      }
      postStateToLayer(layerA);
      postStateToLayer(layerB);
    }

    function applyLayerSource(frame, slot, src) {
      // Empty layer: unload the work and hide the iframe so it contributes nothing.
      if (!src) {
        if (frame.getAttribute("src") !== "about:blank") frame.src = "about:blank";
        frame.style.display = "none";
        return;
      }
      const next = buildSlottedWorkSrc(slot, src);
      if (frame.getAttribute("src") !== next) frame.src = next;
      frame.style.display = "";
    }

    function updateFullscreenButton() {
      fullscreenButton.textContent = document.fullscreenElement ? "Exit Fullscreen" : "Fullscreen";
    }

    async function toggleFullscreen() {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await document.documentElement.requestFullscreen();
        }
      } catch (error) {
        console.warn(error);
      }
      updateFullscreenButton();
      revealHud();
    }

    function revealHud() {
      hud.classList.remove("hidden");
      clearTimeout(hudTimer);
      hudTimer = window.setTimeout(() => {
        if (document.fullscreenElement) hud.classList.add("hidden");
      }, 1800);
    }

    window.addEventListener("message", (event) => {
      if (!event.data) return;
      if (event.data.type === "vj-state" && event.data.state) {
        applyState(event.data.state);
      }
      if (event.data.type === "vj-audio" && event.data.a) {
        // live audio features from the control; relay to the layer works (postMessage
        // is robust across same-origin https AND opaque file:// frames)
        if (!window.__vjState) window.__vjState = {};
        window.__vjState.audio = event.data.a;
        try { if (layerA.contentWindow) layerA.contentWindow.postMessage(event.data, "*"); } catch (e) {}
        try { if (layerB.contentWindow) layerB.contentWindow.postMessage(event.data, "*"); } catch (e) {}
      }
      if (event.data.type === "request-vj-state") {
        if (event.source === layerA.contentWindow) postStateToLayer(layerA);
        if (event.source === layerB.contentWindow) postStateToLayer(layerB);
      }
    });

    layerA.addEventListener("load", () => {
      postStateToLayer(layerA);
    });

    layerB.addEventListener("load", () => {
      postStateToLayer(layerB);
    });

    fullscreenButton.addEventListener("click", toggleFullscreen);

    document.addEventListener("fullscreenchange", () => {
      updateFullscreenButton();
      revealHud();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key.toLowerCase() === "f") {
        event.preventDefault();
        toggleFullscreen();
      }
      if (event.key === "Escape" && document.fullscreenElement) revealHud();
    });

    document.addEventListener("dblclick", () => {
      toggleFullscreen();
    });

    document.addEventListener("mousemove", () => {
      revealHud();
    });

    window.addEventListener("storage", () => {
      syncStateFromStorage();
    });

    function syncStateFromHostWindow() {
      const hostState = readStateFromHostWindow();
      if (hostState) applyState(hostState);
    }

    // ---- Display Link receiver: when opened as vj-output.html?link=CODE on a
    // separate device (iPad etc.), pull state/audio over WebRTC (PeerJS) instead
    // of the same-device host window / localStorage path.
    function showLinkStatus(t) {
      const el = document.getElementById("linkStatus");
      if (!el) return;
      if (t == null) { el.style.display = "none"; }
      else { el.style.display = "block"; el.textContent = t; }
    }
    function loadPeerJS() {
      return new Promise((resolve, reject) => {
        if (window.Peer) return resolve();
        const s = document.createElement("script");
        s.src = "https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js";
        s.onload = () => resolve();
        s.onerror = () => reject(new Error("peerjs load failed"));
        document.head.appendChild(s);
      });
    }
    function handleLinkData(msg) {
      if (!msg) return;
      if (msg.type === "vj-state" && msg.state) applyState(msg.state);
      if (msg.type === "vj-audio" && msg.a) {
        if (!window.__vjState) window.__vjState = {};
        window.__vjState.audio = msg.a;
        try { if (layerA.contentWindow) layerA.contentWindow.postMessage(msg, "*"); } catch (e) {}
        try { if (layerB.contentWindow) layerB.contentWindow.postMessage(msg, "*"); } catch (e) {}
      }
    }
    async function startLinkedMode(code) {
      showLinkStatus("接続中…（コード " + String(code).toUpperCase() + "）");
      try { await loadPeerJS(); } catch (e) { showLinkStatus("PeerJS の読み込みに失敗"); return; }
      const target = "diptych-" + String(code).toLowerCase();
      const peer = new Peer();
      let conn = null, retry = null;
      function connect() {
        clearTimeout(retry);
        conn = peer.connect(target, { reliable: true });
        conn.on("open", () => showLinkStatus(null));
        conn.on("data", handleLinkData);
        conn.on("close", () => { showLinkStatus("再接続中…"); retry = setTimeout(connect, 2000); });
        conn.on("error", () => {});
      }
      peer.on("open", connect);
      peer.on("error", (e) => {
        if (e.type === "peer-unavailable") {
          showLinkStatus("操作側を待機中…（コード " + String(code).toUpperCase() + "）");
          retry = setTimeout(connect, 2500);
        } else {
          showLinkStatus("Link error: " + e.type);
        }
      });
      peer.on("disconnected", () => { try { peer.reconnect(); } catch (e) {} });
    }

    // ---- Offline Link receiver: serverless WebRTC, this display is the
    // answerer. Opened as vj-output.html?offline=1; scans the control's offer
    // QR (or pasted code) and shows an answer QR back. (see offline-link.js)
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error("load failed: " + src));
        document.head.appendChild(s);
      });
    }
    async function loadOfflineLibs() {
      if (!window.QRCode) await loadScript("vendor/qrcode.min.js");
      if (!window.jsQR) await loadScript("vendor/jsqr.min.js");
      if (!window.OfflineLink) await loadScript("offline-link.js");
    }
    function offStatus(t) { document.getElementById("offStatus").textContent = t; }
    let offlineScanner = null;
    function onOfflineOpen() {
      offStatus("接続済み ✓");
      setTimeout(() => { document.getElementById("offPanel").style.display = "none"; }, 1000);
    }
    async function acceptOffer(text) {
      if (!text || !text.trim()) return;
      try {
        const r = await window.OfflineLink.makeAnswer(text.trim(), onOfflineOpen, handleLinkData);
        const fit = window.OfflineLink.showQR(document.getElementById("offAnswerQr"), r.blob);
        document.getElementById("offAnswerText").value = r.blob;
        document.getElementById("offA").style.display = "none";
        document.getElementById("offB").style.display = "block";
        offStatus(fit ? "iPhone でこの返信 QR を読み取って" : "コピペで返信コードを渡して");
      } catch (e) { offStatus("コードが不正です"); }
    }
    async function startOfflineMode() {
      document.getElementById("offPanel").style.display = "block";
      offStatus("カメラ起動中…");
      try { await loadOfflineLibs(); } catch (e) { offStatus("ライブラリの読み込みに失敗"); return; }
      offlineScanner = window.OfflineLink.startScanner(document.getElementById("offScan"), (text, err) => {
        if (!text) { offStatus("カメラ不可 — 貼り付けを使って"); return; }
        if (offlineScanner) offlineScanner.stop();
        acceptOffer(text);
      });
    }
    document.getElementById("offOfferGo").addEventListener("click", () => {
      if (offlineScanner) offlineScanner.stop();
      acceptOffer(document.getElementById("offOfferText").value);
    });

    // Standalone launcher: when this page is opened on its own (a top-level tab
    // on a separate device, not the control's popup or preview iframe) with no
    // ?link / ?offline and no stored state, offer a mode chooser so the device
    // only needs to bookmark the bare vj-output.html — no query string to type.
    function startLocalSync() {
      syncStateFromHostWindow();
      syncStateFromStorage();
      requestStateFromHost();
      window.setInterval(syncStateFromHostWindow, 120);
      window.setInterval(syncStateFromStorage, 120);
    }
    function showLauncher() {
      document.getElementById("launchPanel").style.display = "block";
    }
    document.getElementById("launchOffline").addEventListener("click", () => {
      document.getElementById("launchPanel").style.display = "none";
      startOfflineMode();
    });
    document.getElementById("launchCloud").addEventListener("click", () => {
      const code = document.getElementById("launchCode").value.trim().toUpperCase();
      if (!code) return;
      document.getElementById("launchPanel").style.display = "none";
      startLinkedMode(code);
    });
    document.getElementById("launchCode").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("launchCloud").click();
    });

    const LINK_CODE = new URLSearchParams(window.location.search).get("link");
    const OFFLINE = new URLSearchParams(window.location.search).get("offline");
    updateFullscreenButton();
    revealHud();
    if (LINK_CODE) {
      startLinkedMode(LINK_CODE);
    } else if (OFFLINE) {
      startOfflineMode();
    } else {
      let hasStored = false;
      try { hasStored = !!JSON.parse(localStorage.getItem("vj-state") || "null"); } catch (e) {}
      const isStandalone = window.parent === window && !window.opener;
      if (isStandalone && !readStateFromHostWindow() && !hasStored) {
        showLauncher();
      } else {
        startLocalSync();
      }
    }
  </script>
</body>
</html>
