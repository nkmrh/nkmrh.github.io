<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Diptych — Output</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .stage {
      position: fixed;
      inset: 0;
      background: #000;
      /* filter is applied inline only when master != 100% (see applyState);
         a constant filter:brightness(1) would force an offscreen buffer and
         flicker the animated mix-blend layers on iOS Safari. */
      transition: filter 90ms linear;
      /* Keep the blend group on the stage so iOS Safari doesn't re-isolate the
         layers (and flicker) every time the crossfade opacity changes. */
      isolation: isolate;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      pointer-events: none;
      background: transparent;
      /* Pin each layer to a stable compositing layer; without this iOS Safari
         tears down / rebuilds the layer as opacity nears 0 or 1, which flickers. */
      will-change: opacity;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    #layerA {
      opacity: var(--opacity-a, 0.5);
    }

    #layerB {
      opacity: var(--opacity-b, 0.5);
      mix-blend-mode: var(--blend, screen);
    }

    .blackout {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      transition: opacity 80ms linear;
      pointer-events: none;
    }

    .blackout.active {
      opacity: 1;
    }

    .hud {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      transition: opacity 160ms ease;
    }

    .hud.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .hud-button {
      min-height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(18, 20, 26, 0.76);
      color: #f4f1ea;
      border-radius: 8px;
      padding: 0 14px;
      font: 600 14px/1 system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

  </style>
</head>
<body>
  <main class="stage" id="stage">
    <iframe id="layerA" title="Layer A" src="works/plasma-bloom.html?slot=a"></iframe>
    <iframe id="layerB" title="Layer B" src="works/line-tunnel.html?slot=b"></iframe>
  </main>
  <div class="hud" id="hud">
    <button class="hud-button" id="fullscreenButton" type="button">Fullscreen</button>
  </div>
  <div class="blackout" id="blackout"></div>

  <script>
    const stage = document.getElementById("stage");
    const blackout = document.getElementById("blackout");
    const layerA = document.getElementById("layerA");
    const layerB = document.getElementById("layerB");
    const hud = document.getElementById("hud");
    const fullscreenButton = document.getElementById("fullscreenButton");
    let hudTimer = null;
    let currentState = null;

    function buildSlottedWorkSrc(slot, sourceSrc) {
      return `${sourceSrc}${sourceSrc.includes("?") ? "&" : "?"}slot=${slot}`;
    }

    function postStateToLayer(frame) {
      if (!frame || !frame.contentWindow || !currentState) return;
      try {
        frame.contentWindow.postMessage({ type: "vj-state", state: currentState }, "*");
      } catch (error) {
        console.warn(error);
      }
    }

    function requestStateFromHost() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return;
      try {
        host.postMessage({ type: "request-vj-state", role: "output" }, "*");
      } catch (error) {
        console.warn(error);
      }
    }

    function readStateFromHostWindow() {
      const host = window.parent !== window ? window.parent : window.opener;
      if (!host) return null;
      try {
        return host.__vjState || null;
      } catch (error) {
        return null;
      }
    }

    function syncStateFromStorage() {
      // localStorage is intentionally NOT written on every Auto Mix frame, so it
      // lags during Auto Mix. When a live host (control window) is reachable, use
      // that instead — applying the stale stored state here fights the live
      // postMessage/host updates and makes the preview flicker. Only fall back to
      // localStorage when there is no host (standalone output tab).
      if (readStateFromHostWindow()) return;
      try {
        const saved = JSON.parse(localStorage.getItem("vj-state") || "null");
        if (saved) applyState(saved);
      } catch (error) {
        console.warn(error);
      }
    }

    function applyState(state) {
      currentState = state;
      window.__vjState = state;
      const mix = Math.max(0, Math.min(100, Number(state.mix))) / 100;
      const master = Math.max(0, Number(state.master)) / 100;
      const levelA = Math.max(0, Math.min(100, Number(state.levelA ?? 100))) / 100;
      const levelB = Math.max(0, Math.min(100, Number(state.levelB ?? 100))) / 100;
      stage.style.setProperty("--opacity-a", (1 - mix) * levelA);
      stage.style.setProperty("--opacity-b", mix * levelB);
      stage.style.setProperty("--blend", state.blendMode || "screen");
      // Only apply the brightness filter when it actually changes something.
      // filter:brightness(1) still forces the whole stage into an offscreen
      // buffer, which makes the animated mix-blend layers flicker on iOS Safari.
      stage.style.filter = master === 1 ? "none" : `brightness(${master})`;
      blackout.classList.toggle("active", Boolean(state.blackout));
      if (state.sources) {
        applyLayerSource(layerA, "a", state.sources.a);
        applyLayerSource(layerB, "b", state.sources.b);
      }
      postStateToLayer(layerA);
      postStateToLayer(layerB);
    }

    function applyLayerSource(frame, slot, src) {
      // Empty layer: unload the work and hide the iframe so it contributes nothing.
      if (!src) {
        if (frame.getAttribute("src") !== "about:blank") frame.src = "about:blank";
        frame.style.display = "none";
        return;
      }
      const next = buildSlottedWorkSrc(slot, src);
      if (frame.getAttribute("src") !== next) frame.src = next;
      frame.style.display = "";
    }

    function updateFullscreenButton() {
      fullscreenButton.textContent = document.fullscreenElement ? "Exit Fullscreen" : "Fullscreen";
    }

    async function toggleFullscreen() {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await document.documentElement.requestFullscreen();
        }
      } catch (error) {
        console.warn(error);
      }
      updateFullscreenButton();
      revealHud();
    }

    function revealHud() {
      hud.classList.remove("hidden");
      clearTimeout(hudTimer);
      hudTimer = window.setTimeout(() => {
        if (document.fullscreenElement) hud.classList.add("hidden");
      }, 1800);
    }

    window.addEventListener("message", (event) => {
      if (!event.data) return;
      if (event.data.type === "vj-state" && event.data.state) {
        applyState(event.data.state);
      }
      if (event.data.type === "request-vj-state") {
        if (event.source === layerA.contentWindow) postStateToLayer(layerA);
        if (event.source === layerB.contentWindow) postStateToLayer(layerB);
      }
    });

    layerA.addEventListener("load", () => {
      postStateToLayer(layerA);
    });

    layerB.addEventListener("load", () => {
      postStateToLayer(layerB);
    });

    fullscreenButton.addEventListener("click", toggleFullscreen);

    document.addEventListener("fullscreenchange", () => {
      updateFullscreenButton();
      revealHud();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key.toLowerCase() === "f") {
        event.preventDefault();
        toggleFullscreen();
      }
      if (event.key === "Escape" && document.fullscreenElement) revealHud();
    });

    document.addEventListener("dblclick", () => {
      toggleFullscreen();
    });

    document.addEventListener("mousemove", () => {
      revealHud();
    });

    window.addEventListener("storage", () => {
      syncStateFromStorage();
    });

    function syncStateFromHostWindow() {
      const hostState = readStateFromHostWindow();
      if (hostState) applyState(hostState);
    }

    updateFullscreenButton();
    revealHud();
    syncStateFromHostWindow();
    syncStateFromStorage();
    requestStateFromHost();
    window.setInterval(syncStateFromHostWindow, 120);
    window.setInterval(syncStateFromStorage, 120);
  </script>
</body>
</html>
