<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petal Mesh</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070f;
      touch-action: manipulation;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #05070f;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let w = 0;
    let h = 0;
    let dpr = 1;

    const DESIGN_SIZE = 800;

    const params = {
      n: 9,
      d: 4,
      scale: 2.0,
      speed: 0,
      vertices: 139,
      maxLines: 5000,
      rotationSpeed: 0,
      morphSpeed: 0.00005,
      trail: 0.10,
      hue: 337,
      hueRandom: 280,
      hueSpeed: -16,
      alpha: 0.01,
      lineWidth: 0.6,
      glow: 0,
      sparkleCount: 0,
      sparkleSize: 1.2,
      wobble: 0,
      phaseSpeed: 0.18,
      breathe: 0,
      autoRandom: 1,
      randomInterval: 20,
      blendMode: 'lighter'
    };

    const candidates = [
      [2, 1], [3, 1], [4, 1], [5, 1], [6, 1], [7, 1], [8, 1],
      [3, 2], [5, 2], [7, 2], [8, 3], [9, 4], [11, 5]
    ];

    let currentN = params.n;
    let currentD = params.d;
    let targetN = params.n;
    let targetD = params.d;
    let colorSeed = Math.random() * 1000;
    let lastRandomTime = -params.randomInterval;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function enterFullscreen() {
      const el = document.documentElement;
      if (!document.fullscreenElement && el.requestFullscreen) {
        el.requestFullscreen().catch(() => {});
      }
    }

    function pickPair() {
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function setColorRandom() {
      params.hue = Math.random() * 360;
      params.hueRandom = 180 + Math.random() * 180;
      colorSeed = Math.random() * 1000;
    }

    function setMorphTarget() {
      const pair = pickPair();
      params.n = pair[0];
      params.d = pair[1];
      targetN = params.n;
      targetD = params.d;
    }

    function randomize(options = {}) {
      const instant = options.instant || false;
      const changeColor = options.changeColor || false;
      const continueMorph = options.continueMorph || false;

      const pair = pickPair();
      params.n = pair[0];
      params.d = pair[1];
      targetN = params.n;
      targetD = params.d;

      if (changeColor) setColorRandom();

      if (instant) {
        currentN = targetN;
        currentD = targetD;
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#05070f';
        ctx.fillRect(0, 0, w, h);
      }

      if (continueMorph) setMorphTarget();
    }

    function colorFor(index, t) {
      const randomLike = Math.sin(index * 127.1 + colorSeed * 311.7) * 43758.5453;
      const rnd = randomLike - Math.floor(randomLike);
      const hue = params.hue + t * params.hueSpeed + rnd * params.hueRandom;
      return `hsla(${hue % 360}, 92%, 64%, ${params.alpha})`;
    }

    function getVertices(t) {
      const count = Math.max(3, Math.round(params.vertices));
      const scale = DESIGN_SIZE * params.scale;
      const k = currentN / currentD;
      const loops = Math.PI * 2 * Math.max(1, Math.round(currentD));
      const points = [];

      for (let i = 0; i < count; i++) {
        const p = i / count;
        const theta = p * loops + t * params.phaseSpeed;
        const r = Math.cos(k * theta);
        const breathe = 1 + Math.sin(t * 1.2 + i * 0.03) * params.breathe;

        points.push({
          x: Math.cos(theta) * r * scale * breathe,
          y: Math.sin(theta) * r * scale * breathe
        });
      }

      return points;
    }

    function draw(time) {
      requestAnimationFrame(draw);
      const t = time * 0.001;

      if (params.autoRandom >= 1 && t - lastRandomTime > params.randomInterval) {
        randomize();
        lastRandomTime = t;
      }

      currentN += (targetN - currentN) * params.morphSpeed;
      currentD += (targetD - currentD) * params.morphSpeed;

      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = `rgba(5, 7, 15, ${params.trail})`;
      ctx.fillRect(0, 0, w, h);

      const motionT = t * params.speed;
      const points = getVertices(motionT);
      const maxLines = Math.round(params.maxLines);
      const fit = Math.min(w, h) / DESIGN_SIZE;

      ctx.save();
      ctx.translate(w / 2, h / 2);
      ctx.scale(fit, fit);
      ctx.rotate(motionT * params.rotationSpeed);
      ctx.globalCompositeOperation = params.blendMode;
      ctx.lineWidth = params.lineWidth;
      ctx.shadowBlur = 0;

      let drawnLines = 0;

      for (let i = 0; i < points.length; i++) {
        const a = points[i];

        for (let j = i + 1; j < points.length; j++) {
          if (drawnLines >= maxLines) break;

          const b = points[j];

          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = colorFor(i * 17 + j * 53, motionT);
          ctx.stroke();

          drawnLines++;
        }

        if (drawnLines >= maxLines) break;
      }

      const sparkleCount = Math.min(Math.round(params.sparkleCount), points.length);

      if (sparkleCount > 0) {
        ctx.shadowBlur = params.glow;

        for (let s = 0; s < sparkleCount; s++) {
          const i = Math.floor((s / sparkleCount) * points.length);
          const p = points[i];
          const fill = colorFor(i * 97, motionT);
          const twinkle = 0.5 + 0.5 * Math.sin(motionT * 5 + i * 0.37);

          ctx.beginPath();
          ctx.arc(p.x, p.y, params.sparkleSize * twinkle, 0, Math.PI * 2);
          ctx.fillStyle = fill;
          ctx.shadowColor = fill;
          ctx.fill();
        }
      }

      ctx.restore();
    }

    window.addEventListener('resize', resize);

    canvas.addEventListener('pointerdown', (event) => {
      if (event.target !== canvas) return;
      enterFullscreen();
      randomize({ instant: true, changeColor: true, continueMorph: true });
      lastRandomTime = performance.now() * 0.001;
    });

    resize();
    randomize({ instant: true, changeColor: true, continueMorph: true });
    requestAnimationFrame(draw);
  </script>
</body>
</html>
